<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Dashboard - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#F5EFE6',
            navy:    '#1E3A5F',
            'level-l0': '#DB5858',
            'level-l1': '#FA961B',
            'level-l2': '#EFBE4A',
            'level-l3': '#7BC780',
            'level-l4': '#5A9AD6',
            promote: '#7BC780',
            drop:    '#DB5858',
            info:    '#5AA5D6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            tc: ['Noto Sans TC', 'Inter', 'system-ui', 'sans-serif'],
            emoji: ['Noto Color Emoji', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #ccc; background-color: #f4f4f4; }
    .top-bar h1 { margin: 0; font-size: 20px; }
    .top-bar .student-switcher { display: flex; align-items: center; gap: 8px; }

    /* NEW: 3-column layout (M8.3c-3a) */
    .main-body { display: grid; grid-template-columns: 220px 320px 1fr; min-height: calc(100vh - 60px); }

    .left-panel, .middle-panel { border-right: 1px solid #ccc; padding: 15px; overflow-y: auto; }
    .left-panel h2, .middle-panel h2 { font-size: 16px; margin-top: 0; margin-bottom: 10px; }
    .left-panel h2:not(:first-of-type), .middle-panel h2:not(:first-of-type) { margin-top: 20px; }

    /* NEW: Books list styling (M8.3c-3a) */
    .books-list { list-style: none; padding: 0; margin: 0; }
    .books-list li { padding: 10px 12px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; font-size: 14px; }
    .books-list li:hover { background-color: #eef; }
    .books-list li.selected { background-color: #dde; font-weight: bold; }

    .progress-summary { font-size: 13px; line-height: 1.8; }
    .progress-summary .total-line { font-weight: bold; margin-bottom: 6px; }
    .progress-summary .placeholder { color: #888; font-style: italic; }

    .chapter-list { list-style: none; padding: 0; margin: 0; }
    .chapter-list li { padding: 8px 10px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; }
    .chapter-list li:hover { background-color: #eef; }
    .chapter-list li.selected { background-color: #dde; font-weight: bold; }
    .chapter-title { display: block; }
    .chapter-meta { display: block; font-size: 12px; color: #666; margin-top: 2px; }
    .chapter-level-counts { display: block; font-size: 11px; color: #555; margin-top: 3px; line-height: 1.5; }

    .cross-chapter-pool { margin-top: 20px; font-size: 12px; }
    .cross-chapter-pool-label { font-weight: bold; margin-bottom: 6px; color: #333; }
    .cross-chapter-pool-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
    .cross-pool-btn { padding: 4px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; font-size: 12px; }
    .cross-pool-btn:hover { background-color: #eef; }

    .right-panel { padding: 20px; }
    .empty-message { color: #888; font-style: italic; }

    .chapter-header { display: flex; justify-content: flex-start; align-items: baseline; gap: 20px; margin-bottom: 15px; }
    .chapter-header h2 { margin: 0; font-size: 18px; }
    .show-passages-link { font-size: 14px; text-decoration: none; color: #0366d6; }
    .show-passages-link:hover { text-decoration: underline; }

    .practice-pool { margin-bottom: 20px; }
    .practice-pool-label { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .practice-pool-buttons { display: flex; gap: 8px; }
    .pool-btn { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; font-size: 14px; }
    .pool-btn:hover { background-color: #eef; }

    .master-toggle { margin-bottom: 10px; }
    .master-toggle button { margin-right: 8px; padding: 5px 10px; cursor: pointer; }

    .vocab-table { border-collapse: collapse; width: 100%; }
    .vocab-table th, .vocab-table td { padding: 8px 12px; border-bottom: 1px solid #ddd; text-align: left; vertical-align: middle; }
    .vocab-table th { background-color: #f4f4f4; font-weight: bold; }
    .vocab-word { font-size: 18px; }

    .level-placeholder { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 12px; background-color: #eee; color: #888; }

    .details-btn, .audio-btn { cursor: pointer; background: none; border: 1px solid #ccc; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
    .details-btn:disabled, .audio-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toast { position: fixed; top: 15px; right: 20px; padding: 8px 16px; border-radius: 4px; font-size: 13px; color: #fff; opacity: 0; transition: opacity 0.2s ease-in-out; pointer-events: none; z-index: 1000; }
    .toast.visible { opacity: 1; }
    .toast.success { background-color: #28a745; }
    .toast.error { background-color: #dc3545; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="favicon.png" alt="" style="height:32px;width:32px;border-radius:6px;">
      <h1>Chinese iGCSE Vocabulary Trainer</h1>
    </div>
    <div class="student-switcher">
      <label for="student-switch">Student:</label>
      <select id="student-switch">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>

  <div class="main-body">

    <!-- LEFT PANEL: Books -->
    <div class="left-panel">
      <h2>Books</h2>
      <ul id="books-list" class="books-list">
        <li class="empty-message">Loading books...</li>
      </ul>
    </div>

    <!-- MIDDLE PANEL: Book overview (progress + cross-chapter pool + chapters) -->
    <div class="middle-panel">
      <div id="book-content">
        <p class="empty-message">Select a book from the left panel to view its chapters.</p>
      </div>
    </div>

    <!-- RIGHT PANEL: Chapter detail -->
    <div class="right-panel">
      <div id="right-panel-content">
        <p class="empty-message">Select a chapter from the middle panel to view its details.</p>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>

  <script>
    // ------------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------------
    const LEVEL_ORDER = ['L0', 'L1', 'L2', 'L3', 'L4'];
    const LEVEL_META = {
      L0: { emoji: '🔴', label: 'L0 Discover' },
      L1: { emoji: '🟠', label: 'L1 Read' },
      L2: { emoji: '🟡', label: 'L2 Listen' },
      L3: { emoji: '🟢', label: 'L3 Usage' },
      L4: { emoji: '🔵', label: 'L4 Write' },
    };

    // ------------------------------------------------------------------
    // Global state (M8.3c-3a additions marked)
    // ------------------------------------------------------------------
    let studentProgress = {};        // NOTE: Firestore reads deferred to M8.3c-3b
    let studentExcluded = [];        // NOTE: Firestore reads deferred to M8.3c-3b
    let allBooks = [];               // NEW (M8.3c-3a): from books-index.json
    let currentBookId = null;        // NEW (M8.3c-3a)
    let bookVocab = {};              // NEW (M8.3c-3a): { bookId: { chapterId: [words] } }
    let bookChapters = {};           // NEW (M8.3c-3a): { bookId: [chapters index] }
    let currentChapterId = null;

    // ------------------------------------------------------------------
    // Bootstrap
    // ------------------------------------------------------------------
    const student = getStudentFromUrl();
    if (!student) {
      window.location.href = 'index.html';
    }

    const dashboardParams = new URLSearchParams(window.location.search);
    const preselectBookId = dashboardParams.get('book');
    const preselectChapterId = dashboardParams.get('chapter');

    const switcher = document.getElementById('student-switch');
    populateStudentDropdown(switcher, student);

    switcher.addEventListener('change', () => {
      const value = switcher.value;
      if (value === ADD_NEW_SENTINEL) {
        handleStudentDropdownChange(switcher);
        return;
      }
      if (value && value !== student) {
        navigateToDashboard(value);
      }
    });

    // ------------------------------------------------------------------
    // Data loaders (M8.3c-3a: per-book scoping)
    // ------------------------------------------------------------------
    async function loadBooksIndex() {
      try {
        const response = await fetch('data/books-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        allBooks = data.books || [];
        // Sort by sortOrder ascending
        allBooks.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
        console.log('Loaded books-index: ' + allBooks.length + ' book(s).');
      } catch (err) {
        console.error('Error loading books-index.json:', err);
        allBooks = [];
      }
    }

    async function loadChaptersIndexForBook(bookId) {
      try {
        const response = await fetch('data/book' + bookId + '/chapters-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        bookChapters[bookId] = data.chapters || [];
        console.log('Loaded chapters-index for book ' + bookId + ': ' + bookChapters[bookId].length + ' chapter(s).');
      } catch (err) {
        console.warn('No chapters-index for book ' + bookId + ' (or fetch failed):', err.message);
        bookChapters[bookId] = [];
      }
    }

    async function loadAllChapterVocabForBook(bookId) {
      const chapters = bookChapters[bookId] || [];
      bookVocab[bookId] = {};
      for (const ch of chapters) {
        try {
          const response = await fetch('data/book' + bookId + '/chapter' + ch.id + '.json');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          bookVocab[bookId][ch.id] = data.vocab || [];
        } catch (err) {
          console.error('Error loading book ' + bookId + ' chapter ' + ch.id + ':', err);
          bookVocab[bookId][ch.id] = [];
        }
      }
    }

    // ------------------------------------------------------------------
    // Firestore loader (M8.3c-3b will re-enable full progress reading)
    // ------------------------------------------------------------------
    async function loadStudentProgress() {
      // DEFERRED to M8.3c-3b: read actual studentProgress + studentExcluded from Firestore.
      // For M8.3c-3a we leave them empty; UI shows placeholder text.
      studentProgress = {};
      studentExcluded = [];
    }

    // ------------------------------------------------------------------
    // Book selection
    // ------------------------------------------------------------------
    async function selectBook(bookId) {
      currentBookId = bookId;
      currentChapterId = null;

      // Highlight selected book in list
      document.querySelectorAll('#books-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.bookId === bookId);
      });

      // Load chapters + vocab for this book
      await loadChaptersIndexForBook(bookId);
      await loadAllChapterVocabForBook(bookId);

      renderBookContent();
      renderRightPanelEmpty();

      // Chapter auto-selection logic (M8.3c-3a):
      // 1. If URL has a valid chapter param, auto-select it.
      // 2. Otherwise, auto-select the first chapter of this book (if any).
      // 3. If the book has no chapters, leave right panel empty (safety net).
      const chapters = bookChapters[bookId] || [];
      let chapterToSelect = null;

      if (preselectChapterId) {
        const found = chapters.find(c => c.id === preselectChapterId);
        if (found) {
          chapterToSelect = found;
          console.log('Auto-selected chapter from URL:', preselectChapterId);
        } else {
          console.log('URL chapter param "' + preselectChapterId + '" not valid for book ' + bookId + '; falling back to first chapter.');
        }
      }

      if (!chapterToSelect && chapters.length > 0) {
        chapterToSelect = chapters[0];
        console.log('Auto-selected first chapter of book ' + bookId + ':', chapterToSelect.id);
      }

      if (chapterToSelect) {
        selectChapter(chapterToSelect);
      }
    }

    // ------------------------------------------------------------------
    // Left panel: Books list
    // ------------------------------------------------------------------
    function renderBooksList() {
      const listEl = document.getElementById('books-list');
      listEl.innerHTML = '';

      if (allBooks.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No books registered yet.</li>';
        return;
      }

      allBooks.forEach(book => {
        const li = document.createElement('li');
        li.dataset.bookId = book.id;
        li.textContent = book.title;
        li.addEventListener('click', () => selectBook(book.id));
        listEl.appendChild(li);
      });
    }

    // ------------------------------------------------------------------
    // Middle panel: Book content
    // ------------------------------------------------------------------
    function renderBookContent() {
      const container = document.getElementById('book-content');
      container.innerHTML = '';

      const chapters = bookChapters[currentBookId] || [];

      // Empty book state
      if (chapters.length === 0) {
        const msg = document.createElement('p');
        msg.className = 'empty-message';
        msg.textContent = 'No chapters yet in this book. Author your first chapter using the pipeline (see Content Authoring Guide).';
        container.appendChild(msg);
        return;
      }

      // Overall Progress heading + placeholder (real numbers deferred to M8.3c-3b)
      const progressHeading = document.createElement('h2');
      progressHeading.textContent = 'Overall Progress';
      container.appendChild(progressHeading);

      const progressSummary = document.createElement('div');
      progressSummary.className = 'progress-summary';
      const progressPlaceholder = document.createElement('div');
      progressPlaceholder.className = 'placeholder';
      progressPlaceholder.textContent = 'Coming in M8.3c-3b';
      progressSummary.appendChild(progressPlaceholder);
      container.appendChild(progressSummary);

      // Cross-chapter Practice Pool (placeholder buttons)
      const crossPool = document.createElement('div');
      crossPool.className = 'cross-chapter-pool';

      const crossLabel = document.createElement('div');
      crossLabel.className = 'cross-chapter-pool-label';
      crossLabel.textContent = 'Practice across all chapters:';
      crossPool.appendChild(crossLabel);

      const crossBtnRow = document.createElement('div');
      crossBtnRow.className = 'cross-chapter-pool-buttons';
      const CROSS_LEVELS = [
        { label: 'L0\u2192L1', sourceLevel: 'L0' },
        { label: 'L1\u2192L2', sourceLevel: 'L1' },
        { label: 'L2\u2192L3', sourceLevel: 'L2' },
        { label: 'L3\u2192L4', sourceLevel: 'L3' },
      ];
      CROSS_LEVELS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'cross-pool-btn';
        btn.textContent = cfg.label + ' (?)';
        btn.title = 'Coming in M8.3c-3b';
        // No click handler in M8.3c-3a
        crossBtnRow.appendChild(btn);
      });
      crossPool.appendChild(crossBtnRow);
      container.appendChild(crossPool);

      // Chapters heading + list
      const chaptersHeading = document.createElement('h2');
      chaptersHeading.textContent = 'Chapters';
      container.appendChild(chaptersHeading);

      const chapterList = document.createElement('ul');
      chapterList.id = 'chapter-list';
      chapterList.className = 'chapter-list';

      chapters.forEach(ch => {
        const li = document.createElement('li');
        li.dataset.chapterId = ch.id;

        if (ch.id === currentChapterId) {
          li.classList.add('selected');
        }

        const title = document.createElement('span');
        title.className = 'chapter-title';
        title.textContent = 'Chapter ' + ch.id + ': ' + ch.title;

        const meta = document.createElement('span');
        meta.className = 'chapter-meta';
        meta.textContent = ch.wordCount + ' words';

        // Placeholder counts (real numbers deferred to M8.3c-3b)
        const levelCounts = document.createElement('span');
        levelCounts.className = 'chapter-level-counts';
        levelCounts.textContent = LEVEL_ORDER.map(l => LEVEL_META[l].emoji + ' ?').join('  ');

        li.appendChild(title);
        li.appendChild(meta);
        li.appendChild(levelCounts);
        li.addEventListener('click', () => selectChapter(ch));

        chapterList.appendChild(li);
      });

      container.appendChild(chapterList);
    }

    // ------------------------------------------------------------------
    // Right panel: Chapter detail
    // ------------------------------------------------------------------
    function renderRightPanelEmpty() {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '<p class="empty-message">Select a chapter from the middle panel to view its details.</p>';
    }

    function selectChapter(chapter) {
      currentChapterId = chapter.id;

      document.querySelectorAll('#chapter-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.chapterId === chapter.id);
      });

      renderChapterDetail({
        chapterId: chapter.id,
        chapterTitle: chapter.title,
        vocab: (bookVocab[currentBookId] || {})[chapter.id] || [],
      });
    }

    function renderChapterDetail(chapterData) {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '';

      // Chapter header + Show Passages link
      const header = document.createElement('div');
      header.className = 'chapter-header';

      const h2 = document.createElement('h2');
      h2.textContent = 'Chapter ' + chapterData.chapterId + ': ' + chapterData.chapterTitle;
      header.appendChild(h2);

      const passagesLink = document.createElement('a');
      passagesLink.className = 'show-passages-link';
      passagesLink.textContent = '📖 Show Passages';
      passagesLink.href = 'passages.html?book=' + encodeURIComponent(currentBookId) +
                          '&chapter=' + encodeURIComponent(chapterData.chapterId) +
                          '&student=' + encodeURIComponent(student);
      header.appendChild(passagesLink);

      rightEl.appendChild(header);

      // Practice Pool (placeholder buttons)
      const practicePool = document.createElement('div');
      practicePool.className = 'practice-pool';

      const label = document.createElement('div');
      label.className = 'practice-pool-label';
      label.textContent = 'Practice Pool:';
      practicePool.appendChild(label);

      const btnRow = document.createElement('div');
      btnRow.className = 'practice-pool-buttons';
      const POOL_LEVELS = [
        { label: 'L0\u2192L1' },
        { label: 'L1\u2192L2' },
        { label: 'L2\u2192L3' },
        { label: 'L3\u2192L4' },
      ];
      POOL_LEVELS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'pool-btn';
        btn.textContent = cfg.label + ' (?)';
        btn.title = 'Coming in M8.3c-3b';
        // No click handler in M8.3c-3a
        btnRow.appendChild(btn);
      });

      practicePool.appendChild(btnRow);
      rightEl.appendChild(practicePool);

      // Master toggles (buttons rendered but not wired yet)
      const masterToggle = document.createElement('div');
      masterToggle.className = 'master-toggle';

      ['Show all details', 'Hide all details', 'Include all in practice', 'Exclude all from practice'].forEach(labelText => {
        const btn = document.createElement('button');
        btn.textContent = labelText;
        btn.title = 'Coming in M8.3c-3b';
        btn.addEventListener('click', () => console.log('Master toggle clicked (deferred to M8.3c-3b):', labelText));
        masterToggle.appendChild(btn);
      });

      rightEl.appendChild(masterToggle);

      // Vocab table (Word / Level / Practice / Details / Audio M / Audio C)
      const table = document.createElement('table');
      table.className = 'vocab-table';

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Word', 'Level', 'Practice', 'Details', 'Audio (M)', 'Audio (C)'].forEach(text => {
        const th = document.createElement('th');
        th.textContent = text;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      chapterData.vocab.forEach(word => {
        const row = document.createElement('tr');
        row.dataset.wordId = word.id;

        // Word cell
        const tdWord = document.createElement('td');
        tdWord.className = 'vocab-word';
        tdWord.textContent = word.traditional;
        row.appendChild(tdWord);

        // Level cell - placeholder for M8.3c-3a
        const tdLevel = document.createElement('td');
        const levelPill = document.createElement('span');
        levelPill.className = 'level-placeholder';
        levelPill.textContent = 'L0';
        levelPill.title = 'Level dropdown coming in M8.3c-3b';
        tdLevel.appendChild(levelPill);
        row.appendChild(tdLevel);

        // Practice cell - placeholder
        const tdPractice = document.createElement('td');
        tdPractice.textContent = '[ ]';
        tdPractice.style.color = '#888';
        tdPractice.title = 'Practice checkbox coming in M8.3c-3b';
        row.appendChild(tdPractice);

        // Details cell - button rendered but disabled
        const tdDetails = document.createElement('td');
        const detailsBtn = document.createElement('button');
        detailsBtn.className = 'details-btn';
        detailsBtn.textContent = '👁 Details';
        detailsBtn.disabled = true;
        detailsBtn.title = 'Details toggle coming in M8.3c-3b';
        tdDetails.appendChild(detailsBtn);
        row.appendChild(tdDetails);

        // Audio (M) placeholder
        const tdAudioM = document.createElement('td');
        tdAudioM.textContent = '\u2014';
        tdAudioM.style.color = '#888';
        tdAudioM.title = 'Mandarin audio coming in M8.3c-3b';
        row.appendChild(tdAudioM);

        // Audio (C) placeholder
        const tdAudioC = document.createElement('td');
        tdAudioC.textContent = '\u2014';
        tdAudioC.style.color = '#888';
        tdAudioC.title = 'Cantonese audio coming in M8.3c-3b';
        row.appendChild(tdAudioC);

        tbody.appendChild(row);
      });

      table.appendChild(tbody);
      rightEl.appendChild(table);

      console.log('Rendered book ' + currentBookId + ' chapter ' + chapterData.chapterId + ' with ' + chapterData.vocab.length + ' words.');
    }

    // ------------------------------------------------------------------
    // Main init (M8.3c-3a)
    // ------------------------------------------------------------------
    async function init() {
      try {
        await loadStudentProgress();
        await loadBooksIndex();

        renderBooksList();

        if (allBooks.length === 0) {
          document.getElementById('book-content').innerHTML =
            '<p class="empty-message">No books registered. See Content Authoring Guide Section 2.</p>';
          return;
        }

        // Determine which book to auto-select
        let targetBookId = null;
        if (preselectBookId) {
          const found = allBooks.find(b => b.id === preselectBookId);
          if (found) {
            targetBookId = preselectBookId;
            console.log('Auto-selected book from URL:', preselectBookId);
          } else {
            console.log('URL book param "' + preselectBookId + '" not valid; falling back to first book.');
          }
        }
        if (!targetBookId) {
          targetBookId = allBooks[0].id;
          console.log('Auto-selected first book:', targetBookId);
        }

        await selectBook(targetBookId);

      } catch (err) {
        console.error('Initialization error:', err);
      }
    }

    init();
  </script>

</body>
</html>
