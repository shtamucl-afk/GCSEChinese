<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Chinese iGCSE Vocabulary Trainer</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid #ccc;
      background-color: #f4f4f4;
    }

    .top-bar h1 {
      margin: 0;
      font-size: 20px;
    }

    .top-bar .student-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .main-body {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 60px);
    }

    .left-panel {
      border-right: 1px solid #ccc;
      padding: 15px;
      overflow-y: auto;
    }

    .left-panel h2 {
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .left-panel h2:not(:first-of-type) {
      margin-top: 20px;
    }

    .progress-summary {
      font-size: 13px;
      line-height: 1.8;
    }

    .progress-summary .total-line {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .chapter-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .chapter-list li {
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .chapter-list li:hover {
      background-color: #eef;
    }

    .chapter-list li.selected {
      background-color: #dde;
      font-weight: bold;
    }

    .chapter-title {
      display: block;
    }

    .chapter-meta {
      display: block;
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .chapter-level-counts {
      display: block;
      font-size: 11px;
      color: #555;
      margin-top: 3px;
      line-height: 1.5;
    }
    .cross-chapter-pool {
      margin-top: 20px;
      font-size: 12px;
    }

    .cross-chapter-pool-label {
      font-weight: bold;
      margin-bottom: 6px;
      color: #333;
    }

    .cross-chapter-pool-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cross-pool-btn {
      padding: 4px 8px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      font-size: 12px;
    }

    .cross-pool-btn:hover {
      background-color: #eef;
    }

    .right-panel {
      padding: 20px;
    }

    .empty-message {
      color: #888;
      font-style: italic;
    }

    .chapter-header {
      display: flex;
      justify-content: flex-start;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 15px;
    }

    .chapter-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .show-passages-link {
      font-size: 14px;
      text-decoration: none;
      color: #0366d6;
    }

    .show-passages-link:hover {
      text-decoration: underline;
    }

    .practice-pool {
      margin-bottom: 20px;
    }

    .practice-pool-label {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .practice-pool-buttons {
      display: flex;
      gap: 8px;
    }

    .pool-btn {
      padding: 6px 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      font-size: 14px;
    }

    .pool-btn:hover {
      background-color: #eef;
    }

    .master-toggle {
      margin-bottom: 10px;
    }

    .master-toggle button {
      margin-right: 8px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .vocab-table {
      border-collapse: collapse;
      width: 100%;
    }

    .vocab-table th,
    .vocab-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      vertical-align: middle;
    }

    .vocab-table th {
      background-color: #f4f4f4;
      font-weight: bold;
    }

    .vocab-word {
      font-size: 18px;
    }

    /* Level dropdown (replaces static pill) */
    .level-select {
      padding: 3px 6px;
      border-radius: 10px;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.15);
      cursor: pointer;
      font-family: inherit;
      background-color: #eee;
      color: #333;
      appearance: menulist;
    }

    .level-select:focus {
      outline: 2px solid rgba(0, 122, 255, 0.3);
      outline-offset: 1px;
    }

    .level-select.level-NotStarted { background-color: #f8d7da; color: #721c24; }
    .level-select.level-L1        { background-color: #e2e3e5; color: #383d41; }
    .level-select.level-L2        { background-color: #fff3cd; color: #856404; }
    .level-select.level-L3        { background-color: #ffe5b4; color: #6d4300; }
    .level-select.level-L4        { background-color: #d4edda; color: #155724; }

    .details-btn,
    .audio-btn {
      cursor: pointer;
      background: none;
      border: 1px solid #ccc;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 14px;
    }

    .details-btn:hover,
    .audio-btn:hover {
      background-color: #eef;
    }

    .details-row {
      display: none;
      background-color: #fafafa;
    }

    .details-row.expanded {
      display: table-row;
    }

    .details-row td {
      padding: 12px 20px;
      border-bottom: 1px solid #ddd;
    }

    .details-content dl {
      margin: 0;
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 6px 12px;
    }

    .details-content dt {
      font-weight: bold;
      color: #555;
    }

    .details-content dd {
      margin: 0;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 15px;
      right: 20px;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 13px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.visible {
      opacity: 1;
    }

    .toast.success {
      background-color: #28a745;
    }

    .toast.error {
      background-color: #dc3545;
    }

    .vocab-table td input[type="checkbox"] {
      cursor: pointer;
      transform: scale(1.2);
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>Chinese iGCSE Vocab Trainer</h1>
    <div class="student-switcher">
      <label for="student-switch">Student:</label>
      <select id="student-switch">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>

  <div class="main-body">

    <div class="left-panel">
      <h2>Overall Progress</h2>
      <div id="progress-summary" class="progress-summary">
        <p class="empty-message">Loading...</p>
      </div>

      <div id="cross-chapter-pool" class="cross-chapter-pool"></div>

      <h2>Chapters</h2>
      <ul id="chapter-list" class="chapter-list">
        <li>Loading chapters...</li>
      </ul>
    </div>

    <div class="right-panel">
      <div id="right-panel-content">
        <p class="empty-message">
          Select a chapter from the left panel to view its details.
        </p>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>

  <script>
    // ------------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------------
    const LEVEL_ORDER = ['NotStarted', 'L1', 'L2', 'L3', 'L4'];
    const LEVEL_META = {
      NotStarted: { emoji: '🔴', label: 'Not Started' },
      L1:         { emoji: '⚪', label: 'L1 Read' },
      L2:         { emoji: '🟡', label: 'L2 Listen' },
      L3:         { emoji: '🟠', label: 'L3 Usage' },
      L4:         { emoji: '🟢', label: 'L4 Write' },
    };

    // ------------------------------------------------------------------
    // Global state
    // ------------------------------------------------------------------
    let studentProgress = {};
    let studentExcluded = [];
    let allChapters = [];
    let chapterVocab = {};
    let currentChapterId = null;

    // ------------------------------------------------------------------
    // Bootstrap
    // ------------------------------------------------------------------
    const student = getStudentFromUrl();
    if (!student) {
      window.location.href = 'index.html';
    }

    const switcher = document.getElementById('student-switch');
    populateStudentDropdown(switcher, student);

    switcher.addEventListener('change', () => {
      const value = switcher.value;
      if (value === ADD_NEW_SENTINEL) {
        handleStudentDropdownChange(switcher);
        return;
      }
      if (value && value !== student) {
        navigateToDashboard(value);
      }
    });

    // ------------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------------
    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'NotStarted';
    }

    function isWordExcluded(wordId) {
      return studentExcluded.includes(wordId);
    }

    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        if (doc.exists) {
          studentProgress = doc.data().progress || {};
          studentExcluded = doc.data().excluded || [];
          console.log('Loaded progress for ' + student + ':',
                      Object.keys(studentProgress).length, 'entries;',
                      studentExcluded.length, 'excluded');
        } else {
          studentProgress = {};
          studentExcluded = [];
          console.log('No progress doc for ' + student + ' - treating all as Not Started, none excluded');
        }
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
        studentExcluded = [];
      }
    }

    async function loadChaptersIndex() {
      const response = await fetch('data/chapters-index.json');
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      allChapters = data.chapters || [];
      console.log('Loaded chapters index:', allChapters.length, 'chapter(s)');
    }

    async function loadAllChapterVocab() {
      chapterVocab = {};
      for (const ch of allChapters) {
        try {
          const response = await fetch('data/chapter' + ch.id + '.json');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          chapterVocab[ch.id] = data.vocab || [];
        } catch (err) {
          console.error('Error loading chapter ' + ch.id + ':', err);
          chapterVocab[ch.id] = [];
        }
      }
    }

    function computeLevelCounts(vocabArray) {
      const counts = { NotStarted: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    // ------------------------------------------------------------------
    // Toast notifications
    // ------------------------------------------------------------------
    let toastTimer = null;

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'success') + ' visible';

      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('visible');
      }, 1500);
    }

    // ------------------------------------------------------------------
    // Update word level in Firestore + re-render counts
    // ------------------------------------------------------------------
    async function updateWordLevel(wordId, newLevel, selectEl, oldLevel) {
      try {
        // Firestore partial update: only touch this word's progress entry.
        // Note: dot-notation like 'progress.ch01_w001' only works with .update(),
        // not with .set({merge:true}). Use nested object structure instead.
        
        const update = {
          progress: {
            [wordId]: newLevel,
          },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };


        await db.collection('students').doc(student).set(update, { merge: true });

        // Update local state
        studentProgress[wordId] = newLevel;

        // Update the dropdown's own color
        applyLevelClass(selectEl, newLevel);

        // Refresh downstream counts
        refreshCountsAfterChange();

        showToast('Saved', 'success');
        console.log('Updated ' + wordId + ' from ' + oldLevel + ' to ' + newLevel);
      } catch (err) {
        console.error('Failed to update level:', err);
        // Revert dropdown
        selectEl.value = oldLevel;
        applyLevelClass(selectEl, oldLevel);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateWordExclusion(wordId, includeInPool, checkboxEl) {
      try {
        const update = {
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };

        if (includeInPool) {
          // Remove from excluded array
          update.excluded = firebase.firestore.FieldValue.arrayRemove(wordId);
        } else {
          // Add to excluded array
          update.excluded = firebase.firestore.FieldValue.arrayUnion(wordId);
        }

        await db.collection('students').doc(student).set(update, { merge: true });

        // Update local state
        if (includeInPool) {
          studentExcluded = studentExcluded.filter(id => id !== wordId);
        } else {
          if (!studentExcluded.includes(wordId)) {
            studentExcluded.push(wordId);
          }
        }

        // Refresh Practice Pool button counts (both chapter-scoped and cross-chapter)
        if (currentChapterId) {
          const chapter = allChapters.find(c => c.id === currentChapterId);
          if (chapter) refreshPoolCounts(chapter);
        }
        renderCrossChapterPool();

        showToast('Saved', 'success');
        console.log('Set exclusion for ' + wordId + ': excluded=' + !includeInPool);
      } catch (err) {
        console.error('Failed to update exclusion:', err);
        // Revert checkbox
        checkboxEl.checked = !includeInPool;
        showToast('Save failed. Please try again.', 'error');
      }
    }
    
    async function includeAllInPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;

      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayRemove(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });

        // Update local state - remove all wordIds from excluded
        studentExcluded = studentExcluded.filter(id => !wordIds.includes(id));

        // Update all checkboxes in the current view
        document.querySelectorAll('.vocab-table input[type="checkbox"]').forEach(cb => {
          cb.checked = true;
        });

        // Refresh pool counts (both chapter-scoped and cross-chapter)
        if (currentChapterId) {
          const chapter = allChapters.find(c => c.id === currentChapterId);
          if (chapter) refreshPoolCounts(chapter);
        }
        renderCrossChapterPool();

        showToast('All words included in practice', 'success');
        console.log('Included all ' + wordIds.length + ' words in practice');
      } catch (err) {
        console.error('Failed to include all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function excludeAllFromPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;

      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayUnion(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });

        // Update local state - add all wordIds to excluded (dedup)
        wordIds.forEach(id => {
          if (!studentExcluded.includes(id)) studentExcluded.push(id);
        });

        // Update all checkboxes in the current view
        document.querySelectorAll('.vocab-table input[type="checkbox"]').forEach(cb => {
          cb.checked = false;
        });

        // Refresh pool counts (both chapter-scoped and cross-chapter)
        if (currentChapterId) {
          const chapter = allChapters.find(c => c.id === currentChapterId);
          if (chapter) refreshPoolCounts(chapter);
        }
        renderCrossChapterPool();

        showToast('All words excluded from practice', 'success');
        console.log('Excluded all ' + wordIds.length + ' words from practice');
      } catch (err) {
        console.error('Failed to exclude all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    function applyLevelClass(selectEl, level) {
      LEVEL_ORDER.forEach(l => selectEl.classList.remove('level-' + l));
      selectEl.classList.add('level-' + level);
      // Force a repaint to work around browser caching of <select> chrome
      selectEl.style.display = 'none';
      selectEl.offsetHeight;
      selectEl.style.display = '';
    }


    // ------------------------------------------------------------------
    // Refresh counts across the page after a level change
    // ------------------------------------------------------------------
    function refreshCountsAfterChange() {
      renderOverallProgress();
      renderCrossChapterPool();
      renderChapterList();

      // If a chapter is currently selected, refresh its pool counts
      if (currentChapterId) {
        const chapter = allChapters.find(c => c.id === currentChapterId);
        if (chapter) {
          refreshPoolCounts(chapter);
        }
      }
    }

    function refreshPoolCounts(chapter) {
      const vocab = chapterVocab[chapter.id] || [];
      const counts = computePoolCounts(vocab);
      const btns = document.querySelectorAll('.pool-btn');
      // Read source level from each button's dataset (set at render time)
      btns.forEach(btn => {
        const sourceLevel = btn.dataset.sourceLevel;
        const targetLevel = btn.dataset.targetLevel;
        if (!sourceLevel || !targetLevel) return;
        // Reconstruct the label from source/target
        const arrow = '\u2192';
        const labelPart = (sourceLevel === 'NotStarted' ? 'NS' : sourceLevel) + arrow + targetLevel;
        btn.textContent = labelPart + ' (' + counts[sourceLevel] + ')';
      });
    }

    // Pool counts exclude words marked as excluded (used for Practice Pool buttons)
    function computePoolCounts(vocabArray) {
      const counts = { NotStarted: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        if (isWordExcluded(word.id)) return;
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    // ------------------------------------------------------------------
    // Left panel rendering
    // ------------------------------------------------------------------
    function renderOverallProgress() {
      const summaryEl = document.getElementById('progress-summary');
      const allVocab = [];
      Object.values(chapterVocab).forEach(list => allVocab.push(...list));

      const total = allVocab.length;
      const counts = computeLevelCounts(allVocab);

      summaryEl.innerHTML = '';

      const totalLine = document.createElement('div');
      totalLine.className = 'total-line';
      totalLine.textContent = 'Total: ' + total + ' words';
      summaryEl.appendChild(totalLine);

      LEVEL_ORDER.forEach(level => {
        const line = document.createElement('div');
        const meta = LEVEL_META[level];
        line.textContent = meta.emoji + ' ' + meta.label + ': ' + counts[level];
        summaryEl.appendChild(line);
      });
    }

    function renderCrossChapterPool() {
      const containerEl = document.getElementById('cross-chapter-pool');
      containerEl.innerHTML = '';

      // Combine all chapter vocab
      const allVocab = [];
      Object.values(chapterVocab).forEach(list => allVocab.push(...list));

      if (allVocab.length === 0) return;

      const counts = computePoolCounts(allVocab);

      const label = document.createElement('div');
      label.className = 'cross-chapter-pool-label';
      label.textContent = 'Practice across all chapters:';
      containerEl.appendChild(label);

      const btnRow = document.createElement('div');
      btnRow.className = 'cross-chapter-pool-buttons';

      const CROSS_POOL_BUTTONS = [
        { label: 'NS\u2192L1', sourceLevel: 'NotStarted', targetLevel: 'L1' },
        { label: 'L1\u2192L2', sourceLevel: 'L1',         targetLevel: 'L2' },
        { label: 'L2\u2192L3', sourceLevel: 'L2',         targetLevel: 'L3' },
        { label: 'L3\u2192L4', sourceLevel: 'L3',         targetLevel: 'L4' },
      ];

      CROSS_POOL_BUTTONS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'cross-pool-btn';
        btn.dataset.sourceLevel = cfg.sourceLevel;
        btn.dataset.targetLevel = cfg.targetLevel;
        btn.textContent = cfg.label + ' (' + counts[cfg.sourceLevel] + ')';
        btn.addEventListener('click', () => handleCrossPoolClick(cfg.targetLevel));
        btnRow.appendChild(btn);
      });

      containerEl.appendChild(btnRow);
    }

    function handleCrossPoolClick(targetLevel) {
      alert('Cross-chapter practice pool to reach ' + LEVEL_META[targetLevel].label +
            ' coming in Milestone 4+.');
    }

    function renderChapterList() {
      const listEl = document.getElementById('chapter-list');
      listEl.innerHTML = '';

      if (allChapters.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No chapters yet.</li>';
        return;
      }

      allChapters.forEach(ch => {
        const vocab = chapterVocab[ch.id] || [];
        const counts = computeLevelCounts(vocab);

        const li = document.createElement('li');
        li.dataset.chapterId = ch.id;

        if (ch.id === currentChapterId) {
          li.classList.add('selected');
        }

        const title = document.createElement('span');
        title.className = 'chapter-title';
        title.textContent = 'Chapter ' + ch.id + ': ' + ch.title;

        const meta = document.createElement('span');
        meta.className = 'chapter-meta';
        meta.textContent = ch.wordCount + ' words';

        const levelCounts = document.createElement('span');
        levelCounts.className = 'chapter-level-counts';
        levelCounts.textContent = LEVEL_ORDER.map(l => LEVEL_META[l].emoji + ' ' + counts[l]).join('  ');

        li.appendChild(title);
        li.appendChild(meta);
        li.appendChild(levelCounts);
        li.addEventListener('click', () => selectChapter(ch));

        listEl.appendChild(li);
      });
    }

    // ------------------------------------------------------------------
    // Chapter selection
    // ------------------------------------------------------------------
    function selectChapter(chapter) {
      currentChapterId = chapter.id;

      document.querySelectorAll('#chapter-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.chapterId === chapter.id);
      });

      const chapterData = {
        chapterId: chapter.id,
        chapterTitle: chapter.title,
        vocab: chapterVocab[chapter.id] || [],
      };
      renderChapterDetail(chapterData);
    }

    // ------------------------------------------------------------------
    // Practice pool button click (placeholder for M4)
    // ------------------------------------------------------------------
    function handlePracticePoolClick(targetLevel, chapterId) {
      alert('Practice pool to reach ' + LEVEL_META[targetLevel].label +
            ' (Chapter ' + chapterId + ') coming in Milestone 4+.');
    }

    // ------------------------------------------------------------------
    // Render chapter detail on the right panel
    // ------------------------------------------------------------------
    function renderChapterDetail(chapterData) {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '';

      // Chapter header + Show Passages link
      const header = document.createElement('div');
      header.className = 'chapter-header';

      const h2 = document.createElement('h2');
      h2.textContent = 'Chapter ' + chapterData.chapterId + ': ' + chapterData.chapterTitle;
      header.appendChild(h2);

      const passagesLink = document.createElement('a');
      passagesLink.className = 'show-passages-link';
      passagesLink.textContent = '📖 Show Passages';
      passagesLink.href = 'passages.html?chapter=' + encodeURIComponent(chapterData.chapterId) +
                          '&student=' + encodeURIComponent(student);
      header.appendChild(passagesLink);

      rightEl.appendChild(header);

      // Practice Pool - uses pool counts (excludes filtered words)
      const chapterCounts = computePoolCounts(chapterData.vocab);

      const practicePool = document.createElement('div');
      practicePool.className = 'practice-pool';

      const label = document.createElement('div');
      label.className = 'practice-pool-label';
      label.textContent = 'Practice Pool:';
      practicePool.appendChild(label);

      const btnRow = document.createElement('div');
      btnRow.className = 'practice-pool-buttons';

      // Pool button config: { label, targetLevel, sourceLevel }
      // Source level = which words are in the pool.
      // Target level = which level the student is trying to achieve.
      const POOL_BUTTONS = [
        { label: 'NS\u2192L1', sourceLevel: 'NotStarted', targetLevel: 'L1' },
        { label: 'L1\u2192L2', sourceLevel: 'L1',         targetLevel: 'L2' },
        { label: 'L2\u2192L3', sourceLevel: 'L2',         targetLevel: 'L3' },
        { label: 'L3\u2192L4', sourceLevel: 'L3',         targetLevel: 'L4' },
      ];

      POOL_BUTTONS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'pool-btn';
        btn.dataset.sourceLevel = cfg.sourceLevel;
        btn.dataset.targetLevel = cfg.targetLevel;
        btn.textContent = cfg.label + ' (' + chapterCounts[cfg.sourceLevel] + ')';
        btn.addEventListener('click', () => handlePracticePoolClick(cfg.targetLevel, chapterData.chapterId));
        btnRow.appendChild(btn);
      });

      practicePool.appendChild(btnRow);
      rightEl.appendChild(practicePool);

      // Master toggles
      const masterToggle = document.createElement('div');
      masterToggle.className = 'master-toggle';

      const showAllBtn = document.createElement('button');
      showAllBtn.textContent = 'Show all details';
      showAllBtn.addEventListener('click', expandAll);

      const hideAllBtn = document.createElement('button');
      hideAllBtn.textContent = 'Hide all details';
      hideAllBtn.addEventListener('click', collapseAll);

      const includeAllBtn = document.createElement('button');
      includeAllBtn.textContent = 'Include all in practice';
      includeAllBtn.addEventListener('click', () => includeAllInPractice(chapterData.vocab));

      const excludeAllBtn = document.createElement('button');
      excludeAllBtn.textContent = 'Exclude all from practice';
      excludeAllBtn.addEventListener('click', () => excludeAllFromPractice(chapterData.vocab));

      masterToggle.appendChild(showAllBtn);
      masterToggle.appendChild(hideAllBtn);
      masterToggle.appendChild(includeAllBtn);
      masterToggle.appendChild(excludeAllBtn);
      rightEl.appendChild(masterToggle);


      // Vocab table
      const table = document.createElement('table');
      table.className = 'vocab-table';

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Word', 'Level', 'Practice', 'Details', 'Audio'].forEach(text => {
        const th = document.createElement('th');
        th.textContent = text;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      chapterData.vocab.forEach(word => {
        const row = document.createElement('tr');
        row.dataset.wordId = word.id;

        // Word cell
        const tdWord = document.createElement('td');
        tdWord.className = 'vocab-word';
        tdWord.textContent = word.traditional;
        row.appendChild(tdWord);

        // Level cell - inline dropdown
        const tdLevel = document.createElement('td');
        const select = document.createElement('select');
        select.className = 'level-select';
        select.dataset.wordId = word.id;

        LEVEL_ORDER.forEach(level => {
          const opt = document.createElement('option');
          opt.value = level;
          opt.textContent = LEVEL_META[level].emoji + ' ' + LEVEL_META[level].label;
          select.appendChild(opt);
        });

        // Initialize the dropdown to current level. Read from studentProgress
        // fresh each time to avoid stale closure issues.
        const initialLevel = getLevelForWord(word.id);
        select.value = initialLevel;
        applyLevelClass(select, initialLevel);

        select.addEventListener('change', () => {
          // Read old level from the state, not from a captured variable
          const oldLevel = getLevelForWord(word.id);
          const newLevel = select.value;
          if (newLevel === oldLevel) {
            return;
          }
          updateWordLevel(word.id, newLevel, select, oldLevel);
        });

        tdLevel.appendChild(select);
        row.appendChild(tdLevel);

        // Practice cell - checkbox for exclusion
        const tdPractice = document.createElement('td');
        const practiceCheckbox = document.createElement('input');
        practiceCheckbox.type = 'checkbox';
        practiceCheckbox.checked = !isWordExcluded(word.id);
        practiceCheckbox.dataset.wordId = word.id;
        practiceCheckbox.title = 'Include in practice pool';
        practiceCheckbox.addEventListener('change', () => {
          updateWordExclusion(word.id, practiceCheckbox.checked, practiceCheckbox);
        });
        tdPractice.appendChild(practiceCheckbox);
        row.appendChild(tdPractice);

        // Details cell
        const tdDetails = document.createElement('td');
        const detailsBtn = document.createElement('button');
        detailsBtn.className = 'details-btn';
        detailsBtn.textContent = '👁 Details';
        detailsBtn.addEventListener('click', () => toggleRowDetails(word.id, detailsBtn));
        tdDetails.appendChild(detailsBtn);
        row.appendChild(tdDetails);

        // Audio cell
        const tdAudio = document.createElement('td');
        const audioBtn = document.createElement('button');
        audioBtn.className = 'audio-btn';
        audioBtn.textContent = '🔊';
        audioBtn.title = 'Play word audio';
        audioBtn.addEventListener('click', () => playAudio(word.audioIsolated));
        tdAudio.appendChild(audioBtn);
        row.appendChild(tdAudio);

        tbody.appendChild(row);

        // Details row (hidden)
        const detailsRow = document.createElement('tr');
        detailsRow.className = 'details-row';
        detailsRow.dataset.wordId = word.id;
        detailsRow.id = 'details-' + word.id;

        const detailsCell = document.createElement('td');
        detailsCell.colSpan = 5;

        const detailsContent = document.createElement('div');
        detailsContent.className = 'details-content';

        const dl = document.createElement('dl');
        const items = [
          ['Pinyin', word.pinyin],
          ['English', word.english],
          ['Context', word.contextSentence || '(none)'],
        ];
        items.forEach(([itemLabel, itemValue]) => {
          const dt = document.createElement('dt');
          dt.textContent = itemLabel;
          const dd = document.createElement('dd');
          dd.textContent = itemValue;
          dl.appendChild(dt);
          dl.appendChild(dd);
        });

        detailsContent.appendChild(dl);
        detailsCell.appendChild(detailsContent);
        detailsRow.appendChild(detailsCell);
        tbody.appendChild(detailsRow);
      });

      table.appendChild(tbody);
      rightEl.appendChild(table);

      console.log('Rendered chapter ' + chapterData.chapterId + ' with ' + chapterData.vocab.length + ' words.');
    }

    // ------------------------------------------------------------------
    // Row toggles + audio
    // ------------------------------------------------------------------
    function toggleRowDetails(wordId, button) {
      const detailsRow = document.getElementById('details-' + wordId);
      if (!detailsRow) return;
      const isExpanded = detailsRow.classList.contains('expanded');
      if (isExpanded) {
        detailsRow.classList.remove('expanded');
        button.textContent = '👁 Details';
      } else {
        detailsRow.classList.add('expanded');
        button.textContent = '🙈 Hide';
      }
    }

    function expandAll() {
      document.querySelectorAll('.details-row').forEach(row => row.classList.add('expanded'));
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '🙈 Hide');
    }

    function collapseAll() {
      document.querySelectorAll('.details-row').forEach(row => row.classList.remove('expanded'));
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '👁 Details');
    }

    function playAudio(audioPath) {
      if (!audioPath) {
        console.warn('No audio path provided');
        return;
      }
      const audio = new Audio(audioPath);
      audio.play().catch(err => console.error('Audio playback failed:', err));
    }

    // ------------------------------------------------------------------
    // Main init
    // ------------------------------------------------------------------
    async function init() {
      try {
        await loadStudentProgress();
        await loadChaptersIndex();
        await loadAllChapterVocab();
        renderOverallProgress();
        renderCrossChapterPool();
        renderChapterList();
      } catch (err) {
        console.error('Initialization error:', err);
      }
    }

    init();
  </script>

</body>
</html>
