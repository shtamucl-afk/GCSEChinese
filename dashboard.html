<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Dashboard - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#F5EFE6',
            navy:    '#1E3A5F',
            'level-l0': '#DB5858',
            'level-l1': '#FA961B',
            'level-l2': '#EFBE4A',
            'level-l3': '#7BC780',
            'level-l4': '#5A9AD6',
            promote: '#7BC780',
            drop:    '#DB5858',
            info:    '#5AA5D6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            tc: ['Noto Sans TC', 'Inter', 'system-ui', 'sans-serif'],
            emoji: ['Noto Color Emoji', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #ccc; background-color: #f4f4f4; }
    .top-bar h1 { margin: 0; font-size: 20px; }
    .top-bar .student-switcher { display: flex; align-items: center; gap: 8px; }

    .main-body { display: grid; grid-template-columns: 220px 320px 1fr; min-height: calc(100vh - 60px); }
    .left-panel, .middle-panel { border-right: 1px solid #ccc; padding: 15px; overflow-y: auto; }
    .left-panel h2, .middle-panel h2 { font-size: 16px; margin-top: 0; margin-bottom: 10px; }
    .left-panel h2:not(:first-of-type), .middle-panel h2:not(:first-of-type) { margin-top: 20px; }

    .books-list { list-style: none; padding: 0; margin: 0; }
    .books-list li { padding: 10px 12px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; font-size: 14px; }
    .books-list li:hover { background-color: #eef; }
    .books-list li.selected { background-color: #dde; font-weight: bold; }

    .progress-summary { font-size: 13px; line-height: 1.8; }
    .progress-summary .total-line { font-weight: bold; margin-bottom: 6px; }

    .chapter-list { list-style: none; padding: 0; margin: 0; }
    .chapter-list li { padding: 8px 10px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; }
    .chapter-list li:hover { background-color: #eef; }
    .chapter-list li.selected { background-color: #dde; font-weight: bold; }
    .chapter-title { display: block; }
    .chapter-meta { display: block; font-size: 12px; color: #666; margin-top: 2px; }
    .chapter-level-counts { display: block; font-size: 11px; color: #555; margin-top: 3px; line-height: 1.5; }

    .cross-chapter-pool { margin-top: 20px; font-size: 12px; }
    .cross-chapter-pool-label { font-weight: bold; margin-bottom: 6px; color: #333; }
    .cross-chapter-pool-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
    .cross-pool-btn { padding: 4px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; font-size: 12px; }
    .cross-pool-btn:hover { background-color: #eef; }

    .right-panel { padding: 20px; }
    .empty-message { color: #888; font-style: italic; }

    .chapter-header { display: flex; justify-content: flex-start; align-items: baseline; gap: 20px; margin-bottom: 15px; }
    .chapter-header h2 { margin: 0; font-size: 18px; }
    .show-passages-link { font-size: 14px; text-decoration: none; color: #0366d6; }
    .show-passages-link:hover { text-decoration: underline; }

    .practice-pool { margin-bottom: 20px; }
    .practice-pool-label { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .practice-pool-buttons { display: flex; gap: 8px; }
    .pool-btn { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; font-size: 14px; }
    .pool-btn:hover { background-color: #eef; }

    .master-toggle { margin-bottom: 10px; }
    .master-toggle button { margin-right: 8px; padding: 5px 10px; cursor: pointer; }

    .vocab-table { border-collapse: collapse; width: 100%; }
    .vocab-table th, .vocab-table td { padding: 8px 12px; border-bottom: 1px solid #ddd; text-align: left; vertical-align: middle; }
    .vocab-table th { background-color: #f4f4f4; font-weight: bold; }
    .vocab-word { font-size: 18px; }

    .level-select {
      padding: 3px 6px; border-radius: 10px; font-size: 12px;
      border: 1px solid rgba(0,0,0,0.15); cursor: pointer;
      font-family: inherit; background-color: #eee; color: #333;
      appearance: menulist;
    }
    .level-select:focus { outline: 2px solid rgba(0, 122, 255, 0.3); outline-offset: 1px; }
    .level-select.level-L0 { background-color: #F8D8D8; color: #721C24; }
    .level-select.level-L1 { background-color: #FDE4C2; color: #6D3900; }
    .level-select.level-L2 { background-color: #FFF3CD; color: #856404; }
    .level-select.level-L3 { background-color: #D4EDDA; color: #155724; }
    .level-select.level-L4 { background-color: #D9E7F5; color: #1E3A5F; }

    .details-btn, .audio-btn {
      cursor: pointer; background: none; border: 1px solid #ccc;
      padding: 4px 8px; border-radius: 4px; font-size: 14px;
    }
    .details-btn:hover, .audio-btn:hover { background-color: #eef; }

    .details-row { display: none; background-color: #fafafa; }
    .details-row.expanded { display: table-row; }
    .details-row td { padding: 12px 20px; border-bottom: 1px solid #ddd; }
    .details-content dl {
      margin: 0; display: grid; grid-template-columns: 140px 1fr; gap: 6px 12px;
    }
    .details-content dt { font-weight: bold; color: #555; }
    .details-content dd { margin: 0; }

    .toast { position: fixed; top: 15px; right: 20px; padding: 8px 16px; border-radius: 4px; font-size: 13px; color: #fff; opacity: 0; transition: opacity 0.2s ease-in-out; pointer-events: none; z-index: 1000; }
    .toast.visible { opacity: 1; }
    .toast.success { background-color: #28a745; }
    .toast.error { background-color: #dc3545; }

    .vocab-table td input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="favicon.png" alt="" style="height:32px;width:32px;border-radius:6px;">
      <h1>Chinese iGCSE Vocabulary Trainer</h1>
    </div>
    <div class="student-switcher">
      <label for="student-switch">Student:</label>
      <select id="student-switch">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>

  <div class="main-body">

    <div class="left-panel">
      <h2>Books</h2>
      <ul id="books-list" class="books-list">
        <li class="empty-message">Loading books...</li>
      </ul>
    </div>

    <div class="middle-panel">
      <div id="book-content">
        <p class="empty-message">Select a book from the left panel to view its chapters.</p>
      </div>
    </div>

    <div class="right-panel">
      <div id="right-panel-content">
        <p class="empty-message">Select a chapter from the middle panel to view its details.</p>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>


  <script>
    // ------------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------------
    const LEVEL_ORDER = ['L0', 'L1', 'L2', 'L3', 'L4'];
    const LEVEL_META = {
      L0: { emoji: '🔴', label: 'L0 Discover' },
      L1: { emoji: '🟠', label: 'L1 Read' },
      L2: { emoji: '🟡', label: 'L2 Listen' },
      L3: { emoji: '🟢', label: 'L3 Usage' },
      L4: { emoji: '🔵', label: 'L4 Write' },
    };

    // ------------------------------------------------------------------
    // Global state
    // ------------------------------------------------------------------
    let studentProgress = {};
    let studentExcluded = [];
    let allBooks = [];
    let currentBookId = null;
    let bookVocab = {};
    let bookChapters = {};
    let currentChapterId = null;
    let currentAudio = null;

    // ------------------------------------------------------------------
    // Bootstrap
    // ------------------------------------------------------------------
    const student = getStudentFromUrl();
    if (!student) {
      window.location.href = 'index.html';
    }

    const dashboardParams = new URLSearchParams(window.location.search);
    const preselectBookId = dashboardParams.get('book');
    const preselectChapterId = dashboardParams.get('chapter');

    const switcher = document.getElementById('student-switch');
    populateStudentDropdown(switcher, student);

    switcher.addEventListener('change', () => {
      const value = switcher.value;
      if (value === ADD_NEW_SENTINEL) {
        handleStudentDropdownChange(switcher);
        return;
      }
      if (value && value !== student) {
        navigateToDashboard(value);
      }
    });

    // ------------------------------------------------------------------
    // Helpers (level per word, exclusion)
    // ------------------------------------------------------------------
    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'L0';
    }

    function isWordExcluded(wordId) {
      return studentExcluded.includes(wordId);
    }

    function computeLevelCounts(vocabArray) {
      const counts = { L0: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    function computePoolCounts(vocabArray) {
      const counts = { L0: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        if (isWordExcluded(word.id)) return;
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    function getAllVocabForCurrentBook() {
      const all = [];
      const vocabByChapter = bookVocab[currentBookId] || {};
      Object.values(vocabByChapter).forEach(list => all.push(...list));
      return all;
    }

    // ------------------------------------------------------------------
    // Data loaders
    // ------------------------------------------------------------------
    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        if (doc.exists) {
          studentProgress = doc.data().progress || {};
          studentExcluded = doc.data().excluded || [];
          console.log('Loaded progress for ' + student + ':',
                      Object.keys(studentProgress).length, 'entries;',
                      studentExcluded.length, 'excluded');
        } else {
          studentProgress = {};
          studentExcluded = [];
          console.log('No progress doc for ' + student + ' - all words default to L0.');
        }
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
        studentExcluded = [];
      }
    }

    async function loadBooksIndex() {
      try {
        const response = await fetch('data/books-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        allBooks = data.books || [];
        allBooks.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
        console.log('Loaded books-index: ' + allBooks.length + ' book(s).');
      } catch (err) {
        console.error('Error loading books-index.json:', err);
        allBooks = [];
      }
    }

    async function loadChaptersIndexForBook(bookId) {
      try {
        const response = await fetch('data/book' + bookId + '/chapters-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        bookChapters[bookId] = data.chapters || [];
        console.log('Loaded chapters-index for book ' + bookId + ': ' + bookChapters[bookId].length + ' chapter(s).');
      } catch (err) {
        console.warn('No chapters-index for book ' + bookId + ' (or fetch failed):', err.message);
        bookChapters[bookId] = [];
      }
    }

    async function loadAllChapterVocabForBook(bookId) {
      const chapters = bookChapters[bookId] || [];
      bookVocab[bookId] = {};
      for (const ch of chapters) {
        try {
          const response = await fetch('data/book' + bookId + '/chapter' + ch.id + '.json');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          bookVocab[bookId][ch.id] = data.vocab || [];
        } catch (err) {
          console.error('Error loading book ' + bookId + ' chapter ' + ch.id + ':', err);
          bookVocab[bookId][ch.id] = [];
        }
      }
    }

    // ------------------------------------------------------------------
    // Toast notifications
    // ------------------------------------------------------------------
    let toastTimer = null;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'success') + ' visible';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('visible'); }, 1500);
    }

    // ------------------------------------------------------------------
    // Firestore write helpers
    // ------------------------------------------------------------------
    async function updateWordLevel(wordId, newLevel, selectEl, oldLevel) {
      try {
        const update = {
          progress: { [wordId]: newLevel },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentProgress[wordId] = newLevel;
        applyLevelClass(selectEl, newLevel);
        refreshCountsAfterChange();
        showToast('Saved', 'success');
        console.log('Updated ' + wordId + ' from ' + oldLevel + ' to ' + newLevel);
      } catch (err) {
        console.error('Failed to update level:', err);
        selectEl.value = oldLevel;
        applyLevelClass(selectEl, oldLevel);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateWordExclusion(wordId, includeInPool, checkboxEl) {
      try {
        const update = { lastUpdated: firebase.firestore.FieldValue.serverTimestamp() };
        if (includeInPool) {
          update.excluded = firebase.firestore.FieldValue.arrayRemove(wordId);
        } else {
          update.excluded = firebase.firestore.FieldValue.arrayUnion(wordId);
        }
        await db.collection('students').doc(student).set(update, { merge: true });
        if (includeInPool) {
          studentExcluded = studentExcluded.filter(id => id !== wordId);
        } else {
          if (!studentExcluded.includes(wordId)) studentExcluded.push(wordId);
        }
        refreshPoolCountsForCurrentChapter();
        renderCrossChapterPool();
        showToast('Saved', 'success');
      } catch (err) {
        console.error('Failed to update exclusion:', err);
        checkboxEl.checked = !includeInPool;
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function includeAllInPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;
      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayRemove(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentExcluded = studentExcluded.filter(id => !wordIds.includes(id));
        document.querySelectorAll('.vocab-table input[type="checkbox"]').forEach(cb => cb.checked = true);
        refreshPoolCountsForCurrentChapter();
        renderCrossChapterPool();
        showToast('All words included in practice', 'success');
      } catch (err) {
        console.error('Failed to include all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function excludeAllFromPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;
      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayUnion(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => { if (!studentExcluded.includes(id)) studentExcluded.push(id); });
        document.querySelectorAll('.vocab-table input[type="checkbox"]').forEach(cb => cb.checked = false);
        refreshPoolCountsForCurrentChapter();
        renderCrossChapterPool();
        showToast('All words excluded from practice', 'success');
      } catch (err) {
        console.error('Failed to exclude all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    function applyLevelClass(selectEl, level) {
      LEVEL_ORDER.forEach(l => selectEl.classList.remove('level-' + l));
      selectEl.classList.add('level-' + level);
      selectEl.style.display = 'none';
      selectEl.offsetHeight;
      selectEl.style.display = '';
    }

    // ------------------------------------------------------------------
    // Refresh helpers
    // ------------------------------------------------------------------
    function refreshCountsAfterChange() {
      renderOverallProgress();
      renderCrossChapterPool();
      renderChapterList();
      if (currentChapterId) {
        refreshPoolCountsForCurrentChapter();
      }
    }

    function refreshPoolCountsForCurrentChapter() {
      if (!currentChapterId) return;
      const vocab = (bookVocab[currentBookId] || {})[currentChapterId] || [];
      const counts = computePoolCounts(vocab);
      document.querySelectorAll('.right-panel .pool-btn').forEach(btn => {
        const sourceLevel = btn.dataset.sourceLevel;
        const targetLevel = btn.dataset.targetLevel;
        if (!sourceLevel || !targetLevel) return;
        btn.textContent = sourceLevel + '\u2192' + targetLevel + ' (' + counts[sourceLevel] + ')';
      });
    }

    // ------------------------------------------------------------------
    // Left panel: Books list
    // ------------------------------------------------------------------
    function renderBooksList() {
      const listEl = document.getElementById('books-list');
      listEl.innerHTML = '';
      if (allBooks.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No books registered yet.</li>';
        return;
      }
      allBooks.forEach(book => {
        const li = document.createElement('li');
        li.dataset.bookId = book.id;
        li.textContent = book.title;
        if (book.id === currentBookId) li.classList.add('selected');
        li.addEventListener('click', () => selectBook(book.id));
        listEl.appendChild(li);
      });
    }

    // ------------------------------------------------------------------
    // Book selection
    // ------------------------------------------------------------------
    async function selectBook(bookId) {
      currentBookId = bookId;
      currentChapterId = null;

      document.querySelectorAll('#books-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.bookId === bookId);
      });

      if (!bookChapters[bookId]) {
        await loadChaptersIndexForBook(bookId);
      }
      if (!bookVocab[bookId]) {
        await loadAllChapterVocabForBook(bookId);
      }

      renderBookContent();
      renderRightPanelEmpty();

      const chapters = bookChapters[bookId] || [];
      let chapterToSelect = null;

      if (preselectChapterId) {
        const found = chapters.find(c => c.id === preselectChapterId);
        if (found) {
          chapterToSelect = found;
          console.log('Auto-selected chapter from URL:', preselectChapterId);
        } else {
          console.log('URL chapter param "' + preselectChapterId + '" not valid for book ' + bookId + '; falling back to first chapter.');
        }
      }

      if (!chapterToSelect && chapters.length > 0) {
        chapterToSelect = chapters[0];
        console.log('Auto-selected first chapter of book ' + bookId + ':', chapterToSelect.id);
      }

      if (chapterToSelect) {
        selectChapter(chapterToSelect);
      }
    }

    // ------------------------------------------------------------------
    // Middle panel: Book content
    // ------------------------------------------------------------------
    function renderBookContent() {
      const container = document.getElementById('book-content');
      container.innerHTML = '';

      const chapters = bookChapters[currentBookId] || [];

      if (chapters.length === 0) {
        const msg = document.createElement('p');
        msg.className = 'empty-message';
        msg.textContent = 'No chapters yet in this book. Author your first chapter using the pipeline (see Content Authoring Guide).';
        container.appendChild(msg);
        return;
      }

      const progressHeading = document.createElement('h2');
      progressHeading.textContent = 'Overall Progress';
      container.appendChild(progressHeading);

      const progressSummary = document.createElement('div');
      progressSummary.id = 'progress-summary';
      progressSummary.className = 'progress-summary';
      container.appendChild(progressSummary);
      renderOverallProgress();

      const crossPoolContainer = document.createElement('div');
      crossPoolContainer.id = 'cross-chapter-pool';
      crossPoolContainer.className = 'cross-chapter-pool';
      container.appendChild(crossPoolContainer);
      renderCrossChapterPool();

      const chaptersHeading = document.createElement('h2');
      chaptersHeading.textContent = 'Chapters';
      container.appendChild(chaptersHeading);

      const chapterList = document.createElement('ul');
      chapterList.id = 'chapter-list';
      chapterList.className = 'chapter-list';
      container.appendChild(chapterList);
      renderChapterList();
    }

    function renderOverallProgress() {
      const summaryEl = document.getElementById('progress-summary');
      if (!summaryEl) return;

      const allVocab = getAllVocabForCurrentBook();
      const total = allVocab.length;
      const counts = computeLevelCounts(allVocab);

      summaryEl.innerHTML = '';
      const totalLine = document.createElement('div');
      totalLine.className = 'total-line';
      totalLine.textContent = 'Total: ' + total + ' words';
      summaryEl.appendChild(totalLine);

      LEVEL_ORDER.forEach(level => {
        const line = document.createElement('div');
        const meta = LEVEL_META[level];
        line.textContent = meta.emoji + ' ' + meta.label + ': ' + counts[level];
        summaryEl.appendChild(line);
      });
    }

    function renderCrossChapterPool() {
      const containerEl = document.getElementById('cross-chapter-pool');
      if (!containerEl) return;
      containerEl.innerHTML = '';

      const allVocab = getAllVocabForCurrentBook();
      if (allVocab.length === 0) return;

      const counts = computePoolCounts(allVocab);

      const label = document.createElement('div');
      label.className = 'cross-chapter-pool-label';
      label.textContent = 'Practice across all chapters:';
      containerEl.appendChild(label);

      const btnRow = document.createElement('div');
      btnRow.className = 'cross-chapter-pool-buttons';

      const CROSS_POOL = [
        { label: 'L0\u2192L1', sourceLevel: 'L0', targetLevel: 'L1' },
        { label: 'L1\u2192L2', sourceLevel: 'L1', targetLevel: 'L2' },
        { label: 'L2\u2192L3', sourceLevel: 'L2', targetLevel: 'L3' },
        { label: 'L3\u2192L4', sourceLevel: 'L3', targetLevel: 'L4' },
      ];

      CROSS_POOL.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'cross-pool-btn';
        btn.dataset.sourceLevel = cfg.sourceLevel;
        btn.dataset.targetLevel = cfg.targetLevel;
        btn.textContent = cfg.label + ' (' + counts[cfg.sourceLevel] + ')';
        btn.addEventListener('click', () => handleCrossPoolClick(cfg.targetLevel));
        btnRow.appendChild(btn);
      });

      containerEl.appendChild(btnRow);
    }

    function handleCrossPoolClick(targetLevel) {
      window.location.href = 'exercise.html?level=' + targetLevel +
        '&book=' + encodeURIComponent(currentBookId) +
        '&chapter=all&student=' + encodeURIComponent(student);
    }

    function renderChapterList() {
      const listEl = document.getElementById('chapter-list');
      if (!listEl) return;
      listEl.innerHTML = '';

      const chapters = bookChapters[currentBookId] || [];
      if (chapters.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No chapters yet.</li>';
        return;
      }

      chapters.forEach(ch => {
        const vocab = (bookVocab[currentBookId] || {})[ch.id] || [];
        const counts = computeLevelCounts(vocab);

        const li = document.createElement('li');
        li.dataset.chapterId = ch.id;
        if (ch.id === currentChapterId) li.classList.add('selected');

        const title = document.createElement('span');
        title.className = 'chapter-title';
        title.textContent = 'Chapter ' + ch.id + ': ' + ch.title;

        const meta = document.createElement('span');
        meta.className = 'chapter-meta';
        meta.textContent = ch.wordCount + ' words';

        const levelCounts = document.createElement('span');
        levelCounts.className = 'chapter-level-counts';
        levelCounts.textContent = LEVEL_ORDER.map(l => LEVEL_META[l].emoji + ' ' + counts[l]).join('  ');

        li.appendChild(title);
        li.appendChild(meta);
        li.appendChild(levelCounts);
        li.addEventListener('click', () => selectChapter(ch));

        listEl.appendChild(li);
      });
    }

    // ------------------------------------------------------------------
    // Right panel: Chapter detail
    // ------------------------------------------------------------------
    function renderRightPanelEmpty() {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '<p class="empty-message">Select a chapter from the middle panel to view its details.</p>';
    }

    function selectChapter(chapter) {
      currentChapterId = chapter.id;
      document.querySelectorAll('#chapter-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.chapterId === chapter.id);
      });
      renderChapterDetail({
        chapterId: chapter.id,
        chapterTitle: chapter.title,
        vocab: (bookVocab[currentBookId] || {})[chapter.id] || [],
      });
    }

    function handlePracticePoolClick(targetLevel, chapterId) {
      window.location.href = 'exercise.html?level=' + targetLevel +
        '&book=' + encodeURIComponent(currentBookId) +
        '&chapter=' + encodeURIComponent(chapterId) +
        '&student=' + encodeURIComponent(student);
    }

    function renderChapterDetail(chapterData) {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '';

      const header = document.createElement('div');
      header.className = 'chapter-header';

      const h2 = document.createElement('h2');
      h2.textContent = 'Chapter ' + chapterData.chapterId + ': ' + chapterData.chapterTitle;
      header.appendChild(h2);

      const passagesLink = document.createElement('a');
      passagesLink.className = 'show-passages-link';
      passagesLink.textContent = '📖 Show Passages';
      passagesLink.href = 'passages.html?book=' + encodeURIComponent(currentBookId) +
                          '&chapter=' + encodeURIComponent(chapterData.chapterId) +
                          '&student=' + encodeURIComponent(student);
      header.appendChild(passagesLink);

      rightEl.appendChild(header);

      const chapterCounts = computePoolCounts(chapterData.vocab);
      const practicePool = document.createElement('div');
      practicePool.className = 'practice-pool';

      const label = document.createElement('div');
      label.className = 'practice-pool-label';
      label.textContent = 'Practice Pool:';
      practicePool.appendChild(label);

      const btnRow = document.createElement('div');
      btnRow.className = 'practice-pool-buttons';

      const POOL_BUTTONS = [
        { label: 'L0\u2192L1', sourceLevel: 'L0', targetLevel: 'L1' },
        { label: 'L1\u2192L2', sourceLevel: 'L1', targetLevel: 'L2' },
        { label: 'L2\u2192L3', sourceLevel: 'L2', targetLevel: 'L3' },
        { label: 'L3\u2192L4', sourceLevel: 'L3', targetLevel: 'L4' },
      ];

      POOL_BUTTONS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'pool-btn';
        btn.dataset.sourceLevel = cfg.sourceLevel;
        btn.dataset.targetLevel = cfg.targetLevel;
        btn.textContent = cfg.label + ' (' + chapterCounts[cfg.sourceLevel] + ')';
        btn.addEventListener('click', () => handlePracticePoolClick(cfg.targetLevel, chapterData.chapterId));
        btnRow.appendChild(btn);
      });

      practicePool.appendChild(btnRow);
      rightEl.appendChild(practicePool);

      // Master toggles
      const masterToggle = document.createElement('div');
      masterToggle.className = 'master-toggle';

      const showAllBtn = document.createElement('button');
      showAllBtn.textContent = 'Show all details';
      showAllBtn.addEventListener('click', expandAll);

      const hideAllBtn = document.createElement('button');
      hideAllBtn.textContent = 'Hide all details';
      hideAllBtn.addEventListener('click', collapseAll);

      const includeAllBtn = document.createElement('button');
      includeAllBtn.textContent = 'Include all in practice';
      includeAllBtn.addEventListener('click', () => includeAllInPractice(chapterData.vocab));

      const excludeAllBtn = document.createElement('button');
      excludeAllBtn.textContent = 'Exclude all from practice';
      excludeAllBtn.addEventListener('click', () => excludeAllFromPractice(chapterData.vocab));

      masterToggle.appendChild(showAllBtn);
      masterToggle.appendChild(hideAllBtn);
      masterToggle.appendChild(includeAllBtn);
      masterToggle.appendChild(excludeAllBtn);
      rightEl.appendChild(masterToggle);

      // Vocab table
      const table = document.createElement('table');
      table.className = 'vocab-table';

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Word', 'Level', 'Practice', 'Details', 'Audio (M)', 'Audio (C)'].forEach(text => {
        const th = document.createElement('th');
        th.textContent = text;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      chapterData.vocab.forEach(word => {
        const row = document.createElement('tr');
        row.dataset.wordId = word.id;

        const tdWord = document.createElement('td');
        tdWord.className = 'vocab-word';
        tdWord.textContent = word.traditional;
        row.appendChild(tdWord);

        // Level dropdown
        const tdLevel = document.createElement('td');
        const select = document.createElement('select');
        select.className = 'level-select';
        select.dataset.wordId = word.id;
        LEVEL_ORDER.forEach(level => {
          const opt = document.createElement('option');
          opt.value = level;
          opt.textContent = LEVEL_META[level].emoji + ' ' + LEVEL_META[level].label;
          select.appendChild(opt);
        });
        const initialLevel = getLevelForWord(word.id);
        select.value = initialLevel;
        applyLevelClass(select, initialLevel);
        select.addEventListener('change', () => {
          const oldLevel = getLevelForWord(word.id);
          const newLevel = select.value;
          if (newLevel === oldLevel) return;
          updateWordLevel(word.id, newLevel, select, oldLevel);
        });
        tdLevel.appendChild(select);
        row.appendChild(tdLevel);

        // Practice checkbox
        const tdPractice = document.createElement('td');
        const practiceCheckbox = document.createElement('input');
        practiceCheckbox.type = 'checkbox';
        practiceCheckbox.checked = !isWordExcluded(word.id);
        practiceCheckbox.dataset.wordId = word.id;
        practiceCheckbox.title = 'Include in practice pool';
        practiceCheckbox.addEventListener('change', () => {
          updateWordExclusion(word.id, practiceCheckbox.checked, practiceCheckbox);
        });
        tdPractice.appendChild(practiceCheckbox);
        row.appendChild(tdPractice);

        // Details button
        const tdDetails = document.createElement('td');
        const detailsBtn = document.createElement('button');
        detailsBtn.className = 'details-btn';
        detailsBtn.textContent = '👁 Details';
        detailsBtn.addEventListener('click', () => toggleRowDetails(word.id, detailsBtn));
        tdDetails.appendChild(detailsBtn);
        row.appendChild(tdDetails);

        // Audio (M)
        const tdAudioM = document.createElement('td');
        const audioMBtn = document.createElement('button');
        audioMBtn.className = 'audio-btn';
        audioMBtn.textContent = '🔊';
        audioMBtn.title = 'Play Mandarin (isolated)';
        const mandarinPath = word.audio && word.audio.mandarin ? word.audio.mandarin.isolated : null;
        if (!mandarinPath) audioMBtn.disabled = true;
        audioMBtn.addEventListener('click', () => playAudio(mandarinPath));
        tdAudioM.appendChild(audioMBtn);
        row.appendChild(tdAudioM);

        // Audio (C)
        const tdAudioC = document.createElement('td');
        const audioCBtn = document.createElement('button');
        audioCBtn.className = 'audio-btn';
        audioCBtn.textContent = '🔊';
        audioCBtn.title = 'Play Cantonese (isolated)';
        const cantonesePath = word.audio && word.audio.cantonese ? word.audio.cantonese.isolated : null;
        if (!cantonesePath) audioCBtn.disabled = true;
        audioCBtn.addEventListener('click', () => playAudio(cantonesePath));
        tdAudioC.appendChild(audioCBtn);
        row.appendChild(tdAudioC);

        tbody.appendChild(row);

        // Details row (hidden, with Traditional + Simplified)
        const detailsRow = document.createElement('tr');
        detailsRow.className = 'details-row';
        detailsRow.dataset.wordId = word.id;
        detailsRow.id = 'details-' + word.id;

        const detailsCell = document.createElement('td');
        detailsCell.colSpan = 6;

        const detailsContent = document.createElement('div');
        detailsContent.className = 'details-content';

        const dl = document.createElement('dl');
        const items = [
          ['Traditional', word.traditional],
          ['Simplified', word.simplified || '(not generated)'],
          ['Pinyin', word.pinyin || ''],
          ['English', word.english || ''],
          ['Context (Trad.)', word.contextSentence || '(none)'],
          ['Context (Simp.)', word.contextSentenceSimplified || '(not generated)'],
        ];
        items.forEach(([itemLabel, itemValue]) => {
          const dt = document.createElement('dt');
          dt.textContent = itemLabel;
          const dd = document.createElement('dd');
          dd.textContent = itemValue;
          dl.appendChild(dt);
          dl.appendChild(dd);
        });

        detailsContent.appendChild(dl);
        detailsCell.appendChild(detailsContent);
        detailsRow.appendChild(detailsCell);
        tbody.appendChild(detailsRow);
      });

      table.appendChild(tbody);
      rightEl.appendChild(table);

      console.log('Rendered book ' + currentBookId + ' chapter ' + chapterData.chapterId + ' with ' + chapterData.vocab.length + ' words.');
    }

    // ------------------------------------------------------------------
    // Row toggles + audio
    // ------------------------------------------------------------------
    function toggleRowDetails(wordId, button) {
      const detailsRow = document.getElementById('details-' + wordId);
      if (!detailsRow) return;
      const isExpanded = detailsRow.classList.contains('expanded');
      if (isExpanded) {
        detailsRow.classList.remove('expanded');
        button.textContent = '👁 Details';
      } else {
        detailsRow.classList.add('expanded');
        button.textContent = '🙈 Hide';
      }
    }

    function expandAll() {
      document.querySelectorAll('.details-row').forEach(row => row.classList.add('expanded'));
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '🙈 Hide');
    }

    function collapseAll() {
      document.querySelectorAll('.details-row').forEach(row => row.classList.remove('expanded'));
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '👁 Details');
    }

    function playAudio(audioPath) {
      if (!audioPath) {
        console.warn('No audio path provided');
        return;
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = new Audio(audioPath);
      currentAudio.play().catch(err => console.error('Audio playback failed:', err));
    }

    // ------------------------------------------------------------------
    // Main init
    // ------------------------------------------------------------------
    async function init() {
      try {
        await loadStudentProgress();
        await loadBooksIndex();

        renderBooksList();

        if (allBooks.length === 0) {
          document.getElementById('book-content').innerHTML =
            '<p class="empty-message">No books registered. See Content Authoring Guide Section 2.</p>';
          return;
        }

        let targetBookId = null;
        if (preselectBookId) {
          const found = allBooks.find(b => b.id === preselectBookId);
          if (found) {
            targetBookId = preselectBookId;
            console.log('Auto-selected book from URL:', preselectBookId);
          } else {
            console.log('URL book param "' + preselectBookId + '" not valid; falling back to first book.');
          }
        }
        if (!targetBookId) {
          targetBookId = allBooks[0].id;
          console.log('Auto-selected first book:', targetBookId);
        }

        await selectBook(targetBookId);

      } catch (err) {
        console.error('Initialization error:', err);
      }
    }

    init();
  </script>

</body>
</html>
