<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Dashboard - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    /* ---------- Base ---------- */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: #EDE3D0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1E3A5F;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Top bar ---------- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: #1E3A5F;
      color: #F5EFE6;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .top-bar-brand img {
      height: 32px;
      width: 32px;
      border-radius: 6px;
    }
    .top-bar-brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #F5EFE6;
      letter-spacing: -0.01em;
    }
    .student-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .student-switcher label {
      color: rgba(245, 239, 230, 0.85);
      font-size: 13px;
    }
    .student-switcher select {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(245, 239, 230, 0.3);
      background-color: rgba(245, 239, 230, 0.08);
      color: #F5EFE6;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .student-switcher select option {
      background-color: #F5EFE6;
      color: #1E3A5F;
    }

    /* ---------- Main body: single unified card ---------- */
    .main-card {
      background-color: #F5EFE6;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(30, 58, 95, 0.06), 0 4px 12px rgba(30, 58, 95, 0.04);
      border: 1px solid rgba(30, 58, 95, 0.08);
      margin: 20px;
      display: grid;
      grid-template-columns: 240px 340px 1fr;
      min-height: calc(100vh - 100px);
      overflow: hidden;
    }
    .left-panel, .middle-panel, .right-panel {
      overflow: visible;
      padding: 20px;
    }
    .left-panel, .middle-panel {
      border-right: 1px solid rgba(30, 58, 95, 0.12);
    }

    /* ---------- Panel headings ---------- */
    .panel-heading {
      font-size: 12px;
      font-weight: 700;
      color: rgba(30, 58, 95, 0.65);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin: 0 0 12px 0;
    }
    .panel-heading:not(:first-of-type) {
      margin-top: 24px;
    }

    /* ---------- Left panel: Books ---------- */
    .series-heading {
      font-size: 10px;
      font-weight: 700;
      color: rgba(30, 58, 95, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin: 16px 0 6px 0;
      padding-left: 8px;
    }
    .series-heading:first-child { margin-top: 0; }
    .books-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .books-list li {
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 3px;
      font-size: 14px;
      color: #1E3A5F;
      transition: background-color 0.15s;
    }
    .books-list li:hover {
      background-color: rgba(30, 58, 95, 0.06);
    }
    .books-list li.selected {
      background-color: rgba(30, 58, 95, 0.12);
      font-weight: 600;
    }

    /* ---------- Middle panel: overall progress ---------- */
    .progress-summary {
      font-size: 13px;
      line-height: 1.9;
    }
    .progress-summary .total-line {
      font-weight: 600;
      color: #1E3A5F;
      margin-bottom: 6px;
    }
    .progress-summary .progress-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(30, 58, 95, 0.85);
    }
    .progress-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .progress-dot.L0 { background-color: #DB5858; }
    .progress-dot.L1 { background-color: #FA961B; }
    .progress-dot.L2 { background-color: #EFBE4A; }
    .progress-dot.L3 { background-color: #7BC780; }
    .progress-dot.L4 { background-color: #5A9AD6; }
    .review-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(30, 58, 95, 0.85);
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed rgba(30, 58, 95, 0.15);
    }

    /* ---------- Cross-chapter pool ---------- */
    .cross-chapter-pool {
      margin-top: 20px;
    }
    .cross-chapter-pool-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(30, 58, 95, 0.75);
      margin-bottom: 8px;
    }
    .cross-chapter-pool-buttons,
    .practice-pool-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .cross-pool-btn,
    .pool-btn {
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.15s;
      border: 1px solid;
    }
    .cross-pool-btn:hover,
    .pool-btn:hover { opacity: 0.85; }
    .cross-pool-btn.source-L0, .pool-btn.source-L0 { background-color: #FDECEC; border-color: #DB5858; color: #DB5858; }
    .cross-pool-btn.source-L1, .pool-btn.source-L1 { background-color: #FEF3E4; border-color: #FA961B; color: #FA961B; }
    .cross-pool-btn.source-L2, .pool-btn.source-L2 { background-color: #FEF9E4; border-color: #EFBE4A; color: #C4952A; }
    .cross-pool-btn.source-L3, .pool-btn.source-L3 { background-color: #EAF6EC; border-color: #7BC780; color: #4E9E5A; }
    .cross-pool-btn.source-L4, .pool-btn.source-L4 { background-color: #E5EFF7; border-color: #5A9AD6; color: #5A9AD6; }

    /* ---------- Chapter list ---------- */
    .chapter-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .chapter-list li {
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 4px;
      color: #1E3A5F;
      transition: background-color 0.15s;
    }
    .chapter-list li:hover { background-color: rgba(30, 58, 95, 0.06); }
    .chapter-list li.selected {
      background-color: rgba(30, 58, 95, 0.12);
      font-weight: 600;
    }
    .chapter-title {
      display: block;
      font-size: 13px;
    }
    .chapter-meta {
      display: block;
      font-size: 11px;
      color: rgba(30, 58, 95, 0.65);
      margin-top: 2px;
    }
    .chapter-level-counts {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 8px;
      font-size: 11px;
      color: rgba(30, 58, 95, 0.75);
      margin-top: 4px;
    }
    .chapter-level-count-item {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    /* ---------- Right panel ---------- */
    .right-panel {
      padding: 0;
    }
    .empty-message {
      color: rgba(30, 58, 95, 0.55);
      font-style: italic;
      padding: 20px;
    }

    /* ---------- Right panel content wrapper ---------- */
    .right-panel-inner {
      padding: 20px;
    }

    /* ---------- Sticky right-panel top ---------- */
    .right-sticky-top {
      background-color: #F5EFE6;
      padding: 20px 20px 12px 20px;
    }

    /* ---------- Chapter header ---------- */
    .chapter-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .chapter-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #1E3A5F;
      letter-spacing: -0.01em;
    }
    .show-passages-link {
      font-size: 13px;
      text-decoration: none;
      color: #5A9AD6;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #5A9AD6;
      background-color: rgba(90, 154, 214, 0.08);
      font-weight: 500;
      transition: background-color 0.15s;
    }
    .show-passages-link:hover { background-color: rgba(90, 154, 214, 0.18); }

    /* ---------- Practice pool ---------- */
    .practice-pool {
      margin-bottom: 14px;
    }
    .practice-pool-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(30, 58, 95, 0.65);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    /* ---------- Bulk action bar ---------- */
    .bulk-action-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      padding: 10px 12px;
      background-color: rgba(30, 58, 95, 0.04);
      border-radius: 8px;
    }
    .bulk-action-label {
      font-size: 12px;
      color: rgba(30, 58, 95, 0.75);
      font-weight: 600;
      margin-right: 4px;
    }
    .bulk-btn {
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid;
      transition: opacity 0.15s;
    }
    .bulk-btn:hover { opacity: 0.88; }
    .bulk-btn.level-L0 { background-color: #FDECEC; border-color: #DB5858; color: #DB5858; }
    .bulk-btn.level-L1 { background-color: #FEF3E4; border-color: #FA961B; color: #FA961B; }
    .bulk-btn.level-L2 { background-color: #FEF9E4; border-color: #EFBE4A; color: #C4952A; }
    .bulk-btn.level-L3 { background-color: #EAF6EC; border-color: #7BC780; color: #4E9E5A; }
    .bulk-btn.level-L4 { background-color: #E5EFF7; border-color: #5A9AD6; color: #5A9AD6; }
    .bulk-btn.review {
      background-color: rgba(30, 58, 95, 0.06);
      border-color: rgba(30, 58, 95, 0.3);
      color: #1E3A5F;
    }

    /* ---------- Vocab table ---------- */
    .vocab-table-wrapper {
      padding: 0 20px 20px 20px;
    }
    .vocab-table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }
    .vocab-table th, .vocab-table td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(30, 58, 95, 0.1);
      vertical-align: middle;
      box-sizing: border-box;
    }
    .vocab-table tbody td {
      background-color: #FAF6EE;
    }
    .vocab-table thead tr:not(.filter-row) th {
      background-color: rgba(30, 58, 95, 0.08);
      font-weight: 700;
      font-size: 11px;
      color: rgba(30, 58, 95, 0.75);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .vocab-table thead tr:not(.filter-row) th:first-child,
    .vocab-table thead tr:not(.filter-row) th:last-child {
      text-align: left;
    }
    .vocab-table thead tr.filter-row td {
      background-color: rgba(30, 58, 95, 0.05);
      padding: 8px 12px;
      border-bottom: 1px solid rgba(30, 58, 95, 0.12);
    }
    .vocab-table col.col-word, .vocab-table th:nth-child(1), .vocab-table td.col-word,
      .vocab-table tr.filter-row td:nth-child(1) { width: 200px; }
    .vocab-table col.col-level, .vocab-table th:nth-child(2), .vocab-table td.col-level,
      .vocab-table tr.filter-row td:nth-child(2) { width: 150px; text-align: center; }
    .vocab-table col.col-practice, .vocab-table th:nth-child(3), .vocab-table td.col-practice,
      .vocab-table tr.filter-row td:nth-child(3) { width: 100px; text-align: center; }
    .vocab-table col.col-details, .vocab-table th:nth-child(4), .vocab-table td.col-details,
      .vocab-table tr.filter-row td:nth-child(4) { width: 150px; text-align: center; }
    .vocab-table col.col-audio-m, .vocab-table th:nth-child(5), .vocab-table td.col-audio-m,
      .vocab-table tr.filter-row td:nth-child(5) { width: 100px; text-align: center; }
    .vocab-table col.col-audio-c, .vocab-table th:nth-child(6), .vocab-table td.col-audio-c,
      .vocab-table tr.filter-row td:nth-child(6) { width: 100px; text-align: center; }
    .vocab-table col.col-reviewed, .vocab-table th:nth-child(7), .vocab-table td.col-reviewed,
      .vocab-table tr.filter-row td:nth-child(7) { width: 140px; text-align: center; }
    .vocab-table th:nth-child(8), .vocab-table td.col-comment,
      .vocab-table tr.filter-row td:nth-child(8) { width: auto; min-width: 140px; }

    .vocab-word {
      font-size: 18px;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
      color: #1E3A5F;
    }

    /* ---------- Filter dropdowns ---------- */
    .filter-select {
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid rgba(30, 58, 95, 0.2);
      border-radius: 6px;
      background: #F5EFE6;
      cursor: pointer;
      color: #1E3A5F;
      font-family: inherit;
    }
    .filter-select:focus { outline: 2px solid rgba(30, 58, 95, 0.3); outline-offset: 1px; }
    .clear-filters-btn {
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid rgba(30, 58, 95, 0.2);
      border-radius: 6px;
      background-color: #F5EFE6;
      cursor: pointer;
      font-family: inherit;
      color: #1E3A5F;
    }
    .clear-filters-btn:hover { background-color: rgba(30, 58, 95, 0.06); }

    /* ---------- Level dropdown pills ---------- */
    .level-select {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(30, 58, 95, 0.15);
      cursor: pointer;
      font-family: inherit;
      background-color: rgba(30, 58, 95, 0.08);
      color: #333;
      appearance: menulist;
      font-weight: 500;
    }
    .level-select:focus { outline: 2px solid rgba(30, 58, 95, 0.3); outline-offset: 1px; }
    .level-select.level-L0 { background-color: #FDECEC; color: #DB5858; }
    .level-select.level-L1 { background-color: #FEF3E4; color: #FA961B; }
    .level-select.level-L2 { background-color: #FEF9E4; color: #C4952A; }
    .level-select.level-L3 { background-color: #EAF6EC; color: #4E9E5A; }
    .level-select.level-L4 { background-color: #E5EFF7; color: #5A9AD6; }

    /* ---------- Small buttons ---------- */
    .details-btn, .audio-btn {
      cursor: pointer;
      background: transparent;
      border: 1px solid rgba(30, 58, 95, 0.2);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: #1E3A5F;
      font-family: inherit;
      transition: background-color 0.15s;
    }
    .details-btn:hover, .audio-btn:hover:not(:disabled) {
      background-color: rgba(30, 58, 95, 0.06);
    }
    .details-btn:disabled, .audio-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ---------- Details expansion row ---------- */
    .details-row { display: none; }
    .details-row.expanded { display: table-row; }
    .details-row td {
      padding: 16px 20px !important;
      background-color: #EFE6D3 !important;
      border-bottom: 1px solid rgba(30, 58, 95, 0.1);
    }
    .details-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .details-header-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 6px 16px;
      font-size: 14px;
    }
    .details-header-row dt { font-weight: 700; color: rgba(30, 58, 95, 0.75); margin: 0; }
    .details-header-row dd { margin: 0; color: #1E3A5F; }

    .details-compare-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      border-top: 1px solid rgba(30, 58, 95, 0.15);
      padding-top: 14px;
    }
    .details-compare-col h4 {
      margin: 0 0 6px 0;
      font-size: 11px;
      color: rgba(30, 58, 95, 0.65);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }
    .details-compare-col .compare-word {
      font-size: 18px;
      color: #1E3A5F;
      margin-bottom: 8px;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
    }
    .details-compare-col .compare-sentence {
      font-size: 14px;
      color: rgba(30, 58, 95, 0.85);
      line-height: 1.7;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
    }

    .details-sentence-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-top: 1px solid rgba(30, 58, 95, 0.15);
      padding-top: 14px;
    }
    .details-sentence-label {
      font-weight: 700;
      color: rgba(30, 58, 95, 0.75);
      font-size: 14px;
      padding-top: 8px;
      white-space: nowrap;
    }
    .own-sentence-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid rgba(30, 58, 95, 0.2);
      border-radius: 6px;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      resize: none;
      overflow: hidden;
      min-height: 36px;
      line-height: 1.5;
      background-color: #F5EFE6;
      color: #1E3A5F;
    }
    .own-sentence-input:disabled {
      background-color: rgba(30, 58, 95, 0.04);
      color: rgba(30, 58, 95, 0.55);
      cursor: not-allowed;
    }

    .comment-input {
      width: 100%;
      padding: 4px 8px;
      border: 1px solid rgba(30, 58, 95, 0.2);
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      overflow: hidden;
      min-height: 28px;
      line-height: 1.4;
      background-color: #F5EFE6;
      color: #1E3A5F;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      top: 15px;
      right: 20px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      color: #F5EFE6;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 1000;
      font-weight: 500;
    }
    .toast.visible { opacity: 1; }
    .toast.success { background-color: #155724; }
    .toast.error { background-color: #721C24; }

    .vocab-table td input[type="checkbox"] {
      cursor: pointer;
      transform: scale(1.2);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 1100px) {
      .main-card {
        grid-template-columns: 200px 300px 1fr;
      }
    }
    @media (max-width: 900px) {
      .main-card {
        grid-template-columns: 1fr;
        margin: 12px;
      }
      .left-panel, .middle-panel {
        border-right: none;
        border-bottom: 1px solid rgba(30, 58, 95, 0.12);
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar-brand">
      <img src="favicon.png" alt="" style="height:32px;width:32px;border-radius:6px;">
      <h1>Chinese iGCSE Vocabulary Trainer</h1>
    </div>
    <div class="student-switcher">
      <label for="student-switch">Student:</label>
      <select id="student-switch">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>

  <div class="main-card">

    <div class="left-panel">
      <h2 class="panel-heading">Books</h2>
      <div id="books-list-container">
        <p class="empty-message">Loading books...</p>
      </div>
    </div>

    <div class="middle-panel">
      <div id="book-content">
        <p class="empty-message">Select a book from the left panel to view its chapters.</p>
      </div>
    </div>

    <div class="right-panel">
      <div id="right-panel-content">
        <p class="empty-message">Select a chapter from the middle panel to view its details.</p>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>

  <script>
    // ------------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------------
    const LEVEL_ORDER = ['L0', 'L1', 'L2', 'L3', 'L4'];
    const LEVEL_META = {
      L0: { label: 'L0 Discover' },
      L1: { label: 'L1 Read' },
      L2: { label: 'L2 Listen' },
      L3: { label: 'L3 Usage' },
      L4: { label: 'L4 Write' },
    };
    const REVIEW_LABEL = 'Review';

    // ------------------------------------------------------------------
    // Global state
    // ------------------------------------------------------------------
    let studentProgress = {};
    let studentExcluded = [];
    let studentSentences = {};
    let allBooks = [];
    let currentBookId = null;
    let bookVocab = {};
    let bookChapters = {};
    let currentChapterId = null;
    let currentAudio = null;

    let levelFilter = 'all';
    let reviewFilter = 'all';
    let expandedWordIds = new Set();

    // ------------------------------------------------------------------
    // Bootstrap
    // ------------------------------------------------------------------
    const student = getStudentFromUrl();
    if (!student) {
      window.location.href = 'index.html';
    }

    const dashboardParams = new URLSearchParams(window.location.search);
    const preselectBookId = dashboardParams.get('book');
    const preselectChapterId = dashboardParams.get('chapter');

    const switcher = document.getElementById('student-switch');
    populateStudentDropdown(switcher, student);

    switcher.addEventListener('change', () => {
      const value = switcher.value;
      if (value === ADD_NEW_SENTINEL) {
        handleStudentDropdownChange(switcher);
        return;
      }
      if (value && value !== student) {
        navigateToDashboard(value);
      }
    });

    // ------------------------------------------------------------------
    // Helpers (level, exclusion, review)
    // ------------------------------------------------------------------
    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'L0';
    }

    function isWordExcluded(wordId) {
      return studentExcluded.includes(wordId);
    }

    function getSentenceData(wordId) {
      return studentSentences[wordId] || { text: '', reviewed: false, comment: '' };
    }

    function getReviewStateForWord(wordId) {
      const s = getSentenceData(wordId);
      if (s.reviewed) return 'reviewed';
      if (s.text && s.text.trim().length > 0) return 'awaiting';
      return 'none';
    }

    function computeLevelCounts(vocabArray) {
      const counts = { L0: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    function computePoolCounts(vocabArray) {
      const counts = { L0: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        if (isWordExcluded(word.id)) return;
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    function computeReviewedCount(vocabArray) {
      let count = 0;
      vocabArray.forEach(word => {
        const s = getSentenceData(word.id);
        if (s.reviewed) count++;
      });
      return count;
    }

    function getAllVocabForCurrentBook() {
      const all = [];
      const vocabByChapter = bookVocab[currentBookId] || {};
      Object.values(vocabByChapter).forEach(list => all.push(...list));
      return all;
    }

    function applyFilters(vocab) {
      return vocab.filter(word => {
        if (levelFilter !== 'all' && getLevelForWord(word.id) !== levelFilter) return false;
        if (reviewFilter !== 'all') {
          const state = getReviewStateForWord(word.id);
          if (reviewFilter !== state) return false;
        }
        return true;
      });
    }

    // ------------------------------------------------------------------
    // Data loaders
    // ------------------------------------------------------------------
    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        if (doc.exists) {
          const data = doc.data();
          studentProgress = data.progress || {};
          studentExcluded = data.excluded || [];
          studentSentences = data.sentences || {};
          console.log('Loaded progress for ' + student + ':',
                      Object.keys(studentProgress).length, 'progress entries;',
                      studentExcluded.length, 'excluded;',
                      Object.keys(studentSentences).length, 'sentences.');
        } else {
          studentProgress = {};
          studentExcluded = [];
          studentSentences = {};
          console.log('No progress doc for ' + student + ' - all defaults.');
        }
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
        studentExcluded = [];
        studentSentences = {};
      }
    }

    async function loadBooksIndex() {
      try {
        const response = await fetch('data/books-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        allBooks = data.books || [];
        allBooks.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
        console.log('Loaded books-index: ' + allBooks.length + ' book(s).');
      } catch (err) {
        console.error('Error loading books-index.json:', err);
        allBooks = [];
      }
    }

    async function loadChaptersIndexForBook(bookId) {
      try {
        const response = await fetch('data/book' + bookId + '/chapters-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        bookChapters[bookId] = data.chapters || [];
        console.log('Loaded chapters-index for book ' + bookId + ': ' + bookChapters[bookId].length + ' chapter(s).');
      } catch (err) {
        console.warn('No chapters-index for book ' + bookId + ' (or fetch failed):', err.message);
        bookChapters[bookId] = [];
      }
    }

    async function loadAllChapterVocabForBook(bookId) {
      const chapters = bookChapters[bookId] || [];
      bookVocab[bookId] = {};
      for (const ch of chapters) {
        try {
          const response = await fetch('data/book' + bookId + '/chapter' + ch.id + '.json');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          bookVocab[bookId][ch.id] = data.vocab || [];
        } catch (err) {
          console.error('Error loading book ' + bookId + ' chapter ' + ch.id + ':', err);
          bookVocab[bookId][ch.id] = [];
        }
      }
    }

    // ------------------------------------------------------------------
    // Toast
    // ------------------------------------------------------------------
    let toastTimer = null;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'success') + ' visible';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('visible'); }, 2000);
    }
// ------------------------------------------------------------------
    // Firestore writes
    // ------------------------------------------------------------------
    async function updateWordLevel(wordId, newLevel, selectEl, oldLevel) {
      try {
        const update = {
          progress: { [wordId]: newLevel },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentProgress[wordId] = newLevel;
        applyLevelClass(selectEl, newLevel);
        refreshCountsAfterChange();
        showToast('Saved', 'success');
      } catch (err) {
        console.error('Failed to update level:', err);
        selectEl.value = oldLevel;
        applyLevelClass(selectEl, oldLevel);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateWordExclusion(wordId, includeInPool, checkboxEl) {
      try {
        const update = { lastUpdated: firebase.firestore.FieldValue.serverTimestamp() };
        if (includeInPool) {
          update.excluded = firebase.firestore.FieldValue.arrayRemove(wordId);
        } else {
          update.excluded = firebase.firestore.FieldValue.arrayUnion(wordId);
        }
        await db.collection('students').doc(student).set(update, { merge: true });
        if (includeInPool) {
          studentExcluded = studentExcluded.filter(id => id !== wordId);
        } else {
          if (!studentExcluded.includes(wordId)) studentExcluded.push(wordId);
        }
        refreshPoolCountsForCurrentChapter();
        renderCrossChapterPool();
        showToast('Saved', 'success');
      } catch (err) {
        console.error('Failed to update exclusion:', err);
        checkboxEl.checked = !includeInPool;
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function bulkSetLevel(wordIds, newLevel) {
      if (wordIds.length === 0) return;
      try {
        const progressUpdate = {};
        wordIds.forEach(id => { progressUpdate[id] = newLevel; });
        const update = {
          progress: progressUpdate,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => { studentProgress[id] = newLevel; });
        renderChapterDetailFromCurrent();
        refreshCountsAfterChange();
        showToast(wordIds.length + ' words set to ' + newLevel, 'success');
      } catch (err) {
        console.error('Failed bulk level set:', err);
        showToast('Bulk update failed. Please try again.', 'error');
      }
    }

    async function bulkMarkReviewed(wordIds) {
      if (wordIds.length === 0) return;
      try {
        const sentencesUpdate = {};
        wordIds.forEach(id => {
          const existing = getSentenceData(id);
          sentencesUpdate[id] = {
            text: existing.text || '',
            reviewed: true,
            comment: existing.comment || '',
          };
        });
        const update = {
          sentences: sentencesUpdate,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => {
          const existing = getSentenceData(id);
          studentSentences[id] = { text: existing.text || '', reviewed: true, comment: existing.comment || '' };
        });
        renderChapterDetailFromCurrent();
        refreshCountsAfterChange();
        showToast(wordIds.length + ' words marked reviewed', 'success');
      } catch (err) {
        console.error('Failed bulk mark reviewed:', err);
        showToast('Bulk update failed. Please try again.', 'error');
      }
    }

    async function updateSentence(wordId, newText) {
      try {
        const existing = getSentenceData(wordId);
        const update = {
          sentences: { [wordId]: { text: newText, reviewed: existing.reviewed || false, comment: existing.comment || '' } },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentSentences[wordId] = { text: newText, reviewed: existing.reviewed || false, comment: existing.comment || '' };
        refreshCountsAfterChange();
        showToast('Sentence saved', 'success');
      } catch (err) {
        console.error('Failed to save sentence:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateReviewed(wordId, reviewed, checkboxEl) {
      try {
        const existing = getSentenceData(wordId);
        const update = {
          sentences: { [wordId]: { text: existing.text || '', reviewed: reviewed, comment: existing.comment || '' } },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentSentences[wordId] = { text: existing.text || '', reviewed: reviewed, comment: existing.comment || '' };
        const sentenceInput = document.querySelector('#details-' + wordId + ' .own-sentence-input');
        if (sentenceInput) {
          sentenceInput.disabled = reviewed;
        }
        refreshCountsAfterChange();
        showToast(reviewed ? 'Marked reviewed' : 'Unmarked reviewed', 'success');
      } catch (err) {
        console.error('Failed to update reviewed:', err);
        checkboxEl.checked = !reviewed;
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateComment(wordId, newComment) {
      try {
        const existing = getSentenceData(wordId);
        const update = {
          sentences: { [wordId]: { text: existing.text || '', reviewed: existing.reviewed || false, comment: newComment } },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentSentences[wordId] = { text: existing.text || '', reviewed: existing.reviewed || false, comment: newComment };
        showToast('Comment saved', 'success');
      } catch (err) {
        console.error('Failed to save comment:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function includeAllInPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;
      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayRemove(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentExcluded = studentExcluded.filter(id => !wordIds.includes(id));
        renderChapterDetailFromCurrent();
        showToast(wordIds.length + ' words included in practice', 'success');
      } catch (err) {
        console.error('Failed to include all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function excludeAllFromPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;
      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayUnion(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => { if (!studentExcluded.includes(id)) studentExcluded.push(id); });
        renderChapterDetailFromCurrent();
        showToast(wordIds.length + ' words excluded from practice', 'success');
      } catch (err) {
        console.error('Failed to exclude all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    function applyLevelClass(selectEl, level) {
      LEVEL_ORDER.forEach(l => selectEl.classList.remove('level-' + l));
      selectEl.classList.add('level-' + level);
      selectEl.style.display = 'none';
      selectEl.offsetHeight;
      selectEl.style.display = '';
    }

    // ------------------------------------------------------------------
    // Refresh helpers
    // ------------------------------------------------------------------
    function refreshCountsAfterChange() {
      renderOverallProgress();
      renderCrossChapterPool();
      renderChapterList();
      if (currentChapterId) {
        refreshPoolCountsForCurrentChapter();
      }
    }

    function refreshPoolCountsForCurrentChapter() {
      if (!currentChapterId) return;
      const vocab = (bookVocab[currentBookId] || {})[currentChapterId] || [];
      const counts = computePoolCounts(vocab);
      document.querySelectorAll('.right-panel .pool-btn').forEach(btn => {
        const sourceLevel = btn.dataset.sourceLevel;
        const targetLevel = btn.dataset.targetLevel;
        if (!sourceLevel || !targetLevel) return;
        const label = (targetLevel === 'L4R')
          ? '\ud83d\udd04 L4'
          : sourceLevel + '\u2192' + targetLevel;
        btn.textContent = label + ' (' + counts[sourceLevel] + ')';
      });
    }

    // ------------------------------------------------------------------
    // Left panel: Books list with series grouping
    // ------------------------------------------------------------------
    function renderBooksList() {
      const containerEl = document.getElementById('books-list-container');
      containerEl.innerHTML = '';

      if (allBooks.length === 0) {
        containerEl.innerHTML = '<p class="empty-message">No books registered yet.</p>';
        return;
      }

      // Group books by series
      const seriesGroups = new Map();
      allBooks.forEach(book => {
        const seriesKey = book.series || 'Other';
        if (!seriesGroups.has(seriesKey)) seriesGroups.set(seriesKey, []);
        seriesGroups.get(seriesKey).push(book);
      });

      seriesGroups.forEach((booksInSeries, seriesName) => {
        // Series heading
        const heading = document.createElement('div');
        heading.className = 'series-heading';
        heading.textContent = seriesName;
        containerEl.appendChild(heading);

        const ul = document.createElement('ul');
        ul.className = 'books-list';

        booksInSeries.forEach(book => {
          const li = document.createElement('li');
          li.dataset.bookId = book.id;
          li.textContent = book.title;
          if (book.id === currentBookId) li.classList.add('selected');
          li.addEventListener('click', () => selectBook(book.id));
          ul.appendChild(li);
        });

        containerEl.appendChild(ul);
      });
    }

    // ------------------------------------------------------------------
    // Book selection
    // ------------------------------------------------------------------
    async function selectBook(bookId) {
      currentBookId = bookId;
      currentChapterId = null;

      document.querySelectorAll('#books-list-container li').forEach(li => {
        li.classList.toggle('selected', li.dataset.bookId === bookId);
      });

      if (!bookChapters[bookId]) await loadChaptersIndexForBook(bookId);
      if (!bookVocab[bookId]) await loadAllChapterVocabForBook(bookId);

      renderBookContent();
      renderRightPanelEmpty();

      const chapters = bookChapters[bookId] || [];
      let chapterToSelect = null;

      if (preselectChapterId) {
        const found = chapters.find(c => c.id === preselectChapterId);
        if (found) {
          chapterToSelect = found;
          console.log('Auto-selected chapter from URL:', preselectChapterId);
        } else {
          console.log('URL chapter param "' + preselectChapterId + '" not valid for book ' + bookId + '; falling back to first chapter.');
        }
      }

      if (!chapterToSelect && chapters.length > 0) {
        chapterToSelect = chapters[0];
        console.log('Auto-selected first chapter of book ' + bookId + ':', chapterToSelect.id);
      }

      if (chapterToSelect) {
        selectChapter(chapterToSelect);
      }
    }

    // ------------------------------------------------------------------
    // Middle panel: Book content
    // ------------------------------------------------------------------
    function renderBookContent() {
      const container = document.getElementById('book-content');
      container.innerHTML = '';

      const chapters = bookChapters[currentBookId] || [];

      if (chapters.length === 0) {
        const msg = document.createElement('p');
        msg.className = 'empty-message';
        msg.textContent = 'No chapters yet in this book. Author your first chapter using the pipeline (see Content Authoring Guide).';
        container.appendChild(msg);
        return;
      }

      const progressHeading = document.createElement('h2');
      progressHeading.className = 'panel-heading';
      progressHeading.textContent = 'Overall Progress';
      container.appendChild(progressHeading);

      const progressSummary = document.createElement('div');
      progressSummary.id = 'progress-summary';
      progressSummary.className = 'progress-summary';
      container.appendChild(progressSummary);
      renderOverallProgress();

      const crossPoolContainer = document.createElement('div');
      crossPoolContainer.id = 'cross-chapter-pool';
      crossPoolContainer.className = 'cross-chapter-pool';
      container.appendChild(crossPoolContainer);
      renderCrossChapterPool();

      const chaptersHeading = document.createElement('h2');
      chaptersHeading.className = 'panel-heading';
      chaptersHeading.textContent = 'Chapters';
      container.appendChild(chaptersHeading);

      const chapterList = document.createElement('ul');
      chapterList.id = 'chapter-list';
      chapterList.className = 'chapter-list';
      container.appendChild(chapterList);
      renderChapterList();
    }

    function renderOverallProgress() {
      const summaryEl = document.getElementById('progress-summary');
      if (!summaryEl) return;

      const allVocab = getAllVocabForCurrentBook();
      const total = allVocab.length;
      const counts = computeLevelCounts(allVocab);
      const reviewed = computeReviewedCount(allVocab);

      summaryEl.innerHTML = '';
      const totalLine = document.createElement('div');
      totalLine.className = 'total-line';
      totalLine.textContent = 'Total: ' + total + ' words';
      summaryEl.appendChild(totalLine);

      LEVEL_ORDER.forEach(level => {
        const line = document.createElement('div');
        line.className = 'progress-line';
        const dot = document.createElement('span');
        dot.className = 'progress-dot ' + level;
        const text = document.createElement('span');
        text.textContent = LEVEL_META[level].label + ': ' + counts[level];
        line.appendChild(dot);
        line.appendChild(text);
        summaryEl.appendChild(line);
      });

      const reviewLine = document.createElement('div');
      reviewLine.className = 'review-line';
      reviewLine.textContent = '\ud83d\udcdd ' + REVIEW_LABEL + ': ' + reviewed;
      summaryEl.appendChild(reviewLine);
    }

    function renderCrossChapterPool() {
      const containerEl = document.getElementById('cross-chapter-pool');
      if (!containerEl) return;
      containerEl.innerHTML = '';

      const allVocab = getAllVocabForCurrentBook();
      if (allVocab.length === 0) return;

      const counts = computePoolCounts(allVocab);

      const label = document.createElement('div');
      label.className = 'cross-chapter-pool-label';
      label.textContent = 'Practice across all chapters:';
      containerEl.appendChild(label);

      const btnRow = document.createElement('div');
      btnRow.className = 'cross-chapter-pool-buttons';

      const CROSS_POOL = [
        { label: 'L0\u2192L1', sourceLevel: 'L0', targetLevel: 'L1' },
        { label: 'L1\u2192L2', sourceLevel: 'L1', targetLevel: 'L2' },
        { label: 'L2\u2192L3', sourceLevel: 'L2', targetLevel: 'L3' },
        { label: 'L3\u2192L4', sourceLevel: 'L3', targetLevel: 'L4' },
        { label: '\ud83d\udd04 L4', sourceLevel: 'L4', targetLevel: 'L4R' },
      ];

      CROSS_POOL.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'cross-pool-btn source-' + cfg.sourceLevel;
        btn.dataset.sourceLevel = cfg.sourceLevel;
        btn.dataset.targetLevel = cfg.targetLevel;
        btn.textContent = cfg.label + ' (' + counts[cfg.sourceLevel] + ')';
        btn.addEventListener('click', () => handleCrossPoolClick(cfg.targetLevel));
        btnRow.appendChild(btn);
      });

      containerEl.appendChild(btnRow);
    }

    function handleCrossPoolClick(targetLevel) {
      window.location.href = 'exercise.html?level=' + targetLevel +
        '&book=' + encodeURIComponent(currentBookId) +
        '&chapter=all&student=' + encodeURIComponent(student);
    }

    function renderChapterList() {
      const listEl = document.getElementById('chapter-list');
      if (!listEl) return;
      listEl.innerHTML = '';

      const chapters = bookChapters[currentBookId] || [];
      if (chapters.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No chapters yet.</li>';
        return;
      }

      chapters.forEach(ch => {
        const vocab = (bookVocab[currentBookId] || {})[ch.id] || [];
        const counts = computeLevelCounts(vocab);
        const reviewed = computeReviewedCount(vocab);

        const li = document.createElement('li');
        li.dataset.chapterId = ch.id;
        if (ch.id === currentChapterId) li.classList.add('selected');

        const title = document.createElement('span');
        title.className = 'chapter-title';
        title.textContent = 'Chapter ' + ch.id + ': ' + ch.title;

        const meta = document.createElement('span');
        meta.className = 'chapter-meta';
        meta.textContent = ch.wordCount + ' words';

        const levelCounts = document.createElement('div');
        levelCounts.className = 'chapter-level-counts';
        LEVEL_ORDER.forEach(l => {
          const item = document.createElement('span');
          item.className = 'chapter-level-count-item';
          const dot = document.createElement('span');
          dot.className = 'progress-dot ' + l;
          dot.style.width = '8px';
          dot.style.height = '8px';
          const num = document.createElement('span');
          num.textContent = counts[l];
          item.appendChild(dot);
          item.appendChild(num);
          levelCounts.appendChild(item);
        });
        const reviewItem = document.createElement('span');
        reviewItem.className = 'chapter-level-count-item';
        reviewItem.textContent = '\ud83d\udcdd ' + reviewed;
        levelCounts.appendChild(reviewItem);

        li.appendChild(title);
        li.appendChild(meta);
        li.appendChild(levelCounts);
        li.addEventListener('click', () => selectChapter(ch));

        listEl.appendChild(li);
      });
    }
    // ------------------------------------------------------------------
    // Right panel: Chapter detail
    // ------------------------------------------------------------------
    function renderRightPanelEmpty() {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '<p class="empty-message">Select a chapter from the middle panel to view its details.</p>';
    }

    function selectChapter(chapter) {
      currentChapterId = chapter.id;
      document.querySelectorAll('#chapter-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.chapterId === chapter.id);
      });
      renderChapterDetail({
        chapterId: chapter.id,
        chapterTitle: chapter.title,
        vocab: (bookVocab[currentBookId] || {})[chapter.id] || [],
      });
    }

    function renderChapterDetailFromCurrent() {
      if (!currentChapterId) return;
      const chapter = (bookChapters[currentBookId] || []).find(c => c.id === currentChapterId);
      if (!chapter) return;
      renderChapterDetail({
        chapterId: chapter.id,
        chapterTitle: chapter.title,
        vocab: (bookVocab[currentBookId] || {})[chapter.id] || [],
      });
    }

    function handlePracticePoolClick(targetLevel, chapterId) {
      window.location.href = 'exercise.html?level=' + targetLevel +
        '&book=' + encodeURIComponent(currentBookId) +
        '&chapter=' + encodeURIComponent(chapterId) +
        '&student=' + encodeURIComponent(student);
    }

    function autoResizeTextarea(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function confirmBulk(message) {
      return window.confirm(message);
    }

    function handleBulkLevelClick(level, chapterData) {
      const filtered = applyFilters(chapterData.vocab);
      if (filtered.length === 0) {
        showToast('No filtered words to update.', 'error');
        return;
      }
      const msg = 'Set ' + filtered.length + ' word(s) to ' + LEVEL_META[level].label + '?';
      if (!confirmBulk(msg)) return;
      bulkSetLevel(filtered.map(w => w.id), level);
    }

    function handleBulkReviewClick(chapterData) {
      const filtered = applyFilters(chapterData.vocab);
      if (filtered.length === 0) {
        showToast('No filtered words to update.', 'error');
        return;
      }
      const msg = 'Mark ' + filtered.length + ' word(s) as reviewed?';
      if (!confirmBulk(msg)) return;
      bulkMarkReviewed(filtered.map(w => w.id));
    }

    function renderChapterDetail(chapterData) {
      const rightEl = document.getElementById('right-panel-content');
      rightEl.innerHTML = '';

      // ---- Sticky top section ----
      const stickyTop = document.createElement('div');
      stickyTop.className = 'right-sticky-top';

      // Chapter header
      const header = document.createElement('div');
      header.className = 'chapter-header';
      const h2 = document.createElement('h2');
      h2.textContent = 'Chapter ' + chapterData.chapterId + ': ' + chapterData.chapterTitle;
      header.appendChild(h2);
      const passagesLink = document.createElement('a');
      passagesLink.className = 'show-passages-link';
      passagesLink.textContent = '\ud83d\udcd6 Show Passages';
      passagesLink.href = 'passages.html?book=' + encodeURIComponent(currentBookId) +
                          '&chapter=' + encodeURIComponent(chapterData.chapterId) +
                          '&student=' + encodeURIComponent(student);
      header.appendChild(passagesLink);
      stickyTop.appendChild(header);

      // Practice pool
      const chapterCounts = computePoolCounts(chapterData.vocab);
      const practicePool = document.createElement('div');
      practicePool.className = 'practice-pool';
      const label = document.createElement('div');
      label.className = 'practice-pool-label';
      label.textContent = 'Practice Pool';
      practicePool.appendChild(label);
      const poolBtnRow = document.createElement('div');
      poolBtnRow.className = 'practice-pool-buttons';
      const POOL_BUTTONS = [
        { label: 'L0\u2192L1', sourceLevel: 'L0', targetLevel: 'L1' },
        { label: 'L1\u2192L2', sourceLevel: 'L1', targetLevel: 'L2' },
        { label: 'L2\u2192L3', sourceLevel: 'L2', targetLevel: 'L3' },
        { label: 'L3\u2192L4', sourceLevel: 'L3', targetLevel: 'L4' },
        { label: '\ud83d\udd04 L4', sourceLevel: 'L4', targetLevel: 'L4R' },
      ];
      POOL_BUTTONS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'pool-btn source-' + cfg.sourceLevel;
        btn.dataset.sourceLevel = cfg.sourceLevel;
        btn.dataset.targetLevel = cfg.targetLevel;
        btn.textContent = cfg.label + ' (' + chapterCounts[cfg.sourceLevel] + ')';
        btn.addEventListener('click', () => handlePracticePoolClick(cfg.targetLevel, chapterData.chapterId));
        poolBtnRow.appendChild(btn);
      });
      practicePool.appendChild(poolBtnRow);
      stickyTop.appendChild(practicePool);

      // Bulk action bar
      const bulkBar = document.createElement('div');
      bulkBar.className = 'bulk-action-bar';
      const bulkLabel = document.createElement('span');
      bulkLabel.className = 'bulk-action-label';
      bulkLabel.textContent = 'Bulk actions on filtered words:';
      bulkBar.appendChild(bulkLabel);
      LEVEL_ORDER.forEach(level => {
        const btn = document.createElement('button');
        btn.className = 'bulk-btn level-' + level;
        btn.textContent = 'Set ' + level;
        btn.addEventListener('click', () => handleBulkLevelClick(level, chapterData));
        bulkBar.appendChild(btn);
      });
      const reviewBtn = document.createElement('button');
      reviewBtn.className = 'bulk-btn review';
      reviewBtn.textContent = '\ud83d\udcdd Mark Reviewed';
      reviewBtn.addEventListener('click', () => handleBulkReviewClick(chapterData));
      bulkBar.appendChild(reviewBtn);
      stickyTop.appendChild(bulkBar);

      rightEl.appendChild(stickyTop);

      // ---- Vocab table wrapper ----
      const tableWrapper = document.createElement('div');
      tableWrapper.className = 'vocab-table-wrapper';

      const filteredVocab = applyFilters(chapterData.vocab);

      const table = document.createElement('table');
      table.className = 'vocab-table';

      const thead = document.createElement('thead');

      // Filter row
      const filterRow = document.createElement('tr');
      filterRow.className = 'filter-row';

      filterRow.appendChild(document.createElement('td'));

      const tdLevelFilter = document.createElement('td');
      const levelSelect = document.createElement('select');
      levelSelect.className = 'filter-select';
      const levelOptions = [['all', 'All levels']].concat(LEVEL_ORDER.map(l => [l, LEVEL_META[l].label]));
      levelOptions.forEach(([val, labelText]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = labelText;
        if (val === levelFilter) opt.selected = true;
        levelSelect.appendChild(opt);
      });
      levelSelect.addEventListener('change', () => {
        levelFilter = levelSelect.value;
        renderChapterDetailFromCurrent();
      });
      tdLevelFilter.appendChild(levelSelect);
      filterRow.appendChild(tdLevelFilter);

      const tdPracticeAction = document.createElement('td');
      const practiceSelect = document.createElement('select');
      practiceSelect.className = 'filter-select';
      [
        ['', 'Actions\u2026'],
        ['include', 'Include All'],
        ['exclude', 'Exclude All'],
      ].forEach(([val, labelText]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = labelText;
        practiceSelect.appendChild(opt);
      });
      practiceSelect.addEventListener('change', () => {
        const val = practiceSelect.value;
        if (val === 'include') includeAllInPractice(filteredVocab);
        else if (val === 'exclude') excludeAllFromPractice(filteredVocab);
        practiceSelect.value = '';
      });
      tdPracticeAction.appendChild(practiceSelect);
      filterRow.appendChild(tdPracticeAction);

      const tdDetailsAction = document.createElement('td');
      const detailsSelect = document.createElement('select');
      detailsSelect.className = 'filter-select';
      [
        ['', 'Actions\u2026'],
        ['show', 'Show All'],
        ['hide', 'Hide All'],
      ].forEach(([val, labelText]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = labelText;
        detailsSelect.appendChild(opt);
      });
      detailsSelect.addEventListener('change', () => {
        const val = detailsSelect.value;
        if (val === 'show') expandAll();
        else if (val === 'hide') collapseAll();
        detailsSelect.value = '';
      });
      tdDetailsAction.appendChild(detailsSelect);
      filterRow.appendChild(tdDetailsAction);

      filterRow.appendChild(document.createElement('td'));
      filterRow.appendChild(document.createElement('td'));

      const tdReviewFilter = document.createElement('td');
      const reviewSelect = document.createElement('select');
      reviewSelect.className = 'filter-select';
      [
        ['all', 'All'],
        ['reviewed', '\ud83d\udcdd Reviewed'],
        ['awaiting', 'Awaiting review'],
        ['none', 'No sentence yet'],
      ].forEach(([val, labelText]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = labelText;
        if (val === reviewFilter) opt.selected = true;
        reviewSelect.appendChild(opt);
      });
      reviewSelect.addEventListener('change', () => {
        reviewFilter = reviewSelect.value;
        renderChapterDetailFromCurrent();
      });
      tdReviewFilter.appendChild(reviewSelect);
      filterRow.appendChild(tdReviewFilter);

      const tdClearFilters = document.createElement('td');
      const clearBtn = document.createElement('button');
      clearBtn.className = 'clear-filters-btn';
      clearBtn.textContent = '\ud83d\uddd1 Clear filters';
      clearBtn.addEventListener('click', () => {
        levelFilter = 'all';
        reviewFilter = 'all';
        renderChapterDetailFromCurrent();
      });
      tdClearFilters.appendChild(clearBtn);
      filterRow.appendChild(tdClearFilters);

      thead.appendChild(filterRow);

      // Header row
      const HEADERS = [
        { text: 'Word' },
        { text: 'Level' },
        { text: 'Practice' },
        { text: 'Details' },
        { text: 'Mandarin', title: 'Audio (Mandarin)' },
        { text: 'Cantonese', title: 'Audio (Cantonese)' },
        { text: 'Reviewed' },
        { text: 'Comment' },
      ];
      const headerRow = document.createElement('tr');
      HEADERS.forEach(cfg => {
        const th = document.createElement('th');
        th.textContent = cfg.text;
        if (cfg.title) th.title = cfg.title;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      filteredVocab.forEach(word => {
        const row = document.createElement('tr');
        row.dataset.wordId = word.id;

        const tdWord = document.createElement('td');
        tdWord.className = 'col-word vocab-word';
        tdWord.textContent = word.traditional;
        row.appendChild(tdWord);

        const tdLevel = document.createElement('td');
        tdLevel.className = 'col-level';
        const select = document.createElement('select');
        select.className = 'level-select';
        select.dataset.wordId = word.id;
        LEVEL_ORDER.forEach(level => {
          const opt = document.createElement('option');
          opt.value = level;
          opt.textContent = LEVEL_META[level].label;
          select.appendChild(opt);
        });
        const initialLevel = getLevelForWord(word.id);
        select.value = initialLevel;
        applyLevelClass(select, initialLevel);
        select.addEventListener('change', () => {
          const oldLevel = getLevelForWord(word.id);
          const newLevel = select.value;
          if (newLevel === oldLevel) return;
          updateWordLevel(word.id, newLevel, select, oldLevel);
        });
        tdLevel.appendChild(select);
        row.appendChild(tdLevel);

        const tdPractice = document.createElement('td');
        tdPractice.className = 'col-practice';
        const practiceCheckbox = document.createElement('input');
        practiceCheckbox.type = 'checkbox';
        practiceCheckbox.checked = !isWordExcluded(word.id);
        practiceCheckbox.dataset.wordId = word.id;
        practiceCheckbox.title = 'Include in practice pool';
        practiceCheckbox.addEventListener('change', () => {
          updateWordExclusion(word.id, practiceCheckbox.checked, practiceCheckbox);
        });
        tdPractice.appendChild(practiceCheckbox);
        row.appendChild(tdPractice);

        const tdDetails = document.createElement('td');
        tdDetails.className = 'col-details';
        const detailsBtn = document.createElement('button');
        detailsBtn.className = 'details-btn';
        detailsBtn.textContent = '\ud83d\udc41 Details';
        detailsBtn.addEventListener('click', () => toggleRowDetails(word.id, detailsBtn));
        tdDetails.appendChild(detailsBtn);
        row.appendChild(tdDetails);

        const tdAudioM = document.createElement('td');
        tdAudioM.className = 'col-audio-m';
        const audioMBtn = document.createElement('button');
        audioMBtn.className = 'audio-btn';
        audioMBtn.textContent = '\ud83d\udd0a';
        audioMBtn.title = 'Play Mandarin (isolated)';
        const mandarinPath = word.audio && word.audio.mandarin ? word.audio.mandarin.isolated : null;
        if (!mandarinPath) audioMBtn.disabled = true;
        audioMBtn.addEventListener('click', () => playAudio(mandarinPath));
        tdAudioM.appendChild(audioMBtn);
        row.appendChild(tdAudioM);

        const tdAudioC = document.createElement('td');
        tdAudioC.className = 'col-audio-c';
        const audioCBtn = document.createElement('button');
        audioCBtn.className = 'audio-btn';
        audioCBtn.textContent = '\ud83d\udd0a';
        audioCBtn.title = 'Play Cantonese (isolated)';
        const cantonesePath = word.audio && word.audio.cantonese ? word.audio.cantonese.isolated : null;
        if (!cantonesePath) audioCBtn.disabled = true;
        audioCBtn.addEventListener('click', () => playAudio(cantonesePath));
        tdAudioC.appendChild(audioCBtn);
        row.appendChild(tdAudioC);

        const tdReviewed = document.createElement('td');
        tdReviewed.className = 'col-reviewed';
        const reviewedCheckbox = document.createElement('input');
        reviewedCheckbox.type = 'checkbox';
        reviewedCheckbox.checked = !!getSentenceData(word.id).reviewed;
        reviewedCheckbox.title = 'Mark sentence as reviewed (locks sentence input)';
        reviewedCheckbox.addEventListener('change', () => {
          updateReviewed(word.id, reviewedCheckbox.checked, reviewedCheckbox);
        });
        tdReviewed.appendChild(reviewedCheckbox);
        row.appendChild(tdReviewed);

        const tdComment = document.createElement('td');
        tdComment.className = 'col-comment';
        const commentInput = document.createElement('textarea');
        commentInput.className = 'comment-input';
        commentInput.rows = 1;
        commentInput.maxLength = 300;
        commentInput.value = getSentenceData(word.id).comment || '';
        commentInput.addEventListener('input', () => autoResizeTextarea(commentInput));
        commentInput.addEventListener('blur', () => {
          const newVal = commentInput.value.trim();
          if (newVal !== (getSentenceData(word.id).comment || '')) {
            updateComment(word.id, newVal);
          }
        });
        tdComment.appendChild(commentInput);
        row.appendChild(tdComment);

        tbody.appendChild(row);

        // Details row
        const detailsRow = document.createElement('tr');
        detailsRow.className = 'details-row';
        detailsRow.dataset.wordId = word.id;
        detailsRow.id = 'details-' + word.id;

        const detailsCell = document.createElement('td');
        detailsCell.colSpan = 8;

        const detailsCard = document.createElement('div');
        detailsCard.className = 'details-card';

        const headerDl = document.createElement('dl');
        headerDl.className = 'details-header-row';
        [
          ['Pinyin', word.pinyin || ''],
          ['English', word.english || ''],
        ].forEach(([itemLabel, itemValue]) => {
          const dt = document.createElement('dt');
          dt.textContent = itemLabel;
          const dd = document.createElement('dd');
          dd.textContent = itemValue;
          headerDl.appendChild(dt);
          headerDl.appendChild(dd);
        });
        detailsCard.appendChild(headerDl);

        const compareRow = document.createElement('div');
        compareRow.className = 'details-compare-row';

        const tradCol = document.createElement('div');
        tradCol.className = 'details-compare-col';
        const tradH = document.createElement('h4');
        tradH.textContent = 'Traditional';
        tradCol.appendChild(tradH);
        const tradWord = document.createElement('div');
        tradWord.className = 'compare-word';
        tradWord.textContent = word.traditional;
        tradCol.appendChild(tradWord);
        const tradSent = document.createElement('div');
        tradSent.className = 'compare-sentence';
        tradSent.textContent = word.contextSentence || '(no context sentence)';
        tradCol.appendChild(tradSent);
        compareRow.appendChild(tradCol);

        const simpCol = document.createElement('div');
        simpCol.className = 'details-compare-col';
        const simpH = document.createElement('h4');
        simpH.textContent = 'Simplified';
        simpCol.appendChild(simpH);
        const simpWord = document.createElement('div');
        simpWord.className = 'compare-word';
        simpWord.textContent = word.simplified || '(not generated)';
        simpCol.appendChild(simpWord);
        const simpSent = document.createElement('div');
        simpSent.className = 'compare-sentence';
        simpSent.textContent = word.contextSentenceSimplified || '(not generated)';
        simpCol.appendChild(simpSent);
        compareRow.appendChild(simpCol);

        detailsCard.appendChild(compareRow);

        const ownSentenceRow = document.createElement('div');
        ownSentenceRow.className = 'details-sentence-row';
        const ownSentenceLabel = document.createElement('div');
        ownSentenceLabel.className = 'details-sentence-label';
        ownSentenceLabel.textContent = 'Your sentence:';
        ownSentenceRow.appendChild(ownSentenceLabel);
        const ownSentenceInput = document.createElement('textarea');
        ownSentenceInput.className = 'own-sentence-input';
        ownSentenceInput.rows = 1;
        ownSentenceInput.maxLength = 200;
        ownSentenceInput.value = getSentenceData(word.id).text || '';
        ownSentenceInput.disabled = !!getSentenceData(word.id).reviewed;
        ownSentenceInput.addEventListener('input', () => autoResizeTextarea(ownSentenceInput));
        ownSentenceInput.addEventListener('blur', () => {
          const newVal = ownSentenceInput.value.trim();
          if (newVal !== (getSentenceData(word.id).text || '')) {
            updateSentence(word.id, newVal);
          }
        });
        ownSentenceRow.appendChild(ownSentenceInput);

        detailsCard.appendChild(ownSentenceRow);
        detailsCell.appendChild(detailsCard);
        detailsRow.appendChild(detailsCell);
        tbody.appendChild(detailsRow);

        if (expandedWordIds.has(word.id)) {
          detailsRow.classList.add('expanded');
          detailsBtn.textContent = '\ud83d\ude48 Hide';
        }

        setTimeout(() => {
          autoResizeTextarea(commentInput);
          autoResizeTextarea(ownSentenceInput);
        }, 0);
      });

      table.appendChild(tbody);
      tableWrapper.appendChild(table);
      rightEl.appendChild(tableWrapper);

      console.log('Rendered book ' + currentBookId + ' chapter ' + chapterData.chapterId +
                  ' with ' + filteredVocab.length + ' words (of ' + chapterData.vocab.length + ' total).');
    }

    // Kept as no-op for now. Will be re-purposed if we add sticky behavior back.
    function alignRightPanelSticky() {}
    

    // ------------------------------------------------------------------
    // Row toggles + audio
    // ------------------------------------------------------------------
    function toggleRowDetails(wordId, button) {
      const detailsRow = document.getElementById('details-' + wordId);
      if (!detailsRow) return;
      const isExpanded = detailsRow.classList.contains('expanded');
      if (isExpanded) {
        detailsRow.classList.remove('expanded');
        button.textContent = '\ud83d\udc41 Details';
        expandedWordIds.delete(wordId);
      } else {
        detailsRow.classList.add('expanded');
        button.textContent = '\ud83d\ude48 Hide';
        expandedWordIds.add(wordId);
        setTimeout(() => {
          const commentInput = detailsRow.querySelector('.comment-input');
          const ownInput = detailsRow.querySelector('.own-sentence-input');
          if (commentInput) autoResizeTextarea(commentInput);
          if (ownInput) autoResizeTextarea(ownInput);
        }, 0);
      }
    }

    function expandAll() {
      document.querySelectorAll('.details-row').forEach(row => {
        row.classList.add('expanded');
        if (row.dataset.wordId) expandedWordIds.add(row.dataset.wordId);
      });
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '\ud83d\ude48 Hide');
      setTimeout(() => {
        document.querySelectorAll('.own-sentence-input').forEach(autoResizeTextarea);
        document.querySelectorAll('.comment-input').forEach(autoResizeTextarea);
      }, 0);
    }

    function collapseAll() {
      document.querySelectorAll('.details-row').forEach(row => {
        row.classList.remove('expanded');
        if (row.dataset.wordId) expandedWordIds.delete(row.dataset.wordId);
      });
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '\ud83d\udc41 Details');
    }

    function playAudio(audioPath) {
      if (!audioPath) {
        console.warn('No audio path provided');
        return;
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = new Audio(audioPath);
      currentAudio.play().catch(err => console.error('Audio playback failed:', err));
    }

    // ------------------------------------------------------------------
    // Main init
    // ------------------------------------------------------------------
    async function init() {
      try {
        await loadStudentProgress();
        await loadBooksIndex();

        renderBooksList();

        if (allBooks.length === 0) {
          document.getElementById('book-content').innerHTML =
            '<p class="empty-message">No books registered. See Content Authoring Guide Section 2.</p>';
          return;
        }

        let targetBookId = null;
        if (preselectBookId) {
          const found = allBooks.find(b => b.id === preselectBookId);
          if (found) {
            targetBookId = preselectBookId;
            console.log('Auto-selected book from URL:', preselectBookId);
          } else {
            console.log('URL book param "' + preselectBookId + '" not valid; falling back to first book.');
          }
        }
        if (!targetBookId) {
          targetBookId = allBooks[0].id;
          console.log('Auto-selected first book:', targetBookId);
        }

        await selectBook(targetBookId);

      } catch (err) {
        console.error('Initialization error:', err);
      }
    }

    init();
  </script>

</body>
</html>
