<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Dashboard - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#F5EFE6',
            navy:    '#1E3A5F',
            'level-l0': '#DB5858',
            'level-l1': '#FA961B',
            'level-l2': '#EFBE4A',
            'level-l3': '#7BC780',
            'level-l4': '#5A9AD6',
            promote: '#7BC780',
            drop:    '#DB5858',
            info:    '#5AA5D6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            tc: ['Noto Sans TC', 'Inter', 'system-ui', 'sans-serif'],
            emoji: ['Noto Color Emoji', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #ccc; background-color: #f4f4f4; }
    .top-bar h1 { margin: 0; font-size: 20px; }
    .top-bar .student-switcher { display: flex; align-items: center; gap: 8px; }

    .main-body { display: grid; grid-template-columns: 220px 320px 1fr; min-height: calc(100vh - 60px); }
    .left-panel, .middle-panel { border-right: 1px solid #ccc; padding: 15px; overflow-y: auto; }
    .left-panel h2, .middle-panel h2 { font-size: 16px; margin-top: 0; margin-bottom: 10px; }
    .left-panel h2:not(:first-of-type), .middle-panel h2:not(:first-of-type) { margin-top: 20px; }

    .books-list { list-style: none; padding: 0; margin: 0; }
    .books-list li { padding: 10px 12px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; font-size: 14px; }
    .books-list li:hover { background-color: #eef; }
    .books-list li.selected { background-color: #dde; font-weight: bold; }

    .progress-summary { font-size: 13px; line-height: 1.8; }
    .progress-summary .total-line { font-weight: bold; margin-bottom: 6px; }

    .chapter-list { list-style: none; padding: 0; margin: 0; }
    .chapter-list li { padding: 8px 10px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; }
    .chapter-list li:hover { background-color: #eef; }
    .chapter-list li.selected { background-color: #dde; font-weight: bold; }
    .chapter-title { display: block; }
    .chapter-meta { display: block; font-size: 12px; color: #666; margin-top: 2px; }
    .chapter-level-counts { display: block; font-size: 11px; color: #555; margin-top: 3px; line-height: 1.5; }

    .cross-chapter-pool { margin-top: 20px; font-size: 12px; }
    .cross-chapter-pool-label { font-weight: bold; margin-bottom: 6px; color: #333; }
    .cross-chapter-pool-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
    .cross-pool-btn { padding: 4px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; font-size: 12px; }
    .cross-pool-btn:hover { background-color: #eef; }

    .right-panel { padding: 20px; }
    .empty-message { color: #888; font-style: italic; }

    .chapter-header { display: flex; justify-content: flex-start; align-items: baseline; gap: 20px; margin-bottom: 15px; }
    .chapter-header h2 { margin: 0; font-size: 18px; }
    .show-passages-link { font-size: 14px; text-decoration: none; color: #0366d6; }
    .show-passages-link:hover { text-decoration: underline; }

    .practice-pool { margin-bottom: 20px; }
    .practice-pool-label { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .practice-pool-buttons { display: flex; gap: 8px; }
    .pool-btn { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; font-size: 14px; }
    .pool-btn:hover { background-color: #eef; }

    .bulk-action-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .bulk-action-label { font-size: 13px; color: #555; font-weight: bold; }
    .bulk-btn { padding: 5px 10px; cursor: pointer; border: 1px solid #999; border-radius: 4px; font-size: 13px; font-weight: bold; color: #333; }
    .bulk-btn:hover { opacity: 0.85; }
    .bulk-btn.level-L0 { background-color: #F8D8D8; color: #721C24; border-color: #DB5858; }
    .bulk-btn.level-L1 { background-color: #FDE4C2; color: #6D3900; border-color: #FA961B; }
    .bulk-btn.level-L2 { background-color: #FFF3CD; color: #856404; border-color: #EFBE4A; }
    .bulk-btn.level-L3 { background-color: #D4EDDA; color: #155724; border-color: #7BC780; }
    .bulk-btn.level-L4 { background-color: #D9E7F5; color: #1E3A5F; border-color: #5A9AD6; }
    .bulk-btn.review { background-color: #fff; color: #333; }

    .vocab-table { border-collapse: collapse; width: 100%; }
    .vocab-table th, .vocab-table td { padding: 8px 12px; border-bottom: 1px solid #ddd; text-align: left; vertical-align: middle; }
    .vocab-table th { background-color: #f4f4f4; font-weight: bold; text-align: center; }
    .vocab-table th:first-child, .vocab-table th:last-child { text-align: left; }
    .vocab-table { table-layout: fixed; }
    .vocab-table th, .vocab-table td { box-sizing: border-box; }
    .vocab-table col.col-word,     .vocab-table th:nth-child(1), .vocab-table td.col-word,     .vocab-table tr.filter-row td:nth-child(1) { width: 200px; }
    .vocab-table col.col-level,    .vocab-table th:nth-child(2), .vocab-table td.col-level,    .vocab-table tr.filter-row td:nth-child(2) { width: 150px; text-align: center; }
    .vocab-table col.col-practice, .vocab-table th:nth-child(3), .vocab-table td.col-practice, .vocab-table tr.filter-row td:nth-child(3) { width: 100px;  text-align: center; }
    .vocab-table col.col-details,  .vocab-table th:nth-child(4), .vocab-table td.col-details,  .vocab-table tr.filter-row td:nth-child(4) { width: 150px;  text-align: center; }
    .vocab-table col.col-audio-m,  .vocab-table th:nth-child(5), .vocab-table td.col-audio-m,  .vocab-table tr.filter-row td:nth-child(5) { width: 100px;  text-align: center; }
    .vocab-table col.col-audio-c,  .vocab-table th:nth-child(6), .vocab-table td.col-audio-c,  .vocab-table tr.filter-row td:nth-child(6) { width: 100px;  text-align: center; }
    .vocab-table col.col-reviewed, .vocab-table th:nth-child(7), .vocab-table td.col-reviewed, .vocab-table tr.filter-row td:nth-child(7) { width: 150px;  text-align: center; }
    .vocab-table col.col-comment,  .vocab-table th:nth-child(8), .vocab-table td.col-comment,  .vocab-table tr.filter-row td:nth-child(8) { width: auto; }
    .vocab-table tr.filter-row td { background-color: #fafafa; padding: 6px 10px; border-bottom: 1px solid #eee; }
    .filter-select { padding: 3px 6px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; }
    .filter-select:focus { outline: 2px solid rgba(0, 122, 255, 0.3); outline-offset: 1px; }
    .clear-filters-btn { padding: 3px 8px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; cursor: pointer; }
    .clear-filters-btn:hover { background-color: #eef; }

    .vocab-word { font-size: 18px; }

    .level-select {
      padding: 3px 6px; border-radius: 10px; font-size: 12px;
      border: 1px solid rgba(0,0,0,0.15); cursor: pointer;
      font-family: inherit; background-color: #eee; color: #333;
      appearance: menulist;
    }
    .level-select:focus { outline: 2px solid rgba(0, 122, 255, 0.3); outline-offset: 1px; }
    .level-select.level-L0 { background-color: #F8D8D8; color: #721C24; }
    .level-select.level-L1 { background-color: #FDE4C2; color: #6D3900; }
    .level-select.level-L2 { background-color: #FFF3CD; color: #856404; }
    .level-select.level-L3 { background-color: #D4EDDA; color: #155724; }
    .level-select.level-L4 { background-color: #D9E7F5; color: #1E3A5F; }

    .details-btn, .audio-btn {
      cursor: pointer; background: none; border: 1px solid #ccc;
      padding: 4px 8px; border-radius: 4px; font-size: 14px;
    }
    .details-btn:hover, .audio-btn:hover { background-color: #eef; }

    .details-row { display: none; background-color: #fafafa; }
    .details-row.expanded { display: table-row; }
    .details-row td { padding: 14px 20px; border-bottom: 1px solid #ddd; }

    .details-card { display: flex; flex-direction: column; gap: 12px; }
    .details-header-row { display: grid; grid-template-columns: 100px 1fr; gap: 6px 16px; font-size: 14px; }
    .details-header-row dt { font-weight: bold; color: #555; margin: 0; }
    .details-header-row dd { margin: 0; color: #333; }

    .details-compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
    .details-compare-col h4 { margin: 0 0 6px 0; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .details-compare-col .compare-word { font-size: 18px; color: #333; margin-bottom: 8px; }
    .details-compare-col .compare-sentence { font-size: 14px; color: #555; line-height: 1.6; }

    .details-sentence-row { display: flex; align-items: flex-start; gap: 10px; border-top: 1px solid #ddd; padding-top: 10px; }
    .details-sentence-label { font-weight: bold; color: #555; font-size: 14px; padding-top: 6px; white-space: nowrap; }
    .own-sentence-input { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 14px; resize: none; overflow: hidden; min-height: 32px; line-height: 1.4; }
    .own-sentence-input:disabled { background-color: #f0f0f0; color: #666; cursor: not-allowed; }

    .comment-input { width: 100%; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 13px; resize: none; overflow: hidden; min-height: 28px; line-height: 1.4; }

    .toast { position: fixed; top: 15px; right: 20px; padding: 8px 16px; border-radius: 4px; font-size: 13px; color: #fff; opacity: 0; transition: opacity 0.2s ease-in-out; pointer-events: none; z-index: 1000; }
    .toast.visible { opacity: 1; }
    .toast.success { background-color: #28a745; }
    .toast.error { background-color: #dc3545; }

    .vocab-table td input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="favicon.png" alt="" style="height:32px;width:32px;border-radius:6px;">
      <h1>Chinese iGCSE Vocabulary Trainer</h1>
    </div>
    <div class="student-switcher">
      <label for="student-switch">Student:</label>
      <select id="student-switch">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>

  <div class="main-body">

    <div class="left-panel">
      <h2>Books</h2>
      <ul id="books-list" class="books-list">
        <li class="empty-message">Loading books...</li>
      </ul>
    </div>

    <div class="middle-panel">
      <div id="book-content">
        <p class="empty-message">Select a book from the left panel to view its chapters.</p>
      </div>
    </div>

    <div class="right-panel">
      <div id="right-panel-content">
        <p class="empty-message">Select a chapter from the middle panel to view its details.</p>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>

  <script>
    // ------------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------------
    const LEVEL_ORDER = ['L0', 'L1', 'L2', 'L3', 'L4'];
    const LEVEL_META = {
      L0: { emoji: '🔴', label: 'L0 Discover' },
      L1: { emoji: '🟠', label: 'L1 Read' },
      L2: { emoji: '🟡', label: 'L2 Listen' },
      L3: { emoji: '🟢', label: 'L3 Usage' },
      L4: { emoji: '🔵', label: 'L4 Write' },
    };
    const REVIEW_EMOJI = '📝';

    // ------------------------------------------------------------------
    // Global state
    // ------------------------------------------------------------------
    let studentProgress = {};
    let studentExcluded = [];
    let studentSentences = {};   // NEW (M8.3c-3c): { wordId: {text, reviewed, comment} }
    let allBooks = [];
    let currentBookId = null;
    let bookVocab = {};
    let bookChapters = {};
    let currentChapterId = null;
    let currentAudio = null;

    // Session-persistent filters (M8.3c-3c). Reset only on page refresh.
    let levelFilter = 'all';
    let reviewFilter = 'all';
    // Session-persistent details expansion state per word. Independent of filters.
    let expandedWordIds = new Set();

    // ------------------------------------------------------------------
    // Bootstrap
    // ------------------------------------------------------------------
    const student = getStudentFromUrl();
    if (!student) {
      window.location.href = 'index.html';
    }

    const dashboardParams = new URLSearchParams(window.location.search);
    const preselectBookId = dashboardParams.get('book');
    const preselectChapterId = dashboardParams.get('chapter');

    const switcher = document.getElementById('student-switch');
    populateStudentDropdown(switcher, student);

    switcher.addEventListener('change', () => {
      const value = switcher.value;
      if (value === ADD_NEW_SENTINEL) {
        handleStudentDropdownChange(switcher);
        return;
      }
      if (value && value !== student) {
        navigateToDashboard(value);
      }
    });

    // ------------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------------
    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'L0';
    }

    function isWordExcluded(wordId) {
      return studentExcluded.includes(wordId);
    }

    function getSentenceData(wordId) {
      return studentSentences[wordId] || { text: '', reviewed: false, comment: '' };
    }

    function getReviewStateForWord(wordId) {
      const s = getSentenceData(wordId);
      if (s.reviewed) return 'reviewed';
      if (s.text && s.text.trim().length > 0) return 'awaiting';
      return 'none';
    }

    function computeLevelCounts(vocabArray) {
      const counts = { L0: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    function computePoolCounts(vocabArray) {
      const counts = { L0: 0, L1: 0, L2: 0, L3: 0, L4: 0 };
      vocabArray.forEach(word => {
        if (isWordExcluded(word.id)) return;
        const level = getLevelForWord(word.id);
        counts[level] = (counts[level] || 0) + 1;
      });
      return counts;
    }

    function computeReviewedCount(vocabArray) {
      let count = 0;
      vocabArray.forEach(word => {
        const s = getSentenceData(word.id);
        if (s.reviewed) count++;
      });
      return count;
    }

    function getAllVocabForCurrentBook() {
      const all = [];
      const vocabByChapter = bookVocab[currentBookId] || {};
      Object.values(vocabByChapter).forEach(list => all.push(...list));
      return all;
    }

    // Apply level + review filters. Returns filtered array.
    function applyFilters(vocab) {
      return vocab.filter(word => {
        if (levelFilter !== 'all' && getLevelForWord(word.id) !== levelFilter) return false;
        if (reviewFilter !== 'all') {
          const state = getReviewStateForWord(word.id);
          if (reviewFilter !== state) return false;
        }
        return true;
      });
    }

    // ------------------------------------------------------------------
    // Data loaders
    // ------------------------------------------------------------------
    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        if (doc.exists) {
          const data = doc.data();
          studentProgress = data.progress || {};
          studentExcluded = data.excluded || [];
          studentSentences = data.sentences || {};
          console.log('Loaded progress for ' + student + ':',
                      Object.keys(studentProgress).length, 'progress entries;',
                      studentExcluded.length, 'excluded;',
                      Object.keys(studentSentences).length, 'sentences.');
        } else {
          studentProgress = {};
          studentExcluded = [];
          studentSentences = {};
          console.log('No progress doc for ' + student + ' - all defaults.');
        }
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
        studentExcluded = [];
        studentSentences = {};
      }
    }

    async function loadBooksIndex() {
      try {
        const response = await fetch('data/books-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        allBooks = data.books || [];
        allBooks.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
        console.log('Loaded books-index: ' + allBooks.length + ' book(s).');
      } catch (err) {
        console.error('Error loading books-index.json:', err);
        allBooks = [];
      }
    }

    async function loadChaptersIndexForBook(bookId) {
      try {
        const response = await fetch('data/book' + bookId + '/chapters-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        bookChapters[bookId] = data.chapters || [];
        console.log('Loaded chapters-index for book ' + bookId + ': ' + bookChapters[bookId].length + ' chapter(s).');
      } catch (err) {
        console.warn('No chapters-index for book ' + bookId + ' (or fetch failed):', err.message);
        bookChapters[bookId] = [];
      }
    }

    async function loadAllChapterVocabForBook(bookId) {
      const chapters = bookChapters[bookId] || [];
      bookVocab[bookId] = {};
      for (const ch of chapters) {
        try {
          const response = await fetch('data/book' + bookId + '/chapter' + ch.id + '.json');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          bookVocab[bookId][ch.id] = data.vocab || [];
        } catch (err) {
          console.error('Error loading book ' + bookId + ' chapter ' + ch.id + ':', err);
          bookVocab[bookId][ch.id] = [];
        }
      }
    }

    // ------------------------------------------------------------------
    // Toast notifications
    // ------------------------------------------------------------------
    let toastTimer = null;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'success') + ' visible';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('visible'); }, 2000);
    }

    // ------------------------------------------------------------------
    // Firestore write helpers
    // ------------------------------------------------------------------
    async function updateWordLevel(wordId, newLevel, selectEl, oldLevel) {
      try {
        const update = {
          progress: { [wordId]: newLevel },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentProgress[wordId] = newLevel;
        applyLevelClass(selectEl, newLevel);
        refreshCountsAfterChange();
        showToast('Saved', 'success');
      } catch (err) {
        console.error('Failed to update level:', err);
        selectEl.value = oldLevel;
        applyLevelClass(selectEl, oldLevel);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateWordExclusion(wordId, includeInPool, checkboxEl) {
      try {
        const update = { lastUpdated: firebase.firestore.FieldValue.serverTimestamp() };
        if (includeInPool) {
          update.excluded = firebase.firestore.FieldValue.arrayRemove(wordId);
        } else {
          update.excluded = firebase.firestore.FieldValue.arrayUnion(wordId);
        }
        await db.collection('students').doc(student).set(update, { merge: true });
        if (includeInPool) {
          studentExcluded = studentExcluded.filter(id => id !== wordId);
        } else {
          if (!studentExcluded.includes(wordId)) studentExcluded.push(wordId);
        }
        refreshPoolCountsForCurrentChapter();
        renderCrossChapterPool();
        showToast('Saved', 'success');
      } catch (err) {
        console.error('Failed to update exclusion:', err);
        checkboxEl.checked = !includeInPool;
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function bulkSetLevel(wordIds, newLevel) {
      if (wordIds.length === 0) return;
      try {
        const progressUpdate = {};
        wordIds.forEach(id => { progressUpdate[id] = newLevel; });
        const update = {
          progress: progressUpdate,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => { studentProgress[id] = newLevel; });
        renderChapterDetailFromCurrent();
        refreshCountsAfterChange();
        showToast(wordIds.length + ' words set to ' + newLevel, 'success');
      } catch (err) {
        console.error('Failed bulk level set:', err);
        showToast('Bulk update failed. Please try again.', 'error');
      }
    }

    async function bulkMarkReviewed(wordIds) {
      if (wordIds.length === 0) return;
      try {
        const sentencesUpdate = {};
        wordIds.forEach(id => {
          const existing = getSentenceData(id);
          sentencesUpdate[id] = {
            text: existing.text || '',
            reviewed: true,
            comment: existing.comment || '',
          };
        });
        const update = {
          sentences: sentencesUpdate,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => {
          const existing = getSentenceData(id);
          studentSentences[id] = { text: existing.text || '', reviewed: true, comment: existing.comment || '' };
        });
        renderChapterDetailFromCurrent();
        refreshCountsAfterChange();
        showToast(wordIds.length + ' words marked reviewed', 'success');
      } catch (err) {
        console.error('Failed bulk mark reviewed:', err);
        showToast('Bulk update failed. Please try again.', 'error');
      }
    }

    async function updateSentence(wordId, newText) {
      try {
        const existing = getSentenceData(wordId);
        const update = {
          sentences: { [wordId]: { text: newText, reviewed: existing.reviewed || false, comment: existing.comment || '' } },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentSentences[wordId] = { text: newText, reviewed: existing.reviewed || false, comment: existing.comment || '' };
        refreshCountsAfterChange();
        showToast('Sentence saved', 'success');
      } catch (err) {
        console.error('Failed to save sentence:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateReviewed(wordId, reviewed, checkboxEl) {
      try {
        const existing = getSentenceData(wordId);
        const update = {
          sentences: { [wordId]: { text: existing.text || '', reviewed: reviewed, comment: existing.comment || '' } },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentSentences[wordId] = { text: existing.text || '', reviewed: reviewed, comment: existing.comment || '' };
        const sentenceInput = document.querySelector('#details-' + wordId + ' .own-sentence-input');
        if (sentenceInput) {
          sentenceInput.disabled = reviewed;
        }
        refreshCountsAfterChange();
        showToast(reviewed ? 'Marked reviewed' : 'Unmarked reviewed', 'success');
      } catch (err) {
        console.error('Failed to update reviewed:', err);
        checkboxEl.checked = !reviewed;
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function updateComment(wordId, newComment) {
      try {
        const existing = getSentenceData(wordId);
        const update = {
          sentences: { [wordId]: { text: existing.text || '', reviewed: existing.reviewed || false, comment: newComment } },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentSentences[wordId] = { text: existing.text || '', reviewed: existing.reviewed || false, comment: newComment };
        showToast('Comment saved', 'success');
      } catch (err) {
        console.error('Failed to save comment:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function includeAllInPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;
      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayRemove(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentExcluded = studentExcluded.filter(id => !wordIds.includes(id));
        renderChapterDetailFromCurrent();
        showToast(wordIds.length + ' words included in practice', 'success');
      } catch (err) {
        console.error('Failed to include all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    async function excludeAllFromPractice(vocab) {
      const wordIds = vocab.map(w => w.id);
      if (wordIds.length === 0) return;
      try {
        const update = {
          excluded: firebase.firestore.FieldValue.arrayUnion(...wordIds),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        wordIds.forEach(id => { if (!studentExcluded.includes(id)) studentExcluded.push(id); });
        renderChapterDetailFromCurrent();
        showToast(wordIds.length + ' words excluded from practice', 'success');
      } catch (err) {
        console.error('Failed to exclude all:', err);
        showToast('Save failed. Please try again.', 'error');
      }
    }

    function applyLevelClass(selectEl, level) {
      LEVEL_ORDER.forEach(l => selectEl.classList.remove('level-' + l));
      selectEl.classList.add('level-' + level);
      selectEl.style.display = 'none';
      selectEl.offsetHeight;
      selectEl.style.display = '';
    }

    // ------------------------------------------------------------------
    // Refresh helpers
    // ------------------------------------------------------------------
    function refreshCountsAfterChange() {
      renderOverallProgress();
      renderCrossChapterPool();
      renderChapterList();
      if (currentChapterId) {
        refreshPoolCountsForCurrentChapter();
      }
    }

    function refreshPoolCountsForCurrentChapter() {
      if (!currentChapterId) return;
      const vocab = (bookVocab[currentBookId] || {})[currentChapterId] || [];
      const counts = computePoolCounts(vocab);
      document.querySelectorAll('.right-panel .pool-btn').forEach(btn => {
        const sourceLevel = btn.dataset.sourceLevel;
        const targetLevel = btn.dataset.targetLevel;
        if (!sourceLevel || !targetLevel) return;
        const label = (targetLevel === 'L4R')
          ? '\ud83d\udd04 L4'
          : sourceLevel + '\u2192' + targetLevel;
        btn.textContent = label + ' (' + counts[sourceLevel] + ')';
      });
    }

    function renderChapterDetailFromCurrent() {
      if (!currentChapterId) return;
      const chapter = (bookChapters[currentBookId] || []).find(c => c.id === currentChapterId);
      if (!chapter) return;
      renderChapterDetail({
        chapterId: chapter.id,
        chapterTitle: chapter.title,
        vocab: (bookVocab[currentBookId] || {})[chapter.id] || [],
      });
    }

    }

    // ------------------------------------------------------------------
    // Left panel: Books list
    // ------------------------------------------------------------------
    function renderBooksList() {
      const listEl = document.getElementById('books-list');
      listEl.innerHTML = '';
      if (allBooks.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No books registered yet.</li>';
        return;
      }
      allBooks.forEach(book => {
        const li = document.createElement('li');
        li.dataset.bookId = book.id;
        li.textContent = book.title;
        if (book.id === currentBookId) li.classList.add('selected');
        li.addEventListener('click', () => selectBook(book.id));
        listEl.appendChild(li);
      });

    // ------------------------------------------------------------------
    // Book selection
    // ------------------------------------------------------------------
    async function selectBook(bookId) {
      currentBookId = bookId;
      currentChapterId = null;

      document.querySelectorAll('#books-list li').forEach(li => {
        li.classList.toggle('selected', li.dataset.bookId === bookId);
      });

      if (!bookChapters[bookId]) {
        await loadChaptersIndexForBook(bookId);
      }
      if (!bookVocab[bookId]) {
        await loadAllChapterVocabForBook(bookId);
      }

      renderBookContent();
      renderRightPanelEmpty();

      const chapters = bookChapters[bookId] || [];
      let chapterToSelect = null;

      if (preselectChapterId) {
        const found = chapters.find(c => c.id === preselectChapterId);
        if (found) {
          chapterToSelect = found;
        } else {
          console.log('URL chapter param "' + preselectChapterId + '" not valid for book ' + bookId + '; falling back to first chapter.');
        }
      }

      if (!chapterToSelect && chapters.length > 0) {
        chapterToSelect = chapters[0];
      }

      if (chapterToSelect) {
        selectChapter(chapterToSelect);
      }
    }

    // Middle panel: Book content

      const container = document.getElementById('book-content');

        msg.className = 'empty-message';

      progressHeading.textContent = 'Overall Progress';
      container.appendChild(progressHeading);

      progressSummary.id = 'progress-summary';
      progressSummary.className = 'progress-summary';
      container.appendChild(progressSummary);
      renderOverallProgress();

      const crossPoolContainer = document.createElement('div');
      crossPoolContainer.id = 'cross-chapter-pool';
      crossPoolContainer.className = 'cross-chapter-pool';
      container.appendChild(crossPoolContainer);

      const total = allVocab.length;
      const counts = computeLevelCounts(allVocab);

      summaryEl.innerHTML = '';

      totalLine.className = 'total-line';
      totalLine.textContent = 'Total: ' + total + ' words';
      summaryEl.appendChild(totalLine);

      LEVEL_ORDER.forEach(level => {
        const line = document.createElement('div');

        line.textContent = meta.emoji + ' ' + meta.label + ': ' + counts[level];
        summaryEl.appendChild(line);

      reviewLine.textContent = REVIEW_EMOJI + ' Review: ' + reviewed;

      const containerEl = document.getElementById('cross-chapter-pool');
      if (!containerEl) return;
      containerEl.innerHTML = '';

      const allVocab = getAllVocabForCurrentBook();

    function handleCrossPoolClick(targetLevel) {
      window.location.href = 'exercise.html?level=' + targetLevel +
        '&book=' + encodeURIComponent(currentBookId) +
        '&chapter=all&student=' + encodeURIComponent(student);

    function renderChapterList() {
      const listEl = document.getElementById('chapter-list');
      if (!listEl) return;
      listEl.innerHTML = '';

      const chapters = bookChapters[currentBookId] || [];
      if (chapters.length === 0) {
        listEl.innerHTML = '<li class="empty-message">No chapters yet.</li>';
        return;
      }

      chapters.forEach(ch => {
        const vocab = (bookVocab[currentBookId] || {})[ch.id] || [];
        const counts = computeLevelCounts(vocab);
        const reviewed = computeReviewedCount(vocab);

        const li = document.createElement('li');
        li.dataset.chapterId = ch.id;
        if (ch.id === currentChapterId) li.classList.add('selected');

        const title = document.createElement('span');
        title.className = 'chapter-title';
        title.textContent = 'Chapter ' + ch.id + ': ' + ch.title;

        const meta = document.createElement('span');
        meta.className = 'chapter-meta';
        meta.textContent = ch.wordCount + ' words';

        const levelCounts = document.createElement('span');
        levelCounts.className = 'chapter-level-counts';
        const parts = LEVEL_ORDER.map(l => LEVEL_META[l].emoji + ' ' + counts[l]);
        parts.push(REVIEW_EMOJI + ' ' + reviewed);
        levelCounts.textContent = parts.join('  ');

        li.appendChild(title);
        li.appendChild(meta);
        li.appendChild(levelCounts);
        li.addEventListener('click', () => selectChapter(ch));

        listEl.appendChild(li);

        commentInput.rows = 1;
        commentInput.maxLength = 300;
        commentInput.value = getSentenceData(word.id).comment || '';
        commentInput.addEventListener('input', () => autoResizeTextarea(commentInput));
        commentInput.addEventListener('blur', () => {
          const newVal = commentInput.value.trim();
          if (newVal !== (getSentenceData(word.id).comment || '')) {
            updateComment(word.id, newVal);
          }
        });
        tdComment.appendChild(commentInput);
        row.appendChild(tdComment);

        tbody.appendChild(row);

        // Details row (hidden initially, contains own sentence input)
        const detailsRow = document.createElement('tr');
        detailsRow.className = 'details-row';
        detailsRow.dataset.wordId = word.id;
        detailsRow.id = 'details-' + word.id;

        const detailsCell = document.createElement('td');
        detailsCell.colSpan = 8;

        const detailsCard = document.createElement('div');
        detailsCard.className = 'details-card';

        // Top: Pinyin + English
        const headerDl = document.createElement('dl');
        headerDl.className = 'details-header-row';
        const items = [
          ['Pinyin', word.pinyin || ''],
          ['English', word.english || ''],
        ];
        items.forEach(([itemLabel, itemValue]) => {
          const dt = document.createElement('dt');
          dt.textContent = itemLabel;
          const dd = document.createElement('dd');
          dd.textContent = itemValue;
          headerDl.appendChild(dt);
          headerDl.appendChild(dd);
        });
        detailsCard.appendChild(headerDl);

        // Middle: Trad | Simp comparison
        const compareRow = document.createElement('div');
        compareRow.className = 'details-compare-row';

        const tradCol = document.createElement('div');
        tradCol.className = 'details-compare-col';
        const tradH = document.createElement('h4');
        tradH.textContent = 'Traditional';
        tradCol.appendChild(tradH);
        const tradWord = document.createElement('div');
        tradWord.className = 'compare-word';
        tradWord.textContent = word.traditional;
        tradCol.appendChild(tradWord);
        const tradSent = document.createElement('div');
        tradSent.className = 'compare-sentence';
        tradSent.textContent = word.contextSentence || '(no context sentence)';
        tradCol.appendChild(tradSent);
        compareRow.appendChild(tradCol);

        const simpCol = document.createElement('div');
        simpCol.className = 'details-compare-col';
        const simpH = document.createElement('h4');
        simpH.textContent = 'Simplified';
        simpCol.appendChild(simpH);
        const simpWord = document.createElement('div');
        simpWord.className = 'compare-word';
        simpWord.textContent = word.simplified || '(not generated)';
        simpCol.appendChild(simpWord);
        const simpSent = document.createElement('div');
        simpSent.className = 'compare-sentence';
        simpSent.textContent = word.contextSentenceSimplified || '(not generated)';
        simpCol.appendChild(simpSent);
        compareRow.appendChild(simpCol);

        detailsCard.appendChild(compareRow);

        // Bottom: Own sentence input
        const ownSentenceRow = document.createElement('div');
        ownSentenceRow.className = 'details-sentence-row';

        const ownSentenceLabel = document.createElement('div');
        ownSentenceLabel.className = 'details-sentence-label';
        ownSentenceLabel.textContent = 'Your sentence:';
        ownSentenceRow.appendChild(ownSentenceLabel);

        const ownSentenceInput = document.createElement('textarea');
        ownSentenceInput.className = 'own-sentence-input';
        ownSentenceInput.rows = 1;
        ownSentenceInput.maxLength = 200;
        ownSentenceInput.value = getSentenceData(word.id).text || '';
        ownSentenceInput.disabled = !!getSentenceData(word.id).reviewed;
        ownSentenceInput.addEventListener('input', () => autoResizeTextarea(ownSentenceInput));
        ownSentenceInput.addEventListener('blur', () => {
          const newVal = ownSentenceInput.value.trim();
          if (newVal !== (getSentenceData(word.id).text || '')) {
            updateSentence(word.id, newVal);
          }
        });
        ownSentenceRow.appendChild(ownSentenceInput);

        detailsCard.appendChild(ownSentenceRow);
        detailsCell.appendChild(detailsCard);
        detailsRow.appendChild(detailsCell);
        tbody.appendChild(detailsRow);

        // Re-apply expansion state if this word was expanded before re-render
        if (expandedWordIds.has(word.id)) {
          detailsRow.classList.add('expanded');
          detailsBtn.textContent = '🙈 Hide';
        }

        // Auto-resize on initial render
        setTimeout(() => {
          autoResizeTextarea(commentInput);
          autoResizeTextarea(ownSentenceInput);
        }, 0);
      });

      table.appendChild(tbody);
      rightEl.appendChild(table);

      console.log('Rendered book ' + currentBookId + ' chapter ' + chapterData.chapterId +
                  ' with ' + filteredVocab.length + ' words (of ' + chapterData.vocab.length + ' total).');
    }

    // ------------------------------------------------------------------
    // Confirmation for bulk actions
    // ------------------------------------------------------------------
    function confirmBulk(message) {
      return window.confirm(message);
    }

    function handleBulkLevelClick(level, chapterData) {
      const filtered = applyFilters(chapterData.vocab);
      if (filtered.length === 0) {
        showToast('No filtered words to update.', 'error');
        return;
      }
      const msg = 'Set ' + filtered.length + ' word(s) to ' + LEVEL_META[level].label + '?';
      if (!confirmBulk(msg)) return;
      bulkSetLevel(filtered.map(w => w.id), level);
    }

    function handleBulkReviewClick(chapterData) {
      const filtered = applyFilters(chapterData.vocab);
      if (filtered.length === 0) {
        showToast('No filtered words to update.', 'error');
        return;
      }
      const msg = 'Mark ' + filtered.length + ' word(s) as reviewed?';
      if (!confirmBulk(msg)) return;
      bulkMarkReviewed(filtered.map(w => w.id));
    }

    // ------------------------------------------------------------------
    // Row toggles + audio
    // ------------------------------------------------------------------
    function toggleRowDetails(wordId, button) {
      const detailsRow = document.getElementById('details-' + wordId);
      if (!detailsRow) return;
      const isExpanded = detailsRow.classList.contains('expanded');
      if (isExpanded) {
        detailsRow.classList.remove('expanded');
        button.textContent = '👁 Details';
        expandedWordIds.delete(wordId);
      } else {
        detailsRow.classList.add('expanded');
        button.textContent = '🙈 Hide';
        expandedWordIds.add(wordId);
        // Re-size textareas after expansion (they were hidden so scrollHeight was 0)
        setTimeout(() => {
          const commentInput = detailsRow.querySelector('.comment-input');
          const ownInput = detailsRow.querySelector('.own-sentence-input');
          if (commentInput) autoResizeTextarea(commentInput);
          if (ownInput) autoResizeTextarea(ownInput);
        }, 0);
      }
    }

    function expandAll() {
      document.querySelectorAll('.details-row').forEach(row => {
        row.classList.add('expanded');
        if (row.dataset.wordId) expandedWordIds.add(row.dataset.wordId);
      });
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '🙈 Hide');
      setTimeout(() => {
        document.querySelectorAll('.own-sentence-input').forEach(autoResizeTextarea);
        document.querySelectorAll('.comment-input').forEach(autoResizeTextarea);
      }, 0);
    }

    function collapseAll() {
      document.querySelectorAll('.details-row').forEach(row => {
        row.classList.remove('expanded');
        if (row.dataset.wordId) expandedWordIds.delete(row.dataset.wordId);
      });
      document.querySelectorAll('.details-btn').forEach(btn => btn.textContent = '👁 Details');
    }

    function playAudio(audioPath) {
      if (!audioPath) {
        console.warn('No audio path provided');
        return;
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = new Audio(audioPath);
      currentAudio.play().catch(err => console.error('Audio playback failed:', err));
    }

    // ------------------------------------------------------------------
    // Main init
    // ------------------------------------------------------------------
    async function init() {
      try {
        await loadStudentProgress();
        await loadBooksIndex();

        renderBooksList();

        if (allBooks.length === 0) {
          document.getElementById('book-content').innerHTML =
            '<p class="empty-message">No books registered. See Content Authoring Guide Section 2.</p>';
          return;
        }

        let targetBookId = null;
        if (preselectBookId) {
          const found = allBooks.find(b => b.id === preselectBookId);
          if (found) {
            targetBookId = preselectBookId;
          } else {
            console.log('URL book param "' + preselectBookId + '" not valid; falling back to first book.');
          }
        }
        if (!targetBookId) {
          targetBookId = allBooks[0].id;
        }

        await selectBook(targetBookId);

      } catch (err) {
        console.error('Initialization error:', err);
      }
    }

    init();
  </script>

</body>
</html>
