<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Exercise - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    /* ---------- Base ---------- */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: #EDE3D0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1E3A5F;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Top bar (sticky, navy) ---------- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: #1E3A5F;
      color: #F5EFE6;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .top-bar .back-link {
      color: #F5EFE6;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .top-bar .back-link:hover { opacity: 0.85; }
    .top-bar .student-label {
      color: rgba(245, 239, 230, 0.9);
      font-size: 14px;
    }

    /* ---------- Content wrapper ---------- */
    .content-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    /* ---------- Cards (session header + exercise body) ---------- */
    .card {
      background-color: #F5EFE6;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(30, 58, 95, 0.06), 0 4px 12px rgba(30, 58, 95, 0.04);
      border: 1px solid rgba(30, 58, 95, 0.08);
    }

    /* ---------- Session header ---------- */
    .session-header .book-line {
      font-size: 13px;
      color: rgba(30, 58, 95, 0.65);
      margin-bottom: 4px;
    }
    .session-header .level-line {
      font-size: 18px;
      color: #1E3A5F;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .session-header .instruction-line,
    .session-header .goal-line {
      font-size: 13px;
      color: rgba(30, 58, 95, 0.75);
      margin-bottom: 4px;
    }
    .session-header .session-counter {
      font-size: 12px;
      color: rgba(30, 58, 95, 0.55);
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .session-header .current-chapter {
      font-size: 14px;
      color: #1E3A5F;
      font-weight: 600;
      margin-top: 6px;
    }

    /* ---------- Exercise body card ---------- */
    .exercise-body {
      padding: 30px 28px;
    }

    /* ---------- Split Traditional / Simplified layout ---------- */
    .split-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .split-col {
      padding: 0 12px;
    }
    .split-col + .split-col {
      border-left: 1px solid rgba(30, 58, 95, 0.12);
    }
    .split-col-label {
      font-size: 11px;
      color: rgba(30, 58, 95, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .split-col-label-accent {
      width: 32px;
      height: 2px;
      background-color: rgba(30, 58, 95, 0.4);
      border-radius: 2px;
      margin: 0 auto 16px auto;
    }

    /* ---------- Word + sentence displays ---------- */
    .word-display {
      font-size: 44px;
      color: #1E3A5F;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.2;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
    }
    .sentence-display {
      font-size: 18px;
      color: #1E3A5F;
      text-align: center;
      line-height: 1.7;
      padding: 12px 8px;
      margin-bottom: 15px;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
    }
    .blank-fill {
      display: inline-block;
      letter-spacing: 2px;
      color: rgba(30, 58, 95, 0.4);
    }
    .filled-answer {
      font-weight: 600;
      background-color: #D9E7F5;
      color: #1E3A5F;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* ---------- Audio buttons ---------- */
    .audio-btn-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .audio-btn {
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(30, 58, 95, 0.25);
      border-radius: 999px;
      background-color: transparent;
      color: #1E3A5F;
      font-family: inherit;
      font-weight: 500;
      min-width: 200px;
      transition: all 0.15s;
    }
    .audio-btn:hover:not(:disabled) {
      background-color: rgba(30, 58, 95, 0.08);
    }
    .audio-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ---------- Shared info block (pinyin + english) ---------- */
    .shared-info-block {
      text-align: center;
      margin: 24px 0 20px 0;
      padding: 16px 0;
      border-top: 1px solid rgba(30, 58, 95, 0.12);
      border-bottom: 1px solid rgba(30, 58, 95, 0.12);
    }
    .shared-info-block .pinyin {
      font-size: 22px;
      color: #1E3A5F;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .shared-info-block .english {
      font-size: 16px;
      color: rgba(30, 58, 95, 0.75);
    }

    /* ---------- Reveal button (primary) ---------- */
    .reveal-btn {
      padding: 10px 32px;
      font-size: 15px;
      cursor: pointer;
      border: 1px solid #1E3A5F;
      border-radius: 8px;
      background-color: #1E3A5F;
      color: #F5EFE6;
      font-family: inherit;
      font-weight: 600;
      transition: background-color 0.15s;
    }
    .reveal-btn:hover {
      background-color: rgba(30, 58, 95, 0.9);
    }

    /* ---------- Hint button (muted) ---------- */
    .hint-btn {
      padding: 10px 28px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid rgba(30, 58, 95, 0.2);
      border-radius: 8px;
      background-color: transparent;
      color: rgba(30, 58, 95, 0.75);
      font-family: inherit;
      font-weight: 500;
      transition: all 0.15s;
    }
    .hint-btn:hover {
      background-color: rgba(30, 58, 95, 0.06);
    }
    .hint-display {
      font-size: 15px;
      color: #155724;
      background-color: #D4EDDA;
      border: 1px solid #7BC780;
      border-radius: 8px;
      padding: 10px 15px;
      margin: 10px auto;
      max-width: 400px;
      text-align: center;
    }
    .hint-display strong { font-weight: 700; }

    /* ---------- Action center (reveal / hint layout) ---------- */
    .action-center {
      text-align: center;
      margin-top: 24px;
    }
    .action-center > * + * { margin-top: 12px; }
    .action-center button + button { margin-left: 12px; }

    /* ---------- Progression buttons (Promote / Drop) ---------- */
    .progression-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .progression-btn {
      padding: 10px 22px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid;
      font-family: inherit;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .progression-btn:hover { opacity: 0.88; }
    .progression-btn.mastered {
      background-color: #D4EDDA;
      color: #155724;
      border-color: #7BC780;
    }
    .progression-btn.demote {
      background-color: #F8D8D8;
      color: #721C24;
      border-color: #DB5858;
    }

    /* ---------- Action buttons (Next word, Back to Dashboard) ---------- */
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 10px 22px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid rgba(30, 58, 95, 0.25);
      border-radius: 8px;
      background-color: transparent;
      color: #1E3A5F;
      text-decoration: none;
      display: inline-block;
      font-family: inherit;
      font-weight: 500;
      transition: background-color 0.15s;
    }
    .action-btn:hover {
      background-color: rgba(30, 58, 95, 0.06);
    }
    .action-btn.primary {
      background-color: #1E3A5F;
      color: #F5EFE6;
      border-color: #1E3A5F;
    }
    .action-btn.primary:hover {
      background-color: rgba(30, 58, 95, 0.9);
    }

    /* ---------- Empty / error messages ---------- */
    .empty-message, .error-message {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-message p, .error-message p {
      font-size: 16px;
      color: rgba(30, 58, 95, 0.7);
      margin-bottom: 24px;
    }

    /* ---------- Progression confirmation ---------- */
    .progression-confirmation {
      margin: 15px auto;
      font-size: 14px;
      color: #155724;
      background-color: #D4EDDA;
      border: 1px solid #7BC780;
      padding: 8px 16px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 500;
    }
    .progression-confirmation.demoted {
      color: #721C24;
      background-color: #F8D8D8;
      border-color: #DB5858;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      top: 15px;
      right: 20px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      color: #F5EFE6;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 1000;
      font-weight: 500;
    }
    .toast.visible { opacity: 1; }
    .toast.success { background-color: #155724; }
    .toast.error { background-color: #721C24; }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      .content-wrapper { padding: 16px 20px; }
      .session-header .level-line { font-size: 16px; }
      .exercise-body { padding: 24px 20px; }
      .word-display { font-size: 36px; }
      .sentence-display { font-size: 17px; }
    }

    @media (max-width: 700px) {
      .split-layout { grid-template-columns: 1fr; gap: 20px; }
      .split-col + .split-col {
        border-left: none;
        border-top: 1px solid rgba(30, 58, 95, 0.12);
        padding-top: 20px;
        margin-top: 10px;
      }
      .word-display { font-size: 32px; }
      .audio-btn { min-width: 180px; }
    }

    @media (max-width: 600px) {
      .top-bar { padding: 10px 16px; }
      .content-wrapper { padding: 12px 16px; }
      .card { padding: 16px 18px; }
      .exercise-body { padding: 20px 18px; }
      .word-display { font-size: 28px; }
      .sentence-display { font-size: 16px; }
      .action-center button + button { margin-left: 8px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a id="back-link" class="back-link" href="dashboard.html">← Back to Dashboard</a>
    <span id="student-label" class="student-label"></span>
  </div>

  <div class="content-wrapper">
    <div id="app-container">
      <p class="empty-message">Loading...</p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>
  <script src="js/modal.js"></script>

  <script>
    // ------------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------------
    const LEVEL_META = {
      L0:  { emoji: '🔴', label: 'L0 Discover' },
      L1:  { emoji: '🟠', label: 'L1 Read' },
      L2:  { emoji: '🟡', label: 'L2 Listen' },
      L3:  { emoji: '🟢', label: 'L3 Usage' },
      L4:  { emoji: '🔵', label: 'L4 Write' },
      L4R: { emoji: '🔄', label: 'L4 Review' },
    };

    const LEVEL_SOURCE = {
      L1:  'L0',
      L2:  'L1',
      L3:  'L2',
      L4:  'L3',
      L4R: 'L4',
    };

    const LEVEL_TEXT = {
      L1: {
        instruction: 'Can you read this word and know its meaning?',
        goal: 'Able to read the word aloud and recall its meaning',
      },
      L2: {
        instruction: 'Listen carefully to guess the word',
        goal: 'Correctly identify the word by listening alone',
      },
      L3: {
        instruction: 'Guess the missing word. Tap Hint to see the English meaning.',
        goal: 'Correctly pick the right word for this sentence',
      },
      L4: {
        instruction: 'Play the word and write the full character on paper',
        goal: 'Able to write the full character from memory',
      },
      L4R: {
        instruction: 'Listen and fill in the missing word. Test that you still remember it fully.',
        goal: 'Confirm you can still recognise, read, understand, and write this word from memory',
      },
    };

    // ------------------------------------------------------------------
    // URL parameter parsing
    // ------------------------------------------------------------------
    const student = getStudentFromUrl();
    const params = new URLSearchParams(window.location.search);
    const level = params.get('level');
    const bookIdRaw = params.get('book');
    const chapterScopeRaw = params.get('chapter');
    const chapterScope = (chapterScopeRaw && chapterScopeRaw.toLowerCase() === 'all') ? 'all' : chapterScopeRaw;
    const bookId = bookIdRaw ? bookIdRaw.trim() : null;

    if (!student) window.location.href = 'index.html';
    if (!level || !chapterScope || !bookId) window.location.href = buildBackToDashboardUrl();

    const VALID_LEVELS = ['L1', 'L2', 'L3', 'L4', 'L4R'];
    if (!VALID_LEVELS.includes(level)) window.location.href = buildBackToDashboardUrl();

    document.getElementById('back-link').href = buildBackToDashboardUrl();
    document.getElementById('student-label').textContent = 'Student: ' + student;

    // ------------------------------------------------------------------
    // Global state
    // ------------------------------------------------------------------
    let studentProgress = {};
    let studentExcluded = [];
    let bookMeta = null;
    let allChapters = [];
    let chapterVocab = {};
    let pool = [];
    let sessionMastered = new Set();
    let sessionSeen = new Set();
    let currentWordEntry = null;
    let isRevealed = false;
    let sessionEnded = null;
    let currentAudio = null;
    let hintShown = false;

    // ------------------------------------------------------------------
    // Loaders
    // ------------------------------------------------------------------
    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        if (doc.exists) {
          studentProgress = doc.data().progress || {};
          studentExcluded = doc.data().excluded || [];
        } else {
          studentProgress = {};
          studentExcluded = [];
        }
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
        studentExcluded = [];
      }
    }

    async function loadBookMeta() {
      try {
        const response = await fetch('data/books-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        const found = (data.books || []).find(b => b.id === bookId);
        if (!found) throw new Error('Book ' + bookId + ' not registered.');
        bookMeta = found;
      } catch (err) {
        console.error('Error loading book meta:', err);
        bookMeta = { id: bookId, title: 'Book ' + bookId };
      }
    }

    async function loadChapters() {
      try {
        const response = await fetch('data/book' + bookId + '/chapters-index.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        allChapters = data.chapters || [];
      } catch (err) {
        throw new Error('Could not load chapters for book ' + bookId + '.');
      }

      const chaptersToLoad = (chapterScope === 'all')
        ? allChapters
        : allChapters.filter(c => c.id === chapterScope);

      if (chaptersToLoad.length === 0) {
        throw new Error('Chapter "' + chapterScope + '" not found in book ' + bookId + '.');
      }

      chapterVocab = {};
      for (const ch of chaptersToLoad) {
        const response = await fetch('data/book' + bookId + '/chapter' + ch.id + '.json');
        if (!response.ok) throw new Error('HTTP ' + response.status + ' loading chapter ' + ch.id);
        const data = await response.json();
        chapterVocab[ch.id] = data.vocab || [];
      }
    }

    // ------------------------------------------------------------------
    // Pool computation
    // ------------------------------------------------------------------
    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'L0';
    }
    function isWordExcluded(wordId) {
      return studentExcluded.includes(wordId);
    }
    function computePool() {
      const sourceLevel = LEVEL_SOURCE[level];
      pool = [];
      Object.keys(chapterVocab).forEach(chapterId => {
        chapterVocab[chapterId].forEach(word => {
          if (isWordExcluded(word.id)) return;
          if (getLevelForWord(word.id) !== sourceLevel) return;
          pool.push({ word, chapterId });
        });
      });
      console.log('Pool computed: ' + pool.length + ' words at source level ' + sourceLevel);
    }
    function getRemainingPool() {
      return pool.filter(entry => !sessionMastered.has(entry.word.id) && !sessionSeen.has(entry.word.id));
    }
    function pickRandomFromPool(entries) {
      if (entries.length === 0) return null;
      return entries[Math.floor(Math.random() * entries.length)];
    }

    // ------------------------------------------------------------------
    // Utility
    // ------------------------------------------------------------------
    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function buildBlankedSentence(sentence, wordText) {
      if (!sentence || !wordText) return sentence || '';
      if (sentence.indexOf(wordText) === -1) {
        console.warn('Word "' + wordText + '" not found in context sentence.');
        return sentence;
      }
      const blank = '\uFF3F'.repeat(wordText.length);
      return sentence.split(wordText).join(blank);
    }
    function buildFilledSentenceHtml(sentence, wordText) {
      if (!sentence) return '';
      const escapedSentence = escapeHtml(sentence);
      if (!wordText || sentence.indexOf(wordText) === -1) return escapedSentence;
      const escapedWord = escapeHtml(wordText);
      const wrapped = '<span class="filled-answer">' + escapedWord + '</span>';
      return escapedSentence.split(escapedWord).join(wrapped);
    }
    function getChapterTitle(chapterId) {
      const ch = allChapters.find(c => c.id === chapterId);
      return ch ? ch.title : '';
    }
    function getCurrentVocabularySourceText() {
      if (!currentWordEntry) return '';
      const chId = currentWordEntry.chapterId;
      const chTitle = getChapterTitle(chId);
      return 'Current vocabulary is from "Chapter ' + chId + (chTitle ? ': ' + chTitle : '') + '"';
    }
    function getSessionCounterText() {
      if (level === 'L4R') {
        return 'Session: ' + sessionMastered.size + ' confirmed full understanding';
      }
      return 'Session: ' + sessionMastered.size + ' promoted';
    }

    // ------------------------------------------------------------------
    // Audio playback
    // ------------------------------------------------------------------
    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
    }
    function playAudio(audioPath) {
      if (!audioPath) { console.warn('No audio path.'); return; }
      stopCurrentAudio();
      currentAudio = new Audio(audioPath);
      currentAudio.play().catch(err => console.error('Audio playback failed:', err));
    }

    // ------------------------------------------------------------------
    // Session header
    // ------------------------------------------------------------------
    function renderSessionHeader() {
      const bookLine = bookMeta ? bookMeta.title : ('Book ' + bookId);
      const levelEmoji = LEVEL_META[level] ? LEVEL_META[level].emoji : '';
      const levelLabel = LEVEL_META[level] ? LEVEL_META[level].label : level;
      const scopeSuffix = (chapterScope === 'all') ? ' - All Chapters' : (' - Chapter ' + chapterScope + ' Only');
      const levelDisplay = levelEmoji + ' ' + levelLabel + ' Exercise' + scopeSuffix;
      const txt = LEVEL_TEXT[level] || { instruction: '', goal: '' };
      const currentChapterLine = getCurrentVocabularySourceText();
      return (
        '<div class="card session-header">' +
          '<div class="book-line">\ud83d\udcda ' + escapeHtml(bookLine) + '</div>' +
          '<div class="level-line">' + levelDisplay + '</div>' +
          '<div class="instruction-line">\ud83d\udca1 Instruction: ' + escapeHtml(txt.instruction) + '</div>' +
          '<div class="goal-line">\ud83c\udfaf Goal: ' + escapeHtml(txt.goal) + '</div>' +
          '<div class="session-counter">' + getSessionCounterText() + '</div>' +
          (currentChapterLine ? '<div class="current-chapter">' + escapeHtml(currentChapterLine) + '</div>' : '') +
        '</div>'
      );
    }
    function updateSessionCounter() {
      const counterEl = document.querySelector('.session-header .session-counter');
      if (counterEl) counterEl.textContent = getSessionCounterText();
    }

    // ------------------------------------------------------------------
    // Concealed screen rendering (per level)
    // ------------------------------------------------------------------
    function renderConcealedScreen() {
      let inner = '';
      if (level === 'L1') inner = renderConcealedL1();
      else if (level === 'L2') inner = renderConcealedL2();
      else if (level === 'L3') inner = renderConcealedL3();
      else if (level === 'L4') inner = renderConcealedL4();
      else if (level === 'L4R') inner = renderConcealedL4R();

      const html = '<div class="card exercise-body">' + inner + '</div>';
      document.getElementById('app-container').innerHTML = renderSessionHeader() + html;
      wireConcealedActions();
    }

    function renderConcealedL1() {
      const word = currentWordEntry.word;
      return (
        renderSplitLayout(
          '<div class="word-display">' + escapeHtml(word.traditional) + '</div>',
          '<div class="word-display">' + escapeHtml(word.simplified) + '</div>'
        ) +
        '<div class="action-center">' +
          '<button id="reveal-btn" class="reveal-btn">Reveal</button>' +
        '</div>'
      );
    }
    function renderConcealedL2() {
      return (
        renderSplitLayout(
          renderAudioColumn('cantonese'),
          renderAudioColumn('mandarin')
        ) +
        '<div class="action-center">' +
          '<div id="hint-container"></div>' +
          '<button id="hint-btn" class="hint-btn">Hint</button>' +
          '<button id="reveal-btn" class="reveal-btn">Reveal</button>' +
        '</div>'
      );
    }
    function renderConcealedL3() {
      const word = currentWordEntry.word;
      const blankedTrad = buildBlankedSentence(word.contextSentence, word.traditional);
      const blankedSimp = buildBlankedSentence(word.contextSentenceSimplified || '', word.simplified);
      return (
        renderSplitLayout(
          '<div class="sentence-display">' + escapeHtml(blankedTrad) + '</div>' + renderAudioColumn('cantonese', true),
          '<div class="sentence-display">' + escapeHtml(blankedSimp) + '</div>' + renderAudioColumn('mandarin', true)
        ) +
        '<div class="action-center">' +
          '<div id="hint-container"></div>' +
          '<button id="hint-btn" class="hint-btn">Hint</button>' +
          '<button id="reveal-btn" class="reveal-btn">Reveal</button>' +
        '</div>'
      );
    }
    function renderConcealedL4() {
      const word = currentWordEntry.word;
      return (
        renderSplitLayout(
          renderAudioColumn('cantonese'),
          renderAudioColumn('mandarin')
        ) +
        '<div class="shared-info-block">' +
          '<div class="pinyin">' + escapeHtml(word.pinyin || '') + '</div>' +
          '<div class="english">' + escapeHtml(word.english || '') + '</div>' +
        '</div>' +
        '<div class="action-center">' +
          '<button id="reveal-btn" class="reveal-btn">Reveal</button>' +
        '</div>'
      );
    }
    function renderConcealedL4R() {
      return renderConcealedL3();
    }

    function renderAudioColumn(language, isolatedOnly) {
      const langLabel = (language === 'cantonese') ? 'Cantonese' : 'Mandarin';
      let html = '<div class="audio-btn-row">';
      html += '<button class="audio-btn" data-action="play-word" data-lang="' + language + '">\ud83d\udd0a Play Word (' + langLabel + ')</button>';
      if (!isolatedOnly) {
        html += '<button class="audio-btn" data-action="play-sentence" data-lang="' + language + '">\ud83d\udd0a Play Sentence (' + langLabel + ')</button>';
      }
      html += '</div>';
      return html;
    }

    function renderSplitLayout(leftHtml, rightHtml) {
      return (
        '<div class="split-layout">' +
          '<div class="split-col">' +
            '<div class="split-col-label">Traditional</div>' +
            '<div class="split-col-label-accent"></div>' +
            leftHtml +
          '</div>' +
          '<div class="split-col">' +
            '<div class="split-col-label">Simplified</div>' +
            '<div class="split-col-label-accent"></div>' +
            rightHtml +
          '</div>' +
        '</div>'
      );
    }

    // ------------------------------------------------------------------
    // Revealed screen (shared across all levels)
    // ------------------------------------------------------------------
    function renderRevealedScreen() {
      const word = currentWordEntry.word;
      const filledTradHtml = buildFilledSentenceHtml(word.contextSentence, word.traditional);
      const filledSimpHtml = buildFilledSentenceHtml(word.contextSentenceSimplified || '', word.simplified);

      const inner =
        renderSplitLayout(
          '<div class="word-display">' + escapeHtml(word.traditional) + '</div>' +
          '<div class="sentence-display">' + filledTradHtml + '</div>' +
          renderAudioColumn('cantonese'),
          '<div class="word-display">' + escapeHtml(word.simplified) + '</div>' +
          '<div class="sentence-display">' + filledSimpHtml + '</div>' +
          renderAudioColumn('mandarin')
        ) +
        '<div class="shared-info-block">' +
          '<div class="pinyin">' + escapeHtml(word.pinyin || '') + '</div>' +
          '<div class="english">' + escapeHtml(word.english || '') + '</div>' +
        '</div>' +
        renderProgressionButtons() +
        '<div id="progression-confirmation-container" style="text-align:center;"></div>' +
        '<div class="action-buttons">' +
          '<button id="next-word-btn" class="action-btn primary">Next word</button>' +
          '<a class="action-btn" href="' + buildBackToDashboardUrl() + '">Back to Dashboard</a>' +
        '</div>';

      const html = '<div class="card exercise-body">' + inner + '</div>';
      document.getElementById('app-container').innerHTML = renderSessionHeader() + html;
      wireRevealedActions();
    }

    function renderProgressionButtons() {
      let html = '<div class="progression-buttons">';
      if (level === 'L1') {
        html += '<button id="promote-btn" class="progression-btn mastered">\u2713 Promote to L1 Read</button>';
      } else if (level === 'L2') {
        html += '<button id="promote-btn" class="progression-btn mastered">\u2713 Promote to L2 Listen</button>';
        html += '<button id="drop-btn" class="progression-btn demote">\u2193 Drop to L0 Discover</button>';
      } else if (level === 'L3') {
        html += '<button id="promote-btn" class="progression-btn mastered">\u2713 Promote to L3 Usage</button>';
        html += '<button id="drop-btn" class="progression-btn demote">\u2193 Drop to L1 Read</button>';
      } else if (level === 'L4') {
        html += '<button id="promote-btn" class="progression-btn mastered">\u2713 Promote to L4 Write</button>';
        html += '<button id="drop-btn" class="progression-btn demote">\u2193 Drop to L2 Listen</button>';
      } else if (level === 'L4R') {
        html += '<button id="drop-btn" class="progression-btn demote">\u2193 Drop to L3 Usage</button>';
      }
      html += '</div>';
      return html;
    }

    function progressionTargetOnPromote() {
      if (level === 'L1') return 'L1';
      if (level === 'L2') return 'L2';
      if (level === 'L3') return 'L3';
      if (level === 'L4') return 'L4';
      if (level === 'L4R') return null;
      return null;
    }
    function progressionTargetOnDrop() {
      if (level === 'L2') return 'L0';
      if (level === 'L3') return 'L1';
      if (level === 'L4') return 'L2';
      if (level === 'L4R') return 'L3';
      return null;
    }

    // ------------------------------------------------------------------
    // Firestore write
    // ------------------------------------------------------------------
    async function updateWordLevelForCurrentWord(newLevel) {
      if (!currentWordEntry) return { ok: false };
      const wordId = currentWordEntry.word.id;
      try {
        const update = {
          progress: { [wordId]: newLevel },
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection('students').doc(student).set(update, { merge: true });
        studentProgress[wordId] = newLevel;
        return { ok: true };
      } catch (err) {
        console.error('Failed to set level:', err);
        return { ok: false, error: err };
      }
    }

    // ------------------------------------------------------------------
    // Wiring
    // ------------------------------------------------------------------
    function wireConcealedActions() {
      const revealBtn = document.getElementById('reveal-btn');
      if (revealBtn) {
        revealBtn.addEventListener('click', () => {
          isRevealed = true;
          renderRevealedScreen();
        });
      }
      const hintBtn = document.getElementById('hint-btn');
      if (hintBtn) {
        hintBtn.addEventListener('click', () => {
          if (hintShown) return;
          hintShown = true;
          const hintContainer = document.getElementById('hint-container');
          if (hintContainer && currentWordEntry) {
            hintContainer.innerHTML = '<div class="hint-display"><strong>English:</strong> ' + escapeHtml(currentWordEntry.word.english || '') + '</div>';
          }
          hintBtn.style.display = 'none';
        });
      }
      wireAudioButtons();
    }
    function wireRevealedActions() {
      const nextBtn = document.getElementById('next-word-btn');
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          if (currentWordEntry) {
            const wordId = currentWordEntry.word.id;
            if (level === 'L4R') {
              if (!sessionSeen.has(wordId)) sessionMastered.add(wordId);
            } else {
              if (!sessionMastered.has(wordId)) sessionSeen.add(wordId);
            }
          }
          moveToNextWord();
        });
      }
      const promoteBtn = document.getElementById('promote-btn');
      if (promoteBtn) {
        promoteBtn.addEventListener('click', async () => {
          const target = progressionTargetOnPromote();
          if (!target) return;
          const result = await updateWordLevelForCurrentWord(target);
          if (result.ok) {
            const wordId = currentWordEntry.word.id;
            sessionSeen.delete(wordId);
            sessionMastered.add(wordId);
            showToast('Saved', 'success');
            showProgressionConfirmation(target, false);
            updateSessionCounter();
          } else {
            showToast('Save failed. Please try again.', 'error');
          }
        });
      }
      const dropBtn = document.getElementById('drop-btn');
      if (dropBtn) {
        dropBtn.addEventListener('click', async () => {
          const target = progressionTargetOnDrop();
          if (!target) return;
          const result = await updateWordLevelForCurrentWord(target);
          if (result.ok) {
            const wordId = currentWordEntry.word.id;
            sessionMastered.delete(wordId);
            sessionSeen.add(wordId);
            showToast('Saved', 'success');
            showProgressionConfirmation(target, true);
            updateSessionCounter();
          } else {
            showToast('Save failed. Please try again.', 'error');
          }
        });
      }
      wireAudioButtons();
    }
    function wireAudioButtons() {
      if (!currentWordEntry) return;
      const word = currentWordEntry.word;
      document.querySelectorAll('button[data-action="play-word"]').forEach(btn => {
        const lang = btn.dataset.lang;
        const audio = (word.audio && word.audio[lang]) ? word.audio[lang].isolated : null;
        btn.addEventListener('click', () => playAudio(audio));
        if (!audio) btn.disabled = true;
      });
      document.querySelectorAll('button[data-action="play-sentence"]').forEach(btn => {
        const lang = btn.dataset.lang;
        const sen = (word.audio && word.audio[lang]) ? word.audio[lang].sentence : null;
        btn.addEventListener('click', () => playAudio(sen));
        if (!sen) btn.disabled = true;
      });
    }
    function showProgressionConfirmation(targetLevel, isDrop) {
      const container = document.getElementById('progression-confirmation-container');
      if (!container) return;
      const confirmation = document.createElement('div');
      confirmation.className = 'progression-confirmation' + (isDrop ? ' demoted' : '');
      const label = LEVEL_META[targetLevel] ? LEVEL_META[targetLevel].label : targetLevel;
      const prefix = isDrop ? '\u2193 This word has moved back to ' : '\u2713 This word has been promoted to ';
      confirmation.textContent = prefix + label;
      container.innerHTML = '';
      container.appendChild(confirmation);
    }

    // ------------------------------------------------------------------
    // Session transitions
    // ------------------------------------------------------------------
    function moveToNextWord() {
      isRevealed = false;
      hintShown = false;
      const remaining = getRemainingPool();
      if (remaining.length === 0) {
        sessionEnded = (sessionSeen.size === 0) ? 'all' : 'mixed';
        currentWordEntry = null;
        renderEndOfSession();
        return;
      }
      currentWordEntry = pickRandomFromPool(remaining);
      renderConcealedScreen();
    }
    function handleRetest() {
      sessionSeen.clear();
      sessionEnded = null;
      moveToNextWord();
    }
    function renderEndOfSession() {
      if (sessionEnded === 'all') {
        const isReview = (level === 'L4R');
        const msg = isReview
          ? '\ud83c\udf89 You confirmed full understanding on all words!'
          : '\ud83c\udf89 You\'ve promoted all words to the next level! Great job.';
        const counter = isReview
          ? 'Session: ' + sessionMastered.size + ' confirmed full understanding'
          : 'Session: ' + sessionMastered.size + ' promoted';
        const inner =
          '<div class="empty-message">' +
            '<p>' + msg + '</p>' +
            '<p><small>' + counter + '</small></p>' +
            '<div class="action-buttons" style="justify-content:center;margin-top:24px">' +
              '<a class="action-btn primary" href="' + buildBackToDashboardUrl() + '">Back to Dashboard</a>' +
            '</div>' +
          '</div>';
        document.getElementById('app-container').innerHTML = renderSessionHeader() + '<div class="card exercise-body">' + inner + '</div>';
      } else if (sessionEnded === 'mixed') {
        const isReview = (level === 'L4R');
        const doneLabel = isReview ? 'confirmed' : 'promoted';
        const inner =
          '<div class="empty-message">' +
            '<p>Session complete.</p>' +
            '<p>You ' + doneLabel + ' <strong>' + sessionMastered.size + '</strong> word(s). ' +
               '<strong>' + sessionSeen.size + '</strong> word(s) seen but not ' + doneLabel + '.</p>' +
            '<div class="action-buttons" style="justify-content:center;margin-top:24px">' +
              '<button id="retest-btn" class="action-btn primary">Re-test previous words</button>' +
              '<a class="action-btn" href="' + buildBackToDashboardUrl() + '">Back to Dashboard</a>' +
            '</div>' +
          '</div>';
        document.getElementById('app-container').innerHTML = renderSessionHeader() + '<div class="card exercise-body">' + inner + '</div>';
        const retest = document.getElementById('retest-btn');
        if (retest) retest.addEventListener('click', handleRetest);
      }
    }

    // ------------------------------------------------------------------
    // Toast
    // ------------------------------------------------------------------
    let toastTimer = null;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'success') + ' visible';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('visible'); }, 1500);
    }

    // ------------------------------------------------------------------
    // Back to Dashboard URL
    // ------------------------------------------------------------------
    function buildBackToDashboardUrl() {
      let url = 'dashboard.html?student=' + encodeURIComponent(student);
      if (bookId) url += '&book=' + encodeURIComponent(bookId);
      if (chapterScope && chapterScope !== 'all') url += '&chapter=' + encodeURIComponent(chapterScope);
      return url;
    }

    // ------------------------------------------------------------------
    // Error rendering
    // ------------------------------------------------------------------
    function renderErrorMessage(msg) {
      const inner =
        '<div class="error-message">' +
          '<p>' + escapeHtml(msg) + '</p>' +
          '<a class="action-btn" href="' + buildBackToDashboardUrl() + '">Back to Dashboard</a>' +
        '</div>';
      document.getElementById('app-container').innerHTML = '<div class="card exercise-body">' + inner + '</div>';
    }
    function renderEmptyPool() {
      const inner =
        '<div class="empty-message">' +
          '<p>No words to practice at this level.</p>' +
          '<a class="action-btn" href="' + buildBackToDashboardUrl() + '">Back to Dashboard</a>' +
        '</div>';
      document.getElementById('app-container').innerHTML = renderSessionHeader() + '<div class="card exercise-body">' + inner + '</div>';
    }

    // ------------------------------------------------------------------
    // Init
    // ------------------------------------------------------------------
    async function init() {
      try {
        await loadStudentProgress();
        await loadBookMeta();
        await loadChapters();
        computePool();

        const remaining = getRemainingPool();
        if (remaining.length === 0) {
          renderEmptyPool();
          return;
        }
        currentWordEntry = pickRandomFromPool(remaining);
        renderConcealedScreen();
      } catch (err) {
        console.error('Exercise init error:', err);
        renderErrorMessage(err.message || 'Something went wrong loading the exercise.');
      }
    }

    init();
  </script>

</body>
</html>
