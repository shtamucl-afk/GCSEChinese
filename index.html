<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#F5EFE6',
            navy:    '#1E3A5F',
            'level-l0': '#DB5858',
            'level-l1': '#5AA5D6',
            'level-l2': '#EFBE4A',
            'level-l3': '#FA961B',
            'level-l4': '#7BC780',
            promote: '#7BC780',
            drop:    '#DB5858',
            info:    '#5AA5D6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            tc: ['Noto Sans TC', 'Inter', 'system-ui', 'sans-serif'],
            emoji: ['Noto Color Emoji', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
</head>
<body>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="favicon.png" alt="" style="height:32px;width:32px;border-radius:6px;">
    <h1 style="margin:0;">Chinese iGCSE Vocabulary Trainer</h1>
  </div>
  <p>Please select your name to start learning.</p>

  <hr>

  <label for="student-select">Who are you?</label>
  <br>
  <select id="student-select">
    <option value="">Loading students...</option>
  </select>
  <br><br>
  <button id="start-button">Start</button>

  <hr>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <!-- Shared student helpers -->
  <script src="js/student.js"></script>

  <!-- Page logic -->
  <script>
    const selectEl = document.getElementById('student-select');

    // Populate dropdown on load
    populateStudentDropdown(selectEl);

    // "+ Add new student" is handled immediately on change
    selectEl.addEventListener('change', () => {
      handleStudentDropdownChange(selectEl);
    });

    // Start button navigates for real name selections
    document.getElementById('start-button').addEventListener('click', () => {
      const value = selectEl.value;

      if (!value) {
        alert('Please select your name first.');
        return;
      }

      if (value === ADD_NEW_SENTINEL) {
        // Trigger the add-new flow (in case user selected it then clicked Start)
        handleStudentDropdownChange(selectEl);
        return;
      }

      // Real name selected → navigate to their dashboard
      navigateToDashboard(value);
    });
  </script>
</body>
</html>
