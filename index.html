<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese iGCSE Vocabulary Trainer</title>
</head>
<body>
  <h1>Chinese iGCSE Vocabulary Trainer</h1>
  <p>Welcome! This is a self-learning tool for Traditional Chinese vocabulary.</p>
  
  <hr>
  
  <label for="student-select">Who are you?</label>
  <br>
  <select id="student-select">
    <option value="">Loading students...</option>
  </select>
  <br><br>
  <button id="start-button">Start</button>

  <hr>
  
  <p><small>Milestone 1 — Firebase wired, no data yet</small></p>

  https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js
  ebase-firestore-compat.js"></script>
  js/firebase-config.js
  
  <script>
    async function loadStudents() {
      const select = document.getElementById('student-select');
      try {
        const doc = await db.collection('studentIndex').doc('list').get();
        if (doc.exists) {
          const names = doc.data().names || [];
          if (names.length === 0) {
            select.innerHTML = '<option value="">(no students yet)</option>';
          } else {
            select.innerHTML = '<option value="">-- Select your name --</option>';
            names.forEach(name => {
              const opt = document.createElement('option');
              opt.value = name;
              opt.textContent = name;
              select.appendChild(opt);
            });
          }
        } else {
          select.innerHTML = '<option value="">(studentIndex/list not created)</option>';
        }
        console.log("Students loaded");
      } catch (err) {
        console.error("Error loading students:", err);
        select.innerHTML = '<option value="">(error loading - see console)</option>';
      }
    }

    loadStudents();

    document.getElementById('start-button').addEventListener('click', () => {
      const selected = document.getElementById('student-select').value;
      if (!selected) {
        alert('Please select your name first');
      } else {
        alert('Hello ' + selected + '! (Dashboard coming in Milestone 3)');
      }
    });
  </script>
</body>
</html>
