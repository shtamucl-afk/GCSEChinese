<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    /* Base */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #EDE3D0;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Card container */
    .card {
      width: 100%;
      max-width: 448px;
      border-radius: 16px;
      overflow: hidden;
      background-color: #F5EFE6;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    /* Top navy section */
    .card-top {
      background-color: #1E3A5F;
      padding: 40px 32px;
      text-align: center;
    }
    .favicon-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .favicon-img {
      width: 200px;
      height: 200px;
      border-radius: 8px;
    }
    .card-title {
      color: #F5EFE6;
      font-size: 24px;
      font-weight: 600;
      line-height: 1.25;
      margin: 0;
    }
    .card-divider-wrapper {
      display: flex;
      justify-content: center;
      margin: 12px 0;
    }
    .card-divider {
      width: 64px;
      height: 1px;
      background-color: rgba(245, 239, 230, 0.4);
    }
    .card-tagline {
      color: rgba(245, 239, 230, 0.9);
      font-size: 18px;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
      margin: 0;
    }

    /* Bottom cream section */
    .card-bottom {
      background-color: #F5EFE6;
      padding: 32px;
    }

    /* Student label */
    .student-label {
      display: block;
      color: #1E3A5F;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    /* Dropdown wrapper */
    .dropdown-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    .dropdown-icon-left {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(30, 58, 95, 0.7);
      font-family: 'Noto Color Emoji', system-ui, sans-serif;
      pointer-events: none;
    }
    .dropdown-icon-right {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(30, 58, 95, 0.6);
      pointer-events: none;
    }
    #student-switch {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      border-radius: 8px;
      border: 1px solid rgba(30, 58, 95, 0.3);
      background-color: #ffffff;
      padding: 12px 36px;
      color: #1E3A5F;
      font-weight: 500;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
    }
    #student-switch:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(30, 58, 95, 0.4);
    }

    /* Start button */
    #start-btn {
      width: 100%;
      background-color: #1E3A5F;
      color: #F5EFE6;
      font-weight: 600;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      transition: background-color 0.15s, box-shadow 0.15s;
    }
    #start-btn:hover {
      background-color: rgba(30, 58, 95, 0.9);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }
    .emoji-inline {
      font-family: 'Noto Color Emoji', system-ui, sans-serif;
    }

    /* Feature pills row */
    .feature-pills {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(30, 58, 95, 0.7);
    }
    .feature-pill {
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="card-top">
      <div class="favicon-wrapper">
        <img src="favicon.png" alt="" class="favicon-img">
      </div>
      <h1 class="card-title">
        Chinese iGCSE Vocabulary Trainer
      </h1>
      <div class="card-divider-wrapper">
        <div class="card-divider"></div>
      </div>
      <p class="card-tagline">
        &#23416;&#32722;&#20013;&#25991;&#65292;&#25552;&#21319;&#33258;&#20449;
      </p>
    </div>

    <div class="card-bottom">

      <label for="student-switch" class="student-label">
        Student
      </label>

      <div class="dropdown-wrapper">
        <span class="dropdown-icon-left">
          &#128101;
        </span>
        <select id="student-switch">
          <option value="">Loading...</option>
        </select>
        <span class="dropdown-icon-right">
          &#9662;
        </span>
      </div>

      <button id="start-btn">
        <span class="emoji-inline">&#128640;</span>
        Start Learning
      </button>

      <div class="feature-pills">
        <span class="feature-pill">
          <span class="emoji-inline">&#128737;</span> Safe &amp; Private
        </span>
        <span class="feature-pill">
          <span class="emoji-inline">&#128202;</span> Track Progress
        </span>
        <span class="feature-pill">
          <span class="emoji-inline">&#11088;</span> Four Skills
        </span>
      </div>

    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>

  <script>
    const switcher = document.getElementById('student-switch');
    populateStudentDropdown(switcher);

    switcher.addEventListener('change', () => {
      const value = switcher.value;
      if (value === ADD_NEW_SENTINEL) {
        handleStudentDropdownChange(switcher);
      }
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      const value = switcher.value;
      if (!value || value === ADD_NEW_SENTINEL) {
        alert('Please select a student first.');
        return;
      }
      navigateToDashboard(value);
    });
  </script>

</body>
</html>
