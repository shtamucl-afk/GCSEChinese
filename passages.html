<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Passages - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: #EDE3D0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1E3A5F;
      -webkit-font-smoothing: antialiased;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: #1E3A5F;
      color: #F5EFE6;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .top-bar .back-link {
      color: #F5EFE6;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .top-bar .back-link:hover { opacity: 0.85; }
    .top-bar .student-label {
      color: rgba(245, 239, 230, 0.9);
      font-size: 14px;
    }

    .content-wrapper {
      max-width: 100%;
      margin: 0;
      padding: 20px 24px;
    }

    .chapter-title {
      font-size: 26px;
      font-weight: 600;
      color: #1E3A5F;
      margin: 0 0 16px 0;
      letter-spacing: -0.01em;
    }

    .sticky-header {
      position: sticky;
      top: 46px;
      background-color: #EDE3D0;
      padding: 12px 0;
      margin-bottom: 20px;
      z-index: 100;
    }
    .header-row {
      display: grid;
      grid-template-columns: minmax(240px, 320px) 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .script-toggle {
      background-color: #F5EFE6;
      border: 1px solid rgba(30, 58, 95, 0.15);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      height: 100%;
      box-sizing: border-box;
    }
    .script-toggle-label {
      font-weight: 600;
      color: #1E3A5F;
      white-space: nowrap;
    }
    .script-toggle-btn {
      padding: 6px 14px;
      cursor: pointer;
      border: 1px solid rgba(30, 58, 95, 0.25);
      border-radius: 999px;
      background-color: transparent;
      color: #1E3A5F;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.15s;
    }
    .script-toggle-btn:hover:not(.active) {
      background-color: rgba(30, 58, 95, 0.08);
    }
    .script-toggle-btn.active {
      background-color: #1E3A5F;
      color: #F5EFE6;
      border-color: #1E3A5F;
    }

    .legend {
      background-color: #F5EFE6;
      border: 1px solid rgba(30, 58, 95, 0.15);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      font-size: 12px;
      height: 100%;
      box-sizing: border-box;
    }
    .legend-title {
      font-weight: 600;
      color: #1E3A5F;
      font-size: 12px;
      margin-right: 4px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1E3A5F;
    }
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.L0 { background-color: #DB5858; }
    .legend-dot.L1 { background-color: #FA961B; }
    .legend-dot.L2 { background-color: #EFBE4A; }
    .legend-dot.L3 { background-color: #7BC780; }
    .legend-dot.L4 { background-color: #5A9AD6; }
    .legend-dot.Excluded { background-color: #B8B0A0; }

    .passage-box {
      background-color: #F5EFE6;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(30, 58, 95, 0.06), 0 4px 12px rgba(30, 58, 95, 0.04);
      border: 1px solid rgba(30, 58, 95, 0.08);
    }
    .passage-heading {
      font-size: 11px;
      font-weight: 700;
      color: #1E3A5F;
      margin: 0 0 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .passage-heading-accent {
      width: 32px;
      height: 3px;
      background-color: #1E3A5F;
      border-radius: 2px;
      margin-bottom: 16px;
    }
    .passage-body {
      font-size: 19px;
      line-height: 1.95;
      color: #1E3A5F;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
    }
    .passage-body p { margin: 0 0 14px 0; }
    .passage-body p:last-child { margin-bottom: 0; }

    .vocab {
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 500;
    }
    .vocab-L0 { background-color: #F8D8D8; color: #721C24; }
    .vocab-L1 { background-color: #FDE4C2; color: #6D3900; }
    .vocab-L2 { background-color: #FFF3CD; color: #856404; }
    .vocab-L3 { background-color: #D4EDDA; color: #155724; }
    .vocab-L4 { background-color: #D9E7F5; color: #1E3A5F; }
    .vocab-Excluded { background-color: #E5DED2; color: #6B6055; }

    /* M9.3 - sentence wrappers. Inline so word wrap flows naturally.
       Cursor + smooth transition prepare for M9.5 click-to-jump and
       active-sentence pill highlight. Visually identical to plain text
       until the .sentence--active class is applied in M9.5. */
    .sentence {
      display: inline;
      cursor: default;
      transition: background-color 0.25s ease, padding 0.25s ease,
                  font-size 0.25s ease, border-radius 0.25s ease;
    }

    /* M9.4 - passage audio player row (Mandarin + Cantonese) */
    .player-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .player-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid rgba(30, 58, 95, 0.35);
      border-radius: 999px;
      background-color: transparent;
      color: #1E3A5F;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
    }
    .player-btn:hover {
      background-color: rgba(30, 58, 95, 0.08);
    }
    .player-btn.playing {
      background-color: #1E3A5F;
      color: #F5EFE6;
      border-color: #1E3A5F;
    }
    .player-btn .player-icon {
      font-family: 'Noto Color Emoji', sans-serif;
      font-size: 14px;
      line-height: 1;
    }
    .player-time {
      font-size: 12px;
      color: rgba(30, 58, 95, 0.65);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    /* M9.4a - per-language group: [Play/Pause] [Stop] [Time] */
    .player-lang {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    /* M9.4a - small stop button, icon-only */
    .player-stop {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid rgba(30, 58, 95, 0.25);
      border-radius: 999px;
      background-color: transparent;
      color: #1E3A5F;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }
    .player-stop:hover {
      background-color: rgba(30, 58, 95, 0.08);
    }
    .player-stop:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    @media (max-width: 700px) {
      .player-row { gap: 10px; }
      .player-lang { flex-wrap: wrap; }
    }

    .empty-message {
      color: rgba(30, 58, 95, 0.55);
      font-style: italic;
    }

    /* Tablet — around 900px */
    @media (max-width: 900px) {
      .content-wrapper { padding: 16px 20px; }
      .chapter-title { font-size: 22px; }
      .passage-body { font-size: 18px; }
    }

    /* Small tablet / phone landscape — around 700px */
    @media (max-width: 700px) {
      .header-row { grid-template-columns: 1fr; }
      .passage-box { padding: 20px 22px; }
      .passage-body { font-size: 17px; line-height: 1.85; }
    }

    /* Phone portrait — under 600px */
    @media (max-width: 600px) {
      .top-bar { padding: 10px 16px; }
      .content-wrapper { padding: 12px 16px; }
      .chapter-title { font-size: 20px; }
      .passage-box { padding: 18px 20px; }
      .passage-body { font-size: 16px; line-height: 1.8; }
      .script-toggle, .legend {
        padding: 8px 12px;
        font-size: 12px;
      }
      .script-toggle-btn { padding: 5px 12px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a id="back-link" class="back-link" href="dashboard.html">← Back to Dashboard</a>
    <span id="student-label" class="student-label"></span>
  </div>

  <div class="content-wrapper">
    <div class="sticky-header">
      <h1 id="chapter-title" class="chapter-title">Loading...</h1>
      <div class="header-row">
        <div id="script-toggle-container"></div>
        <div id="legend-container"></div>
      </div>
    </div>
    <div id="passages-container">
      <p class="empty-message">Loading passages...</p>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>
  <script src="js/modal.js"></script>

  <script>
    const LEVEL_ORDER = ['L0', 'L1', 'L2', 'L3', 'L4', 'Excluded'];
    const LEVEL_META = {
      L0:       { emoji: '🔴', label: 'L0 Discover' },
      L1:       { emoji: '🟠', label: 'L1 Read' },
      L2:       { emoji: '🟡', label: 'L2 Listen' },
      L3:       { emoji: '🟢', label: 'L3 Usage' },
      L4:       { emoji: '🔵', label: 'L4 Write' },
      Excluded: { emoji: '🚫', label: 'Excluded' },
    };

    const student = getStudentFromUrl();
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get('book');
    const chapterId = params.get('chapter');

    if (!student) { window.location.href = 'index.html'; }
    if (!bookId || !chapterId) {
      window.location.href = 'dashboard.html?student=' + encodeURIComponent(student);
    }

    let currentScript = 'traditional';

    document.getElementById('back-link').href = buildBackToDashboardUrl();
    document.getElementById('student-label').textContent = 'Student: ' + student;

    function alignStickyHeader() {
      const topBar = document.querySelector('.top-bar');
      const stickyHeader = document.querySelector('.sticky-header');
      if (!topBar || !stickyHeader) return;
      stickyHeader.style.top = topBar.getBoundingClientRect().height + 'px';
    }
    window.addEventListener('load', alignStickyHeader);
    window.addEventListener('resize', alignStickyHeader);

    let studentProgress = {};

    function buildBackToDashboardUrl() {
      let url = 'dashboard.html?student=' + encodeURIComponent(student);
      if (bookId) url += '&book=' + encodeURIComponent(bookId);
      if (chapterId) url += '&chapter=' + encodeURIComponent(chapterId);
      return url;
    }

    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        studentProgress = doc.exists ? (doc.data().progress || {}) : {};
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
      }
    }

    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'L0';
    }

    function renderScriptToggle() {
      const containerEl = document.getElementById('script-toggle-container');
      containerEl.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'script-toggle';

      const label = document.createElement('span');
      label.className = 'script-toggle-label';
      label.textContent = 'Script:';
      box.appendChild(label);

      const tradBtn = document.createElement('button');
      tradBtn.className = 'script-toggle-btn' + (currentScript === 'traditional' ? ' active' : '');
      tradBtn.textContent = 'Traditional';
      tradBtn.addEventListener('click', () => switchScript('traditional'));
      box.appendChild(tradBtn);

      const simpBtn = document.createElement('button');
      simpBtn.className = 'script-toggle-btn' + (currentScript === 'simplified' ? ' active' : '');
      simpBtn.textContent = 'Simplified';
      simpBtn.addEventListener('click', () => switchScript('simplified'));
      box.appendChild(simpBtn);

      containerEl.appendChild(box);
    }

    function switchScript(script) {
      if (script === currentScript) return;
      currentScript = script;
      renderScriptToggle();
      loadAndRender();
    }

    function renderLegend() {
      const legendEl = document.getElementById('legend-container');
      legendEl.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'legend';
      const title = document.createElement('span');
      title.className = 'legend-title';
      title.textContent = 'Word level:';
      box.appendChild(title);
      LEVEL_ORDER.forEach(level => {
        const meta = LEVEL_META[level];
        const item = document.createElement('span');
        item.className = 'legend-item';
        const dot = document.createElement('span');
        dot.className = 'legend-dot ' + level;
        const labelSpan = document.createElement('span');
        labelSpan.textContent = meta.label;
        item.appendChild(dot);
        item.appendChild(labelSpan);
        box.appendChild(item);
      });
      legendEl.appendChild(box);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // M9.3 — sentence terminators, must match SENTENCE_TERMINATORS in
    // content-pipeline/generate_common.py so the frontend's sentence
    // indexing lines up with the passageAudio timings written by the
    // pipeline. Comma (，) intentionally excluded.
    const SENTENCE_TERMINATORS_JS = '。！？…；';

    // Split one paragraph of text into sentences using the same rule as
    // the pipeline: split after each terminator in 。！？…；, keeping
    // the terminator attached to the preceding sentence. Whitespace
    // stripped; empty sentences skipped. Trailing text without a
    // terminator is emitted as its own sentence.
    function splitParagraphIntoSentences(paragraphText) {
      const result = [];
      let current = '';
      for (const ch of paragraphText) {
        current += ch;
        if (SENTENCE_TERMINATORS_JS.includes(ch)) {
          const trimmed = current.trim();
          if (trimmed) result.push(trimmed);
          current = '';
        }
      }
      const tail = current.trim();
      if (tail) result.push(tail);
      return result;
    }

    // M9.4 - registry of all <audio> elements on the page, plus the
    // per-audio button + label element so we can update play/pause
    // state consistently. Rebuilt from scratch on every loadAndRender().
    const audioRegistry = [];

    // M9.4 - format milliseconds as "M:SS" for the player time readout.
    function formatMs(ms) {
      if (!ms || ms < 0) ms = 0;
      const totalSec = Math.floor(ms / 1000);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // M9.4 - pause every other audio element so at most one plays at a time.
    function pauseAllExcept(activeAudio) {
      audioRegistry.forEach(entry => {
        if (entry.audio !== activeAudio && !entry.audio.paused) {
          entry.audio.pause();
        }
      });
    }

    // M9.4 - build the player row for one passage. Creates two hidden
    // <audio> elements (Mandarin + Cantonese), two visible pill buttons,
    // and one shared time readout. Returns the row element for the caller
    // to append into the .passage-box.
    function buildPlayerRow(passageEntry) {
      const row = document.createElement('div');
      row.className = 'player-row';

      const langOrder = [
        { key: 'mandarin',  label: '普通話' },
        { key: 'cantonese', label: '廣東話' },
      ];

      langOrder.forEach(({ key, label }) => {
        const langData = passageEntry[key];
        if (!langData || !langData.file) return;

        // Wrap Play/Pause + Stop + Time in one per-language group.
        const group = document.createElement('div');
        group.className = 'player-lang';

        const audio = document.createElement('audio');
        audio.preload = 'metadata';
        audio.src = langData.file;

        // ---- Play / Pause pill ----
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'player-btn';
        btn.setAttribute('aria-label',
          'Play ' + (key === 'mandarin' ? 'Mandarin' : 'Cantonese') +
          ' audio for Passage ' + (passageEntry.passageIndex + 1));

        const icon = document.createElement('span');
        icon.className = 'player-icon';
        icon.textContent = '🔊';

        const labelSpan = document.createElement('span');
        labelSpan.textContent = label + ' ▶';

        btn.appendChild(icon);
        btn.appendChild(labelSpan);

        // ---- Stop button ----
        const stopBtn = document.createElement('button');
        stopBtn.type = 'button';
        stopBtn.className = 'player-stop';
        stopBtn.setAttribute('aria-label',
          'Stop ' + (key === 'mandarin' ? 'Mandarin' : 'Cantonese') +
          ' audio for Passage ' + (passageEntry.passageIndex + 1));
        stopBtn.textContent = '⏹';
        stopBtn.disabled = true;  // enabled once audio starts

        // ---- Per-language time readout ----
        const timeEl = document.createElement('span');
        timeEl.className = 'player-time';
        timeEl.textContent = '0:00 / 0:00';

        // Helper: reset the visible state to "stopped at 0".
        function resetToStopped() {
          audio.pause();
          audio.currentTime = 0;
          btn.classList.remove('playing');
          labelSpan.textContent = label + ' ▶';
          stopBtn.disabled = true;
          const totMs = langData.durationMs || (audio.duration * 1000) || 0;
          timeEl.textContent = '0:00 / ' + formatMs(totMs);
        }

        // ---- Events ----
        btn.addEventListener('click', () => {
          if (audio.paused) {
            pauseAllExcept(audio);
            audio.play().catch(err => console.warn('Audio play failed:', err));
          } else {
            audio.pause();
          }
        });

        stopBtn.addEventListener('click', () => {
          resetToStopped();
        });

        audio.addEventListener('play', () => {
          btn.classList.add('playing');
          labelSpan.textContent = label + ' ⏸';
          stopBtn.disabled = false;
        });

        audio.addEventListener('pause', () => {
          btn.classList.remove('playing');
          labelSpan.textContent = label + ' ▶';
          // Stop stays enabled while paused, so user can reset to 0.
        });

        audio.addEventListener('ended', () => {
          resetToStopped();
        });

        audio.addEventListener('timeupdate', () => {
          if (!audio.paused) {
            const curMs = audio.currentTime * 1000;
            const totMs = langData.durationMs || (audio.duration * 1000) || 0;
            timeEl.textContent = formatMs(curMs) + ' / ' + formatMs(totMs);
          }
        });

        audio.addEventListener('loadedmetadata', () => {
          const totMs = langData.durationMs || (audio.duration * 1000) || 0;
          if (audio.paused && audio.currentTime === 0) {
            timeEl.textContent = '0:00 / ' + formatMs(totMs);
          }
        });

        audioRegistry.push({ audio, btn, labelSpan, label });

        group.appendChild(btn);
        group.appendChild(stopBtn);
        group.appendChild(timeEl);
        group.appendChild(audio);

        row.appendChild(group);
      });

      return row;
    }

    function highlightPassageText(passageText, sortedVocab) {
      let working = escapeHtml(passageText);
      const placeholders = [];
      sortedVocab.forEach(word => {
        const level = getLevelForWord(word.id);
        const target = (currentScript === 'simplified') ? (word.simplified || word.traditional) : word.traditional;
        const wrapped = '<span class="vocab vocab-' + level + '">' + escapeHtml(target) + '</span>';
        const token = '\u0001PH' + placeholders.length + '\u0002';
        placeholders.push(wrapped);
        const escaped = escapeHtml(target);
        working = working.split(escaped).join(token);
      });
      placeholders.forEach((html, i) => {
        const token = '\u0001PH' + i + '\u0002';
        working = working.split(token).join(html);
      });
      return working;
    }

    async function loadAndRender() {
      const titleEl = document.getElementById('chapter-title');
      const containerEl = document.getElementById('passages-container');
      try {
        const [_, chapterResponse] = await Promise.all([
          loadStudentProgress(),
          fetch('data/book' + bookId + '/chapter' + chapterId + '.json'),
        ]);
        if (!chapterResponse.ok) throw new Error('HTTP ' + chapterResponse.status);
        const chapter = await chapterResponse.json();

        titleEl.textContent = 'Chapter ' + chapter.chapterId + ': ' + chapter.chapterTitle;
        renderScriptToggle();
        renderLegend();

        const passages = (currentScript === 'simplified')
          ? (chapter.passagesSimplified || chapter.passages || [])
          : (chapter.passages || []);
        const vocab = chapter.vocab || [];

        const sortedVocab = [...vocab].sort((a, b) => {
          const aWord = (currentScript === 'simplified') ? (a.simplified || a.traditional) : a.traditional;
          const bWord = (currentScript === 'simplified') ? (b.simplified || b.traditional) : b.traditional;
          return bWord.length - aWord.length;
        });

        containerEl.innerHTML = '';

        // M9.4 - clear the registry because loadAndRender() re-runs on every
        // script toggle and the old <audio> elements are about to be destroyed.
        audioRegistry.length = 0;

        // M9.4 - passageAudio may be absent on older chapters not yet
        // backfilled with --passage-audio-only. Rendering degrades to
        // passages without players in that case.
        const passageAudio = chapter.passageAudio || null;

        if (passages.length === 0) {
          containerEl.innerHTML = '<p class="empty-message">No passages found for this chapter.</p>';
          return;
        }

        const foundVocabIds = new Set();
        const combinedText = passages.join('\n');
        vocab.forEach(w => {
          const target = (currentScript === 'simplified') ? (w.simplified || w.traditional) : w.traditional;
          if (combinedText.includes(target)) foundVocabIds.add(w.id);
        });

        passages.forEach((passageText, idx) => {
          const box = document.createElement('div');
          box.className = 'passage-box';
          const heading = document.createElement('div');
          heading.className = 'passage-heading';
          heading.textContent = 'Passage ' + (idx + 1);
          box.appendChild(heading);
          const accent = document.createElement('div');
          accent.className = 'passage-heading-accent';
          box.appendChild(accent);

          // M9.4 - insert the player row (Mandarin + Cantonese buttons)
          // only when this chapter has passageAudio for this passage index.
          if (passageAudio && passageAudio[idx]) {
            const playerRow = buildPlayerRow(passageAudio[idx]);
            box.appendChild(playerRow);
          }

          const body = document.createElement('div');
          body.className = 'passage-body';

          // M9.3 — passage-scoped sentence counter; increments across
          // paragraphs so it matches the flat sentences[] array in the
          // passageAudio JSON block.
          let sentenceIdx = 0;

          const paragraphs = passageText.split('\n');
          paragraphs.forEach(paragraph => {
            const trimmedPara = paragraph.trim();
            if (!trimmedPara) return;

            const p = document.createElement('p');
            const sentences = splitParagraphIntoSentences(trimmedPara);

            sentences.forEach((sentenceText, i) => {
              const span = document.createElement('span');
              span.className = 'sentence';
              span.dataset.passage = idx;
              span.dataset.sentence = sentenceIdx;
              // Vocab pill highlighting happens INSIDE the sentence span.
              // The placeholder-swap in highlightPassageText escapes HTML
              // before injecting vocab spans, so the result is safe.
              span.innerHTML = highlightPassageText(sentenceText, sortedVocab);
              p.appendChild(span);
              // Space between sentences so word wrap flows naturally.
              // Not appended after the last sentence in a paragraph.
              if (i < sentences.length - 1) {
                p.appendChild(document.createTextNode(' '));
              }
              sentenceIdx++;
            });

            body.appendChild(p);
          });

          box.appendChild(body);
          containerEl.appendChild(box);
        });

        const missing = vocab.filter(w => !foundVocabIds.has(w.id));
        if (missing.length > 0) {
          console.warn(missing.length + ' vocab word(s) not found in any passage (' + currentScript + '):',
            missing.map(w => (currentScript === 'simplified' ? (w.simplified || w.traditional) : w.traditional)));
        }
        console.log('Rendered ' + passages.length + ' passage(s) with vocab highlighting (' + currentScript + ') for book ' + bookId + ' chapter ' + chapterId);
      } catch (err) {
        console.error('Error loading book ' + bookId + ' chapter ' + chapterId + ':', err);
        titleEl.textContent = 'Error';
        containerEl.innerHTML = '<p class="empty-message">Error loading chapter. See console.</p>';
      }
    }

    loadAndRender();
  </script>

</body>
</html>
