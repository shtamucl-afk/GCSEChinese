<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Passages - Chinese iGCSE Vocabulary Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: #EDE3D0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1E3A5F;
      -webkit-font-smoothing: antialiased;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: #1E3A5F;
      color: #F5EFE6;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .top-bar .back-link {
      color: #F5EFE6;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .top-bar .back-link:hover { opacity: 0.85; }
    .top-bar .student-label {
      color: rgba(245, 239, 230, 0.9);
      font-size: 14px;
    }

    .content-wrapper {
      max-width: 100%;
      margin: 0;
      padding: 20px 24px;
    }

    .chapter-title {
      font-size: 26px;
      font-weight: 600;
      color: #1E3A5F;
      margin: 0 0 16px 0;
      letter-spacing: -0.01em;
    }

    .sticky-header {
      position: sticky;
      top: 46px;
      background-color: #EDE3D0;
      padding: 12px 0;
      margin-bottom: 20px;
      z-index: 100;
    }
    .header-row {
      display: grid;
      grid-template-columns: minmax(240px, 320px) 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .script-toggle {
      background-color: #F5EFE6;
      border: 1px solid rgba(30, 58, 95, 0.15);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      height: 100%;
      box-sizing: border-box;
    }
    .script-toggle-label {
      font-weight: 600;
      color: #1E3A5F;
      white-space: nowrap;
    }
    .script-toggle-btn {
      padding: 6px 14px;
      cursor: pointer;
      border: 1px solid rgba(30, 58, 95, 0.25);
      border-radius: 999px;
      background-color: transparent;
      color: #1E3A5F;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.15s;
    }
    .script-toggle-btn:hover:not(.active) {
      background-color: rgba(30, 58, 95, 0.08);
    }
    .script-toggle-btn.active {
      background-color: #1E3A5F;
      color: #F5EFE6;
      border-color: #1E3A5F;
    }

    .legend {
      background-color: #F5EFE6;
      border: 1px solid rgba(30, 58, 95, 0.15);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      font-size: 12px;
      height: 100%;
      box-sizing: border-box;
    }
    .legend-title {
      font-weight: 600;
      color: #1E3A5F;
      font-size: 12px;
      margin-right: 4px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1E3A5F;
    }
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.L0 { background-color: #DB5858; }
    .legend-dot.L1 { background-color: #FA961B; }
    .legend-dot.L2 { background-color: #EFBE4A; }
    .legend-dot.L3 { background-color: #7BC780; }
    .legend-dot.L4 { background-color: #5A9AD6; }

    .passage-box {
      background-color: #F5EFE6;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(30, 58, 95, 0.06), 0 4px 12px rgba(30, 58, 95, 0.04);
      border: 1px solid rgba(30, 58, 95, 0.08);
    }
    .passage-heading {
      font-size: 11px;
      font-weight: 700;
      color: #1E3A5F;
      margin: 0 0 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .passage-heading-accent {
      width: 32px;
      height: 3px;
      background-color: #1E3A5F;
      border-radius: 2px;
      margin-bottom: 16px;
    }
    .passage-body {
      font-size: 19px;
      line-height: 1.95;
      color: #1E3A5F;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
    }
    .passage-body p { margin: 0 0 14px 0; }
    .passage-body p:last-child { margin-bottom: 0; }

    .vocab {
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 500;
    }
    .vocab-L0 { background-color: #F8D8D8; color: #721C24; }
    .vocab-L1 { background-color: #FDE4C2; color: #6D3900; }
    .vocab-L2 { background-color: #FFF3CD; color: #856404; }
    .vocab-L3 { background-color: #D4EDDA; color: #155724; }
    .vocab-L4 { background-color: #D9E7F5; color: #1E3A5F; }

    .empty-message {
      color: rgba(30, 58, 95, 0.55);
      font-style: italic;
    }

    /* Tablet — around 900px */
    @media (max-width: 900px) {
      .content-wrapper { padding: 16px 20px; }
      .chapter-title { font-size: 22px; }
      .passage-body { font-size: 18px; }
    }

    /* Small tablet / phone landscape — around 700px */
    @media (max-width: 700px) {
      .header-row { grid-template-columns: 1fr; }
      .passage-box { padding: 20px 22px; }
      .passage-body { font-size: 17px; line-height: 1.85; }
    }

    /* Phone portrait — under 600px */
    @media (max-width: 600px) {
      .top-bar { padding: 10px 16px; }
      .content-wrapper { padding: 12px 16px; }
      .chapter-title { font-size: 20px; }
      .passage-box { padding: 18px 20px; }
      .passage-body { font-size: 16px; line-height: 1.8; }
      .script-toggle, .legend {
        padding: 8px 12px;
        font-size: 12px;
      }
      .script-toggle-btn { padding: 5px 12px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a id="back-link" class="back-link" href="dashboard.html">← Back to Dashboard</a>
    <span id="student-label" class="student-label"></span>
  </div>

  <div class="content-wrapper">
    <div class="sticky-header">
      <h1 id="chapter-title" class="chapter-title">Loading...</h1>
      <div class="header-row">
        <div id="script-toggle-container"></div>
        <div id="legend-container"></div>
      </div>
    </div>
    <div id="passages-container">
      <p class="empty-message">Loading passages...</p>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>
  <script src="js/modal.js"></script>

  <script>
    const LEVEL_ORDER = ['L0', 'L1', 'L2', 'L3', 'L4'];
    const LEVEL_META = {
      L0: { emoji: '🔴', label: 'L0 Discover' },
      L1: { emoji: '🟠', label: 'L1 Read' },
      L2: { emoji: '🟡', label: 'L2 Listen' },
      L3: { emoji: '🟢', label: 'L3 Usage' },
      L4: { emoji: '🔵', label: 'L4 Write' },
    };

    const student = getStudentFromUrl();
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get('book');
    const chapterId = params.get('chapter');

    if (!student) { window.location.href = 'index.html'; }
    if (!bookId || !chapterId) {
      window.location.href = 'dashboard.html?student=' + encodeURIComponent(student);
    }

    let currentScript = 'traditional';

    document.getElementById('back-link').href = buildBackToDashboardUrl();
    document.getElementById('student-label').textContent = 'Student: ' + student;

    function alignStickyHeader() {
      const topBar = document.querySelector('.top-bar');
      const stickyHeader = document.querySelector('.sticky-header');
      if (!topBar || !stickyHeader) return;
      stickyHeader.style.top = topBar.getBoundingClientRect().height + 'px';
    }
    window.addEventListener('load', alignStickyHeader);
    window.addEventListener('resize', alignStickyHeader);

    let studentProgress = {};

    function buildBackToDashboardUrl() {
      let url = 'dashboard.html?student=' + encodeURIComponent(student);
      if (bookId) url += '&book=' + encodeURIComponent(bookId);
      if (chapterId) url += '&chapter=' + encodeURIComponent(chapterId);
      return url;
    }

    async function loadStudentProgress() {
      try {
        const doc = await db.collection('students').doc(student).get();
        studentProgress = doc.exists ? (doc.data().progress || {}) : {};
      } catch (err) {
        console.error('Error loading student progress:', err);
        studentProgress = {};
      }
    }

    function getLevelForWord(wordId) {
      return studentProgress[wordId] || 'L0';
    }

    function renderScriptToggle() {
      const containerEl = document.getElementById('script-toggle-container');
      containerEl.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'script-toggle';

      const label = document.createElement('span');
      label.className = 'script-toggle-label';
      label.textContent = 'Script:';
      box.appendChild(label);

      const tradBtn = document.createElement('button');
      tradBtn.className = 'script-toggle-btn' + (currentScript === 'traditional' ? ' active' : '');
      tradBtn.textContent = 'Traditional';
      tradBtn.addEventListener('click', () => switchScript('traditional'));
      box.appendChild(tradBtn);

      const simpBtn = document.createElement('button');
      simpBtn.className = 'script-toggle-btn' + (currentScript === 'simplified' ? ' active' : '');
      simpBtn.textContent = 'Simplified';
      simpBtn.addEventListener('click', () => switchScript('simplified'));
      box.appendChild(simpBtn);

      containerEl.appendChild(box);
    }

    function switchScript(script) {
      if (script === currentScript) return;
      currentScript = script;
      renderScriptToggle();
      loadAndRender();
    }

    function renderLegend() {
      const legendEl = document.getElementById('legend-container');
      legendEl.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'legend';
      const title = document.createElement('span');
      title.className = 'legend-title';
      title.textContent = 'Word level:';
      box.appendChild(title);
      LEVEL_ORDER.forEach(level => {
        const meta = LEVEL_META[level];
        const item = document.createElement('span');
        item.className = 'legend-item';
        const dot = document.createElement('span');
        dot.className = 'legend-dot ' + level;
        const labelSpan = document.createElement('span');
        labelSpan.textContent = meta.label;
        item.appendChild(dot);
        item.appendChild(labelSpan);
        box.appendChild(item);
      });
      legendEl.appendChild(box);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function highlightPassageText(passageText, sortedVocab) {
      let working = escapeHtml(passageText);
      const placeholders = [];
      sortedVocab.forEach(word => {
        const level = getLevelForWord(word.id);
        const target = (currentScript === 'simplified') ? (word.simplified || word.traditional) : word.traditional;
        const wrapped = '<span class="vocab vocab-' + level + '">' + escapeHtml(target) + '</span>';
        const token = '\u0001PH' + placeholders.length + '\u0002';
        placeholders.push(wrapped);
        const escaped = escapeHtml(target);
        working = working.split(escaped).join(token);
      });
      placeholders.forEach((html, i) => {
        const token = '\u0001PH' + i + '\u0002';
        working = working.split(token).join(html);
      });
      return working;
    }

    async function loadAndRender() {
      const titleEl = document.getElementById('chapter-title');
      const containerEl = document.getElementById('passages-container');
      try {
        const [_, chapterResponse] = await Promise.all([
          loadStudentProgress(),
          fetch('data/book' + bookId + '/chapter' + chapterId + '.json'),
        ]);
        if (!chapterResponse.ok) throw new Error('HTTP ' + chapterResponse.status);
        const chapter = await chapterResponse.json();

        titleEl.textContent = 'Chapter ' + chapter.chapterId + ': ' + chapter.chapterTitle;
        renderScriptToggle();
        renderLegend();

        const passages = (currentScript === 'simplified')
          ? (chapter.passagesSimplified || chapter.passages || [])
          : (chapter.passages || []);
        const vocab = chapter.vocab || [];

        const sortedVocab = [...vocab].sort((a, b) => {
          const aWord = (currentScript === 'simplified') ? (a.simplified || a.traditional) : a.traditional;
          const bWord = (currentScript === 'simplified') ? (b.simplified || b.traditional) : b.traditional;
          return bWord.length - aWord.length;
        });

        containerEl.innerHTML = '';
        if (passages.length === 0) {
          containerEl.innerHTML = '<p class="empty-message">No passages found for this chapter.</p>';
          return;
        }

        const foundVocabIds = new Set();
        const combinedText = passages.join('\n');
        vocab.forEach(w => {
          const target = (currentScript === 'simplified') ? (w.simplified || w.traditional) : w.traditional;
          if (combinedText.includes(target)) foundVocabIds.add(w.id);
        });

        passages.forEach((passageText, idx) => {
          const box = document.createElement('div');
          box.className = 'passage-box';
          const heading = document.createElement('div');
          heading.className = 'passage-heading';
          heading.textContent = 'Passage ' + (idx + 1);
          box.appendChild(heading);
          const accent = document.createElement('div');
          accent.className = 'passage-heading-accent';
          box.appendChild(accent);
          const body = document.createElement('div');
          body.className = 'passage-body';
          const parts = passageText.split('\n');
          parts.forEach(part => {
            const trimmed = part.trim();
            if (trimmed) {
              const p = document.createElement('p');
              p.innerHTML = highlightPassageText(trimmed, sortedVocab);
              body.appendChild(p);
            }
          });
          box.appendChild(body);
          containerEl.appendChild(box);
        });

        const missing = vocab.filter(w => !foundVocabIds.has(w.id));
        if (missing.length > 0) {
          console.warn(missing.length + ' vocab word(s) not found in any passage (' + currentScript + '):',
            missing.map(w => (currentScript === 'simplified' ? (w.simplified || w.traditional) : w.traditional)));
        }
        console.log('Rendered ' + passages.length + ' passage(s) with vocab highlighting (' + currentScript + ') for book ' + bookId + ' chapter ' + chapterId);
      } catch (err) {
        console.error('Error loading book ' + bookId + ' chapter ' + chapterId + ':', err);
        titleEl.textContent = 'Error';
        containerEl.innerHTML = '<p class="empty-message">Error loading chapter. See console.</p>';
      }
    }

    loadAndRender();
  </script>

</body>
</html>
